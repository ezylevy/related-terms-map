<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ויקידס — גרף קשרים</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f1117; color: #e4e4e7;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  /* graph LEFT, sidebar RIGHT — explicit order */
  flex-direction: row;
  height: 100vh; overflow: hidden;
}

/* GRAPH AREA — left, grows to fill */
.graph-container { flex: 1; position: relative; overflow: hidden; }
svg#graph { width: 100%; height: 100%; }

/* SIDEBAR — right side */
.sidebar {
  width: 360px; min-width: 360px; background: #18181b;
  border-right: 1px solid #27272a;
  display: flex; flex-direction: column; overflow: hidden; z-index: 10;
  direction: rtl;
}
.sidebar-header { padding: 14px 16px; border-bottom: 1px solid #27272a; }
.sidebar-header h1 { font-size: 1.05rem; font-weight: 700; color: #a78bfa; margin-bottom: 2px; }
.sidebar-header p { font-size: 0.7rem; color: #52525b; }
.sidebar-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
.sidebar-body::-webkit-scrollbar { width: 4px; }
.sidebar-body::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.section-title { font-size: 0.68rem; font-weight: 700; color: #52525b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }

/* SEARCH */
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 7px 32px 7px 10px;
  background: #27272a; border: 1px solid #3f3f46; border-radius: 7px;
  color: #e4e4e7; font-size: 0.82rem; outline: none;
  direction: rtl; text-align: right;
}
.search-wrap input:focus { border-color: #7c3aed; }
.search-icon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: #52525b; font-size: 0.8rem; }

/* PATH FINDER */
.path-finder { background: #1c1c20; border: 1px solid #27272a; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.path-finder select { width: 100%; padding: 6px 8px; background: #27272a; border: 1px solid #3f3f46; border-radius: 6px; color: #e4e4e7; font-size: 0.78rem; outline: none; direction: rtl; }
.path-btn-row { display: flex; gap: 6px; }
.pf-btn { flex: 1; padding: 6px; border: none; border-radius: 6px; font-size: 0.78rem; cursor: pointer; font-weight: 700; }
.pf-find { background: #7c3aed; color: #fff; }
.pf-find:hover { background: #6d28d9; }
.pf-clear { background: #27272a; color: #a1a1aa; border: 1px solid #3f3f46; }
.pf-clear:hover { background: #3f3f46; }
.path-result { font-size: 0.75rem; color: #a1a1aa; line-height: 1.7; display: none; direction: rtl; }
.path-result.visible { display: block; }
.path-result.error { color: #f87171; }
.path-node-btn { display: inline-block; background: #27272a; border-radius: 4px; padding: 2px 6px; margin: 1px; cursor: pointer; font-size: 0.73rem; color: #c4b5fd; }
.path-node-btn:hover { background: #3f3f46; }

/* CATEGORY FILTERS */
.filter-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-start; }
.filter-btn { padding: 3px 9px; border-radius: 20px; border: 1px solid transparent; font-size: 0.68rem; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
.filter-btn.inactive { opacity: 0.3; }

/* NODE DETAIL */
.node-detail { background: #1c1c20; border: 1px solid #27272a; border-radius: 8px; padding: 11px; display: none; direction: rtl; }
.node-detail.visible { display: block; }
.node-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; }
.node-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 7px; }
.node-text { font-size: 0.75rem; color: #a1a1aa; line-height: 1.6; margin-bottom: 9px; direction: rtl; }
.view-tabs { display: flex; gap: 0; border: 1px solid #27272a; border-radius: 7px; overflow: hidden; margin-bottom: 7px; }
.view-tab { flex: 1; padding: 5px 4px; text-align: center; font-size: 0.68rem; font-weight: 600; cursor: pointer; background: #18181b; color: #52525b; border: none; transition: all 0.15s; }
.view-tab.active { background: #27272a; color: #e4e4e7; }
.view-tab:not(:last-child) { border-left: 1px solid #27272a; }
.conn-panel { display: none; }
.conn-panel.active { display: block; }
.conn-count { font-size: 0.68rem; color: #52525b; margin-bottom: 5px; }
.conn-list { display: flex; flex-direction: column; gap: 3px; max-height: 160px; overflow-y: auto; }
.conn-list::-webkit-scrollbar { width: 3px; }
.conn-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.conn-item { display: flex; align-items: center; gap: 5px; padding: 4px 7px; background: #27272a; border-radius: 5px; cursor: pointer; font-size: 0.73rem; direction: rtl; }
.conn-item:hover { background: #3f3f46; }
.conn-dir { font-size: 0.7rem; color: #52525b; width: 14px; flex-shrink: 0; }
.conn-name { flex: 1; color: #e4e4e7; }
.conn-cat { font-size: 0.6rem; padding: 1px 5px; border-radius: 8px; white-space: nowrap; }

/* ALL NODES LIST */
.nodes-list-wrap { background: #1c1c20; border: 1px solid #27272a; border-radius: 8px; overflow: hidden; }
.nodes-list-header { padding: 8px 10px; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 6px; direction: rtl; }
.nodes-list-header span { font-size: 0.68rem; font-weight: 700; color: #52525b; flex: 1; }
.sort-col-btns { display: flex; gap: 3px; align-items: center; }
.sort-label { font-size: 0.6rem; color: #52525b; }
.sort-btn { padding: 3px 7px; font-size: 0.65rem; background: #27272a; border: 1px solid #3f3f46; border-radius: 5px; color: #a1a1aa; cursor: pointer; }
.sort-btn.active { background: #7c3aed22; border-color: #7c3aed66; color: #c4b5fd; }
.sort-btn:hover { background: #3f3f46; }
.nodes-all-list { max-height: 220px; overflow-y: auto; }
.nodes-all-list::-webkit-scrollbar { width: 3px; }
.nodes-all-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.nodes-col-header { display: flex; align-items: center; gap: 6px; padding: 3px 10px; background: #18181b; border-bottom: 1px solid #27272a; font-size: 0.62rem; color: #52525b; direction: rtl; }
.col-name { flex: 1; cursor: pointer; }
.col-name:hover { color: #a1a1aa; }
.col-in { width: 44px; text-align: center; cursor: pointer; }
.col-in:hover { color: #a1a1aa; }
.node-row { display: flex; align-items: center; gap: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.73rem; border-bottom: 1px solid #18181b; direction: rtl; }
.node-row:hover { background: #27272a; }
.node-row-name { flex: 1; color: #e4e4e7; }
.node-row-in { width: 44px; text-align: center; color: #60a5fa; font-size: 0.68rem; font-weight: 600; }
.node-row-cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* CONTROLS — left side of graph area */
.controls { position: absolute; top: 16px; left: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 20; }
.ctrl-btn { width: 36px; height: 36px; background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; color: #a1a1aa; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.ctrl-btn:hover { background: #27272a; color: #e4e4e7; border-color: #3f3f46; }
.ctrl-btn.active { color: #a78bfa; border-color: #7c3aed; }

/* STATS PANEL — left side, below controls */
.stats-panel {
  position: absolute; top: 330px; left: 16px;
  background: rgba(24,24,27,0.97); border: 1px solid #27272a; border-radius: 11px;
  z-index: 20; width: 230px; overflow: hidden;
  max-height: calc(100vh - 350px); display: flex; flex-direction: column;
  direction: rtl;
}
.stats-panel-header { padding: 8px 12px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.stats-panel-header h3 { font-size: 0.78rem; font-weight: 600; color: #a1a1aa; }
.stats-toggle-btn { background: none; border: none; color: #52525b; cursor: pointer; font-size: 0.72rem; }
.stats-panel-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
.stats-panel.collapsed .stats-panel-body { display: none; }
.cat-bar-row { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; cursor: pointer; padding: 2px 3px; border-radius: 5px; direction: rtl; }
.cat-bar-row:hover { background: #27272a; }
.cat-bar-label { width: 82px; color: #a1a1aa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-bar-track { flex: 1; height: 5px; background: #27272a; border-radius: 3px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 3px; }
.cat-bar-count { width: 22px; text-align: left; color: #52525b; }
.cat-detail { display: none; flex-direction: column; }
.cat-detail.visible { display: flex; }
.cat-detail-header { display: flex; align-items: center; gap: 6px; padding: 4px 0; margin-bottom: 4px; border-bottom: 1px solid #27272a; direction: rtl; }
.cat-back-btn { background: #27272a; border: none; color: #a1a1aa; border-radius: 5px; padding: 2px 7px; cursor: pointer; font-size: 0.7rem; }
.cat-back-btn:hover { background: #3f3f46; color: #e4e4e7; }
.cat-detail-title { font-size: 0.72rem; font-weight: 600; flex: 1; }
.cat-node-list { overflow-y: auto; display: flex; flex-direction: column; gap: 2px; max-height: 300px; }
.cat-node-list::-webkit-scrollbar { width: 3px; }
.cat-node-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.cat-node-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 5px; cursor: pointer; font-size: 0.72rem; direction: rtl; }
.cat-node-row:hover { background: #27272a; }
.cat-node-rank { width: 16px; color: #52525b; font-size: 0.65rem; text-align: center; flex-shrink: 0; }
.cat-node-name { flex: 1; color: #e4e4e7; }
.cat-node-in { color: #60a5fa; font-weight: 600; font-size: 0.68rem; flex-shrink: 0; }

/* STATS BAR — top left near controls */
.stats-bar { position: absolute; top: 16px; left: 68px; background: rgba(24,24,27,0.92); border: 1px solid #27272a; border-radius: 8px; padding: 5px 12px; font-size: 0.7rem; color: #52525b; display: flex; gap: 14px; z-index: 10; direction: rtl; }
.stats-bar strong { color: #e4e4e7; }

/* NAV HISTORY — top center */
.nav-history { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; padding: 5px 9px; display: none; align-items: center; gap: 5px; z-index: 15; max-width: 500px; direction: rtl; }
.nav-history.visible { display: flex; }
.nav-btn { background: #27272a; border: none; color: #a1a1aa; border-radius: 4px; padding: 2px 7px; cursor: pointer; font-size: 0.72rem; }
.nav-btn:hover { background: #3f3f46; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-breadcrumb { display: flex; align-items: center; gap: 3px; overflow: hidden; flex: 1; max-width: 300px; direction: rtl; }
.nav-crumb { font-size: 0.7rem; color: #a78bfa; cursor: pointer; white-space: nowrap; }
.nav-crumb:hover { text-decoration: underline; }
.nav-crumb.current { color: #e4e4e7; font-weight: 600; }
.nav-sep { color: #3f3f46; font-size: 0.62rem; }
.nav-reset-btn { background: #27272a; border: 1px solid #3f3f46; color: #f87171; border-radius: 5px; padding: 2px 8px; cursor: pointer; font-size: 0.68rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.nav-reset-btn:hover { background: #f8717122; border-color: #f87171; }

/* MINIMAP — bottom left */
.minimap-container { position: absolute; bottom: 20px; left: 20px; width: 175px; height: 135px; background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; overflow: hidden; z-index: 19; display: none; }
.minimap-container.visible { display: block; }

/* TOOLTIP */
.node-tooltip { position: fixed; background: rgba(24,24,27,0.97); border: 1px solid #3f3f46; border-radius: 8px; padding: 9px 13px; font-size: 0.76rem; pointer-events: none; z-index: 100; display: none; max-width: 220px; direction: rtl; }
.tooltip-title { font-weight: 700; margin-bottom: 3px; }
.tooltip-cat { font-size: 0.65rem; color: #52525b; margin-bottom: 3px; }
.tooltip-io { font-size: 0.68rem; display: flex; gap: 10px; }
.tooltip-out { color: #4ade80; }
.tooltip-in { color: #60a5fa; }

/* LOADING */
.loading-overlay { position: absolute; inset: 0; background: #0f1117; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 14px; }
.spinner { width: 38px; height: 38px; border: 3px solid #27272a; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #52525b; font-size: 0.82rem; }

/* FULLSCREEN */
.fullscreen-mode .sidebar { display: none !important; }
.fullscreen-mode .graph-container { flex: 1; }
.fullscreen-btn-floating { position: fixed; top: 20px; right: 20px; z-index: 1001; display: none; width: 36px; height: 36px; background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; color: #a1a1aa; font-size: 1rem; cursor: pointer; align-items: center; justify-content: center; }
.fullscreen-mode .fullscreen-btn-floating { display: flex; }

/* GRAPH ELEMENTS */
.link { fill: none; stroke-opacity: 0.5; }
.link.highlighted { stroke-opacity: 1 !important; stroke-width: 3px !important; }
.link.dimmed { stroke-opacity: 0.03 !important; }
.node { cursor: pointer; }
.node.dimmed circle { opacity: 0.07; }
.node.dimmed text { opacity: 0.04; }
</style>
</head>
<body>

<!-- SIDEBAR (right — appears on right in RTL flex) -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>&#127279; ויקידס — גרף קשרים</h1>
    <p>192 ערכים &middot; 576 קשרים מכוונים &middot; 8 קטגוריות</p>
  </div>
  <div class="sidebar-body">

    <div>
      <div class="section-title">חיפוש</div>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="חפש ערך..." />
      </div>
    </div>

    <div>
      <div class="section-title">מוצא מסלול (מכוון בלבד)</div>
      <div class="path-finder">
        <select id="pathFrom"><option value="">מ...</option></select>
        <select id="pathTo"><option value="">אל...</option></select>
        <div class="path-btn-row">
          <button class="pf-btn pf-find" onclick="findPath()">מצא מסלול</button>
          <button class="pf-btn pf-clear" onclick="clearPath()">נקה</button>
        </div>
        <div class="path-result" id="pathResult"></div>
      </div>
    </div>

    <div>
      <div class="section-title">קטגוריות</div>
      <div class="filter-grid" id="catFilters"></div>
    </div>

    <div id="nodeDetail" class="node-detail">
      <div class="node-name" id="detailName"></div>
      <div class="node-badge" id="detailBadge"></div>
      <div class="node-text" id="detailText"></div>
      <div class="view-tabs">
        <button class="view-tab active" id="tabOut" onclick="switchTab('out')">&#8592; מצביע על</button>
        <button class="view-tab" id="tabIn" onclick="switchTab('in')">מצביעים עליו &#8594;</button>
      </div>
      <div class="conn-panel active" id="panelOut">
        <div class="conn-count" id="countOut"></div>
        <div class="conn-list" id="listOut"></div>
      </div>
      <div class="conn-panel" id="panelIn">
        <div class="conn-count" id="countIn"></div>
        <div class="conn-list" id="listIn"></div>
      </div>
    </div>

    <div>
      <div class="section-title">כל הערכים</div>
      <div class="nodes-list-wrap">
        <div class="nodes-list-header">
          <span>&#128196; 192 ערכים</span>
          <div class="sort-col-btns">
            <span class="sort-label">מיין:</span>
            <button class="sort-btn active" id="sortNameBtn" onclick="sortNodes('name')">א–ת</button>
            <button class="sort-btn" id="sortInBtn" onclick="sortNodes('in')">&#8592; כניסות</button>
            <button class="sort-btn" id="sortDirBtn" onclick="toggleSortDir()">&#8595;</button>
          </div>
        </div>
        <div class="nodes-col-header">
          <div class="col-name" onclick="sortNodes('name')">שם</div>
          <div class="col-in" onclick="sortNodes('in')" title="כמה ערכים מצביעים כאן">&#8592; כניסות</div>
        </div>
        <div class="nodes-all-list" id="nodesAllList"></div>
      </div>
    </div>

  </div>
</div>

<!-- GRAPH AREA (left — appears on left in RTL flex) -->
<div class="graph-container" id="graphContainer">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">בונה את גרף הידע...</div>
  </div>

  <div class="stats-bar">
    <span>ערכים: <strong id="visibleNodes">192</strong></span>
    <span>קשרים: <strong id="visibleEdges">576</strong></span>
    <span>מוצג: <strong id="selectedCat">הכל</strong></span>
  </div>

  <div class="nav-history" id="navHistory">
    <button class="nav-btn" id="navBack" onclick="navigateHistory(-1)">&#8592;</button>
    <div class="nav-breadcrumb" id="navBreadcrumb"></div>
    <button class="nav-btn" id="navFwd" onclick="navigateHistory(1)">&#8594;</button>
    <button class="nav-reset-btn" onclick="clearHistory()">&#10005; אפס</button>
  </div>

  <svg id="graph"><defs id="arrowDefs"></defs></svg>

  <!-- CONTROLS — left side -->
  <div class="controls">
    <button class="ctrl-btn" onclick="zoomBy(1.3)" title="הגדל">+</button>
    <button class="ctrl-btn" onclick="zoomBy(0.77)" title="הקטן">&minus;</button>
    <button class="ctrl-btn" onclick="resetView()" title="איפוס">&#8962;</button>
    <button class="ctrl-btn active" id="labelsBtn" onclick="toggleLabels()" title="תוויות">Aa</button>
    <button class="ctrl-btn" id="minimapBtn" onclick="toggleMinimap()" title="מפה">&#9638;</button>
    <button class="ctrl-btn" onclick="exportPng()" title="ייצא PNG">&#128247;</button>
    <button class="ctrl-btn" id="fsBtn" onclick="toggleFullscreen()" title="מסך מלא">&#9727;</button>
  </div>

  <!-- STATS PANEL — left side, below controls -->
  <div class="stats-panel" id="statsPanel">
    <div class="stats-panel-header">
      <h3 id="statsPanelTitle">סטטיסטיקות</h3>
      <button class="stats-toggle-btn" onclick="toggleStatsPanel()">&#9660;</button>
    </div>
    <div class="stats-panel-body">
      <div id="catOverview"></div>
      <div class="cat-detail" id="catDetail">
        <div class="cat-detail-header">
          <button class="cat-back-btn" onclick="showCatOverview()">&#8592; חזרה</button>
          <div class="cat-detail-title" id="catDetailTitle"></div>
        </div>
        <div class="cat-node-list" id="catNodeList"></div>
      </div>
    </div>
  </div>

  <div class="minimap-container" id="minimapContainer">
    <svg id="minimap" width="175" height="135"></svg>
  </div>
  <div class="node-tooltip" id="tooltip"></div>
</div>

<button class="fullscreen-btn-floating" onclick="toggleFullscreen()">&#10005;</button>

<script>
const CAT_COLORS = {
  animals:"#4caf87", countries:"#5b8dee", human_body:"#e05c8a",
  landmarks:"#f5a623", musical_instruments:"#b36be0", nature:"#6dbf67",
  occupations:"#e87d3e", space:"#4fc3f7", traditional_food:"#ffca28", transportation:"#90a4ae"
};
const CAT_HE = {
  animals:"בעלי חיים", countries:"מדינות", human_body:"גוף האדם",
  landmarks:"אתרי תיירות", musical_instruments:"כלי נגינה", nature:"טבע",
  occupations:"מקצועות", space:"חלל", traditional_food:"אוכל מסורתי", transportation:"תחבורה"
};
function getCatColor(c){return CAT_COLORS[c]||"#888";}
function getCatHe(c){return CAT_HE[c]||c;}

-הַלֶּכֶת דּוֹמִים בְּעֶצֶם לְכַדּוּר עֲנָקִי. כַּדּוּר הָאָרֶץ, שֶׁבּוֹ אֲנַחְנוּ חַיִּים, הוּא כּוֹכַב-לֶכֶת, וְהַכּוֹכָב שֶׁסְּבִיבוֹ הוּא מִסְתּוֹבֵב – זוֹ הַשֶּׁמֶשׁ. הַתְּנוּעָה שֶׁל כּוֹכַב-הַלֶּכֶת סְבִיב הַכּוֹכָב נִקְרֵאת מַסְלוּל כְּבִידָתִי, בִּגְלַל כּוֹחַ הַכְּבִידָה. לִפְעָמִים יֵשׁ גַּם גּוּפִים שֶׁנָּעִים בְּמַסְלוּל סְבִיב כּוֹכַב-הַלֶּכֶת עַצְמוֹ. לְגוּפִים כָּאֵלֶּה קוֹרְאִים יְרֵחִים אוֹ לַוְיָנִים, כְּמוֹ הַיָּרֵחַ שֶׁאֲנַחְנוּ רוֹאִים בַּשָּׁמַיִם בַּלַּיְלָה."}, {"id": "כּוֹכָב נוֹפֵל", "display_name": "כּוֹכָב נוֹפֵל", "category": "space", "text": "כּוֹכָב נוֹפֵל הוּא מָה שֶׁהַמַּדְּעָנִים קוֹרְאִים לוֹ \"מֶטֶאוֹר\". בֶּחָלָל הֲמוֹן אֲבָנִים קְטַנּוֹת, שֶׁקּוֹרְאִים לָהֶן מֶטֶאוֹרוֹאִידִים. כְּשֶׁהָאֲבָנִים הָאֵלֶּה נִכְנָסוֹת לָאַטְמוֹסְפֶרָה שֶׁל כַּדּוּר-הָאָרֶץ, הֵן מִתְחַמְּמוֹת וְהַחֹם גּוֹרֵם לָהֶן לִזְהֹר. הָאֲבָנִים הַזּוֹהֲרוֹת הָאֵלֶּה נִרְאוֹת כְּמוֹ אוֹרוֹת שֶׁנּוֹפְלִים מֵהַשָּׁמַיִם, וְלָכֵן אֲנַחְנוּ קוֹרְאִים לָהֶן \"כּוֹכָבִים נוֹפְלִים\". אִם תִּרְצוּ לְבַקֵּשׁ מִשְׁאָלָה כְּשֶׁאַתֶּם רוֹאִים כּוֹכָב נוֹפֵל, עֲשׂוּ זֹאת מַהֵר-מַהֵר, כִּי לָרֹב הֵם נֶעֱלָמִים מַמָּשׁ כְּהֶרֶף עַיִן!"}, {"id": "כּוֹכַב שָׁבִיט", "display_name": "כּוֹכַב שָׁבִיט", "category": "space", "text": "כּוֹכַב שָׁבִיט הוּא גּוּף בְּמַעֲרֶכֶת הַשֶּׁמֶשׁ, שֶׁנִּרְאֶה כְּאִלּוּ יֵשׁ לוֹ זָנָב זוֹהֵר. כּוֹכְבֵי שָׁבִיט עֲשׂוּיִים מִקֶּרַח וּמֵאֲבָנִים קְפוּאוֹת. כּוֹכְבֵי שָׁבִיט מַגִּיעִים מִמְּקוֹמוֹת שֶׁרְחוֹקִים מְאוֹד מֵהַשֶּׁמֶשׁ, אֲבָל כְּשֶׁהֵם מִתְקָרְבִים אֵלֶיהָ, הַחֹם שֶׁלָּהּ הוֹפֵךְ אֶת הַקֶּרַח שֶׁלָּהֶם לְגָז וּלְאָבָק, וְלָכֵן נִדְמֶה לָנוּ שֶׁיֵּשׁ לָהֶם זָנָב זוֹהֵר. לִפְעָמִים אֶפְשָׁר לִרְאוֹת כּוֹכְבֵי שָׁבִיט בַּשָּׁמַיִם. כּוֹכַב הַשָּׁבִיט הֲכִי מְפֻרְסָם הוּא שְׁבִיט הֵיילִי, שֶׁמְּבַקֵּר בַּשָּׁמַיִם שֶׁל כַּדּוּר-הָאָרֶץ כָּל 75 שָׁנִים."}, {"id": "לַוְיָן", "display_name": "לַוְיָן", "category": "space", "text": "לַוְיָן הוּא מְכוֹנָה מְשֻׁכְלֶלֶת שֶׁשּׁוֹלְחִים מִכַּדּוּר-הָאָרֶץ לֶחָלָל. רֹב הַלַּוְיָנִים נָעִים סְבִיב כַּדּוּר-הָאָרֶץ, אֲבָל יֵשׁ גַּם כָּאֵלֶּה שֶׁנִּשְׁלְחוּ לְהַקִּיף אֶת הַיָּרֵחַ, אֶת הַשֶּׁמֶשׁ אוֹ חֵלֶק מִכּוֹכְבֵי-הַלֶּכֶת. סְבִיב כַּדּוּר-הָאָרֶץ נָעִים אַלְפֵי לַוְיָנִים, שֶׁמִּשְׁתַּמְּשִׁים בָּהֶם לְכָל מִינֵי צְרָכִים. יֵשׁ לַוְיָנִים שֶׁעוֹזְרִים לַחְזוֹת אֶת מֶזֶג הָאֲוִיר, יֵשׁ כָּאֵלֶּה שֶׁעוֹזְרִים לַמַּדְּעָנִים לַחְקֹר אֶת כַּדּוּר-הָאָרֶץ, אֲחֵרִים עוֹזְרִים לִמְטוֹסִים לִמְצֹא אֶת הַדֶּרֶךְ בַּשָּׁמַיִם, וְיֵשׁ גַּם לַוְיָנִים שֶׁמְּשַׁדְּרִים תָּכְנִיּוֹת טֶלֶוִיזְיָה לְכָל רַחֲבֵי הָעוֹלָם!"}, {"id": "מַאְדִּים", "display_name": "מַאְדִּים", "category": "space", "text": "מַאְדִּים הוּא כּוֹכַב-הַלֶּכֶת הָרְבִיעִי בְּמַעֲרֶכֶת הַשֶּׁמֶשׁ, בֵּין כַּדּוּר-הָאָרֶץ וְצֶדֶק. הוּא נִקְרָא מַאְדִּים בִּגְלַל צִבְעוֹ הָאֲדַמְדַּם. מַאְדִּים הוּא כּוֹכַב-לֶכֶת קָטָן, יַחֲסִית: כַּדּוּר-הָאָרֶץ שֶׁלָּנוּ גָּדוֹל מִמֶּנּוּ פִּי שְׁנַיִם. כּוֹכַב-הַלֶּכֶת הַיָּחִיד שֶׁקָּטָן יוֹתֵר מִמַּאְדִּים הוּא כּוֹכַב-חַמָּה. לְמַאְדִּים לוֹקֵחַ כִּמְעַט שְׁנָתַיִם לְהַקִּיף אֶת הַשֶּׁמֶשׁ. פְּנֵי הַשֶּׁטַח שֶׁלּוֹ הֵם כְּמוֹ מִדְבָּר אָדֹם וְקַר, עִם הֲמוֹן הָרִים וְהָרֵי גַּעַשׁ. מַדְּעָנִים בָּנוּ מְכוֹנוֹת מְיֻחָדוֹת בְּשֵׁם \"רוֹבֶרִים\", שֶׁנִּשְׁלְחוּ לַחְקֹר אֶת מַאְדִּים. הָרוֹבֶרִים מְצַלְּמִים תְּמוּנוֹת מִמַּאְדִּים וְעוֹזְרִים לַמַּדְּעָנִים לָדַעַת עָלָיו עוֹד."}, {"id": "מֶטֶאוֹרוֹאִיד", "display_name": "מֶטֶאוֹרוֹאִיד", "category": "space", "text": "מֶטֶאוֹרוֹאִיד הוּא אֶבֶן קְטַנָּה שֶׁנָּעָה בֶּחָלָל. יֵשׁ מֶטֶאוֹרוֹאִידִים שֶׁהֵם גְּדוֹלִים מַמָּשׁ כְּמוֹכֶם, וַאֲחֵרִים שֶׁהֵם קְטַנִּים כְּמוֹ גַּרְגִּירֵי חוֹל. רֹב הַמֶּטֶאוֹרוֹאִידִים הָיוּ פַּעַם חֵלֶק מִכּוֹכְבֵי שָׁבִיט אוֹ מֵאַסְטֶרוֹאִידִים, וּמֵאָז נִפְרְדוּ מֵהֶם וְהֵם נָעִים לְבַדָּם. כְּשֶׁמֶּטֶאוֹרוֹאִידִים נִכְנָסִים לָאַטְמוֹסְפֶרָה שֶׁל כַּדּוּר-הָאָרֶץ, הֵם מִתְחַמְּמִים וְהַחֹם גּוֹרֵם לָהֶם לִזְהֹר. אֵלֶּה הַכּוֹכָבִים הַנּוֹפְלִים, שֶׁלִּפְעָמִים רוֹאִים בַּשָּׁמַיִם בַּלַּיְלָה. אִם אַתֶּם רוֹאִים כּוֹכָב נוֹפֵל כָּזֶה – מַהֲרוּ לְבַקֵּשׁ מִשְּׁאֵלָה! מִי יוֹדֵעַ, אוּלַי הִיא תִּתְ gory": "space", "text": "צֶדֶק הוּא כּוֹכַב-הַלֶּכֶת הַחֲמִישִׁי בְּמַעֲרֶכֶת הַשֶּׁמֶשׁ, וְהוּא נִמְצָא בֵּין מַאְדִּים לְשַׁבְּתַאי. צֶדֶק הוּא כּוֹכַב-הַלֶּכֶת הֲכִי גָּדוֹל – פִּי אֶלֶף יוֹתֵר מִכַּדּוּר-הָאָרֶץ! וְגַם יֵשׁ לוֹ הֲמוֹן יְרֵחִים – לְפָחוֹת 67! זְמַן הַהַקָּפָה שֶׁל צֶדֶק סְבִיב הַשֶּׁמֶשׁ הוּא כִּמְעַט 12 שָׁנִים. אִם מִסְתַּכְּלִים עַל צֶדֶק דֶּרֶךְ טֶלֶסְקוֹפּ, נִדְמֶה כְּאִלּוּ יֵשׁ עָלָיו כֶּתֶם אָדֹם עֲנָקִי. לְמַעֲשֶׂה מְדֻבָּר בְּסוּפַת הוּרִיקָן עֲצוּמָה, שֶׁנִּמְשֶׁכֶת כְּבָר מֵאוֹת שָׁנִים!"}, {"id": "שְׁבִיל הֶחָלָב", "display_name": "שְׁבִיל הֶחָלָב", "category": "space", "text": "שְׁבִיל הֶחָלָב הוּא הַגָּלַקְסְיָה שֶׁבָּהּ אֲנַחְנוּ חַיִּים. בִּשְׁבִיל הֶחָלָב מִילְיַארְדִים שֶׁל כּוֹכָבִים, כּוֹכְבֵי-לֶכֶת וְגוּפִים שְׁמֵימִיִּים אֲחֵרִים. מַעֲרֶכֶת הַשֶּׁמֶשׁ הִיא רַק חֵלֶק קְטַנְטַן מִשְּׁבִיל הֶחָלָב. קוֹרְאִים לוֹ \"שְׁבִיל הֶחָלָב\" כִּי אִם מִסְתַּכְּלִים לְעֶבְרוֹ בַּלַּיְלָה, הוּא נִרְאֶה כְּמוֹ כֶּתֶם חָלָב לְבַנְבַּן בַּשָּׁמַיִם. אֲבָל אִם מִתְבּוֹנְנִים בּוֹ דֶּרֶךְ טֶלֶסְקוֹפּ, מְגַלִּים שֶׁהַכֶּתֶם הַלָּבָן הוּא בְּסַךְ הַכֹּל קְבוּצָה צְפוּפָה שֶׁל הֲמוֹן כּוֹכָבִים."}, {"id": "שַׁבְּתַאי", "display_name": "שַׁבְּתַאי", "category": "space", "text": "שַׁבְּתַאי הוּא כּוֹכַב-הַלֶּכֶת הַשִּׁשִּׁי בְּמַעֲרֶכֶת הַשֶּׁמֶשׁ, וְהוּא נִמְצָא בֵּין צֶדֶק וְאוּרָנוּס. שַׁבְּתַאי מֻקָּף בְּטַבָּעוֹת עֲצוּמוֹת וּמַרְהִיבוֹת שֶׁעֲשׂוּיוֹת מֵחֲתִיכוֹת שֶׁל קֶרַח, אֲבָנִים וְאָבָק. הַחֲתִיכוֹת הָאֵלֶּה יְכוֹלוֹת לִהְיוֹת קְטַנְטַנּוֹת כְּמוֹ גַּרְגִּירֵי חוֹל, אוֹ עֲנָקִיּוֹת כְּמוֹ בִּנְיָנִים. שַׁבְּתַאי הוּא כּוֹכַב-הַלֶּכֶת הַשֵּׁנִי הֲכִי גָּדוֹל, אַחֲרֵי צֶדֶק. שַׁבְּתַאי גָּדוֹל פִּי 764 מִכַּדּוּר-הָאָרֶץ. לוֹקֵחַ לוֹ 29 שָׁנִים וָחֵצִי לְהַקִּיף אֶת הַשֶּׁמֶשׁ, וְיֵשׁ סְבִיבוֹ הֲמוֹן יְרֵחִים – כִּמְעַט 60!"}, {"id": "שֶׁמֶשׁ", "display_name": "שֶׁמֶשׁ", "category": "space", "text": "הַשֶּׁמֶשׁ הִיא הַכּוֹכָב שֶׁהֲכִי קָרוֹב לְכַדּוּר-הָאָרֶץ. כָּל כּוֹכְבֵי-הַלֶּכֶת בְּמַעֲרֶכֶת הַשֶּׁמֶשׁ מִסְתּוֹבְבִים סְבִיבָהּ. הַשֶּׁמֶשׁ הִיא כְּמוֹ כַּדּוּר אֵשׁ עֲנָקִי וְלוֹהֵט, שֶׁפּוֹלֵט כַּמֻּיּוֹת עֲצוּמוֹת שֶׁל אוֹר וְחֹם. הַשֶּׁמֶשׁ חֲשׁוּבָה מְאוֹד בִּשְׁבִילֵנוּ. הִיא נִמְצֵאת בְּדִיּוּק בַּמֶּרְחָק הַמַּתְאִים מֵאִתָּנוּ, שֶׁמְּאַפְשֵׁר לָנוּ לִחְיוֹת כָּאן, וְגַם לַחַיּוֹת וְלַצְּמָחִים: הִיא מְחַמֶּמֶת אֶת כַּדּוּר-הָאָרֶץ – אֲבָל לֹא יוֹתֵר מִדַּי. בְּלִי הַשֶּׁמֶשׁ, לֹא הָיָה לָנוּ אוֹר וְגַם לֹא מְקוֹרוֹת כּוֹחַ. הַשֶּׁמֶשׁ הִיא הַדָּבָר הֲכִי בּוֹהֵק בַּשָּׁמַיִם. לֹא טוֹב לְהִסְתַּכֵּל עָלֶיהָ יְשִׁירוֹת בְּלִי מִשְׁקְפֵי שֶׁמֶשׁ – זֶה מְסַנְוֵר וּמַכְאִיב מְאוֹד לָעֵינַיִם."}, {"id": "אַבּוּב", "display_name": "אַבּוּב", "category": "musical_instruments", "text": "אַבּוּב הוּא כְּלִי נְשִׁיפָה שֶׁדּוֹמֶה קְצָת לִקְלָרִינֶט, אֲבָל הַקָּצֶה שֶׁלּוֹ אָרֹךְ וְדַק. כְּמוֹ בִּקְלָרִינֶט, גַּם בְּאַבּוּב מְנַגְּנִים בְּעֶזְרַת עָלֶה, וְגַם בְּאַבּוּב נוֹשְׁפִים וּמְכַסִּים בָּאֶצְבְּעוֹת חוֹרִים שׁוֹנִים כְּדֵי לְהָפִיק צְלִילִים שׁוֹנִים. יֵשׁ כָּאֵלֶּה שֶׁאוֹמְרִים שֶׁאִם לֹא מְנַגְּנִים בְּאַבּוּב כְּמוֹ שֶׁצָּרִיךְ, הוּא מַשְׁמִיעַ קוֹל שֶׁל בַּרְוָז! לְמַעֲשֶׂה, יֵשׁ יְצִירָה מוּזִיקָלִית מְפֻרְסֶמֶת מְאוֹד בְּשֵׁם \"פֶּטֶר וְהַזְּאֵב\", שֶׁבָּהּ הָאַבּוּב מְחַקֶּה קוֹלוֹת שֶׁל בַּרְוָז. זֶה דַּוְקָא נִשְׁמָע לֹא רַע בִּכְלָל!"}, {"id": "אָקוֹרְדְּיוֹן", "display_name": "אָקוֹרְדְּיוֹן", "category": "musical_instruments", "text": "אָקוֹרְדְּיוֹן הוּא כְּלִי נְגִינָה מָסָרְתִּי בִּמְקוֹמוֹת שׁוֹנִים בָּעוֹלָם. הוּא מֵפִיק צְלִילִים עֲשִׁירִים וְרָמִים מְאוֹד, וְנָהוּג לְלַוּוֹת בִּנְגִינָתוֹ אֵרוּעִים שֶׁל שִׁירִים וְרִקּוּדִים. גּוּף הָאָקוֹרְדְּיוֹן נִקְרָא מַפּוּחַ, וְצָרִיךְ לִמְתֹּחַ וּלְכַוֵּץ אוֹתוֹ כְּדֵי לְהָפִיק צְלִילִים. אֲבָל זֶה לֹא מַסְפִּיק: בְּיָד אַחַת צָרִיךְ לְנַגֵּן מַנְגִּינָה בְּמִקְלֶדֶת שֶׁדּוֹמָה לִפְסַנְתֵּר, וּבַיָּד הַשְּׁנִיָּה צָרִיךְ לִלְחֹץ עַל כַּפְתּוֹרִים כְּדֵי לִבְחֹר אָקוֹרְדִים שֶׁיְּלַוּוּ אֶת הַמַּנְגִּינָה. זֶה לֹא כָּל כָּךְ פָּשׁוּט!"}, {"id": "בַּנְג'וֹ", "display_name": "בַּנְג'וֹ", "category": "musical_instruments", "text": "בַּנְג'וֹ הוּא כְּלִי מֵיתָר עֲמָמִי, שֶׁנְּגִינָתוֹ מְלַוָּה לָרֹב שִׁירִים וְרִקּוּדִים. יֵשׁ לוֹ גּוּף עָגֹל וְצַוָּאר אָרֹךְ. בְּדֶרֶךְ כְּלָל יֵשׁ לוֹ אַרְבָּעָה מֵיתָרִים, אֲבָל לִפְעָמִים מִסְפָּרָם חֲמִשָּׁה וַאֲפִלּוּ שִׁשָּׁה. אֶת הַבַּנְג'וֹ הִמְצִיאוּ עֲבָדִים אַפְרִיקָאִים בְּאַרְצוֹת הַבְּרִית, שֶׁפִּתְּחוּ אוֹתוֹ מִכְּלֵי נְגִינָה בְּאַרְצוֹת מוֹצָאָם. כַּיּוֹם הַבַּנְג'וֹ פּוֹפּוּלָרִי מְאוֹד בְּאַרְצוֹת הַבְּרִית, בִּמְיֻחָד בְּמוּזִיקַת \"קַנְטְרִי\", שֶׁנִּשְׁמַעַת כָּכָה..."}, {"id": "בּוּזוּקִי", "display_name": "בּוּזוּקִי", "category": "musical_instruments", "text": "בּוּזוּקִי הוּא כְּלִי מֵיתָר יְוָנִי שֶׁמְּנַגְּנִים בּוֹ בְּעִקָּר מוּזִיקָה יְוָנִית מָסָרְתִּית – מַנְגִּינוֹת לְלֹא מִלִּים, אוֹ כְּלִוּוּי לְשִׁירִים שֶׁל זַמָּרִים יְוָנִיִּים. הַבּוּזוּקִי עָשׂוּי עֵץ וְיֵשׁ לוֹ גּוּף עָגֹל וְצַוָּאר אָרֹךְ. לְרֹב הַבּוּזוּקִים יֵשׁ שְׁלוֹשָׁה מֵיתָרִים כְּפוּלִים, וְלִפְעָמִים גַּם אַרְבָּעָה. כְּשֶׁפּוֹרְטִים עַל מֵיתָר שֶׁל בּוּזוּקִי, זֶה נִשְׁמָע כָּכָה... כְּשֶׁמְּנַגְּנִים מַנְגִּינָה בַּבּוּזוּקִי, הוּא נִשְׁמָע כָּךְ..."}, {"id": "גּוֹנְג", "display_name": "גּוֹנְג", "category": "musical_instruments", "text": "גּוֹנְג הוּא כְּלִי נְגִינָה מָסָרְתִּי עַתִּיק שֶׁקַּיָּם בִּמְקוֹמוֹת רַבִּים בָּעוֹלָם, מִסִּין וְעַד אַפְרִיקָה. יֵשׁ כָּל מִינֵי גְּדָלִים שֶׁל גּוֹנְג. כְּדֵי לְנַגֵּן בּוֹ מִשְׁתַּמְּשִׁים בְּמַקּוֹשׁ, שֶׁנִּרְאֶה כְּמוֹ פַּטִּישׁ קָטָן עִם רֹאשׁ רַךְ, וּמַקִּישִׁים בּוֹ עַל הַגּוֹנְג. כָּל גּוֹנְג יָכוֹל לְהָפִיק רַק סוּג אֶחָד שֶׁל צְלִיל, אֲבָל כֻּלָּם מְהַדְהֲדִים חָזָק מְאוֹד! פַּעַם, בִּמְקוֹמוֹת מְסֻיָּמִים בָּעוֹלָם, נָהֲגוּ לְהִשְׁתַּמֵּשׁ בְּגוֹנְג כְּדֵי לְהָעִיר אֲנָשִׁים בַּבֹּקֶר!"}, {"id": "גִּיטָרָה", "display_name": "גִּיטָרָה", "category": "musical_instruments", "text": "גִּיטָרָה הִיא אֶחָד מִכְּלֵי הַנְּגִינָה הֲכִי מְפֻרְסָמִים בָּעוֹלָם, וּמְקוֹרָהּ בִּסְפָרַד. הִיא עֲשׂוּיָה מֵעֵץ וְיֵשׁ לָהּ שִׁשָּׁה מֵיתָרִים, גּוּף גָּדוֹל וְצַוָּאר אָרֹךְ. אֶפְשָׁר לְנַגֵּן בָּהּ מַנְגִּינוֹת אוֹ אָקוֹרְדִים. הַגִּי text": "פְּסַנְתֵּר הוּא כְּלִי נְגִינָה גָּדוֹל, בַּעַל קְלִידִים לְבָנִים וּשְׁחֹרִים. כְּשֶׁלּוֹחֲצִים עַל הַקְּלִידִים בָּאֶצְבָּעוֹת, פַּטִּישִׁים קְטַנְטַנִּים שֶׁמְּחֻבָּרִים לַקְּלִידִים מִבִּפְנִים מַקִּישִׁים עַל הַמֵּיתָרִים שֶׁבְּתוֹךְ הַפְּסַנְתֵּר וּמְפִיקִים צְלִילִים מִכָּל הַסּוּגִים. בְּשִׁירִים פְּשׁוּטִים, יַד יָמִין מְנַגֶּנֶת אֶת הַמַּנְגִּינָה וְיַד שְׂמֹאל מְלַוָּה אוֹתָהּ בְּאָקוֹרְדִים. כְּשֶׁכָּל הָאֶצְבָּעוֹת מְנַגְּנוֹת יַחַד, נוֹצֶרֶת מוּזִיקָה עֲשִׁירָה וּמְרַתֶּקֶת."}, {"id": "צֶ'לוֹ", "display_name": "צֶ'לוֹ", "category": "musical_instruments", "text": "צֶ'לוֹ הוּא כְּלִי מֵיתָר גָּדוֹל בְּצוּרַת כִּנּוֹר, עָשׂוּי עֵץ, שֶׁמְּנַגְּנִים בּוֹ בְּעֶזְרַת קֶשֶׁת. יֵשׁ לוֹ צְלִיל חָזָק וְנָמוּךְ שֶׁנִּשְׁמָע כָּךְ... לַצֶּ'לוֹ יֵשׁ גּוּף גָּדוֹל מְאוֹד, צַוָּאר אָרֹךְ וְאַרְבָּעָה מֵיתָרִים. בִּגְלַל גָּדְלוֹ, הַצֶּ'לָן מַשְׁעִין אוֹתוֹ עַל הָרִצְפָּה וּמְנַגֵּן בּוֹ בִּישִׁיבָה. הַצֶּ'לוֹ הוּא חֵלֶק מֵהַתִּזְמֹרֶת, אֲבָל בִּזְכוּת הַצְּלִיל הַמַּקְסִים שֶׁלּוֹ, מַלְחִינִים רַבִּים חִבְּרוּ מוּזִיקָה בִּמְיֻחָד בִּשְׁבִילוֹ."}, {"id": "קְלָרִינֶט (קְלַרְנִית)", "display_name": "קְלָרִינֶט (קְלַרְנִית)", "category": "musical_instruments", "text": "קְלָרִינֶט הוּא אֶחָד מִכְּלִי הַנְּשִׁיפָה הַחֲשׁוּבִים בְּיוֹתֵר בַּתִּזְמֹרֶת. מְפִיקִים מִמֶּנּוּ צְלִילִים בְּעֶזְרַת \"עָלֶה\", שֶׁהוּא בְּעֶצֶם פִּסָּה דַּקִּיקָה שֶׁל צֶמַח הַבַּמְבּוּק, שֶׁמַּכְנִיסִים אֶל קְצֵה הַקְּלָרִינֶט וְנוֹשְׁפִים דַּרְכָּהּ פְּנִימָה. כְּשֶׁהָאֲוִיר גּוֹרֵם לֶעָלֶה לִרְטֹט, הוּא מֵפִיק צְלִיל מְיֻחָד. נַגָּנֵי הַקְּלָרִינֶט נוֹשְׁפִים אֲוִיר אֶל תּוֹךְ הַכְּלִי וּמְכַסִּים בָּאֶצְבָּעוֹת אֶת הַחוֹרִים הַשּׁוֹנִים, כְּדֵי לְהָפִיק צְלִילִים שׁוֹנִים. הַצְּלִיל שֶׁל הַקְּלָרִינֶט יְפֵהפֶה וְעָדִין, אֲבָל הוּא מְסֻגָּל גַּם לְהַשְׁמִיעַ מוּזִיקָה רָמָה וְרוֹעֶשֶׁת!"}, {"id": "קְסִילוֹפוֹן (מַקּוֹשִׁית)", "display_name": "קְסִילוֹפוֹן (מַקּוֹשִׁית)", "category": "musical_instruments", "text": "קְסִילוֹפוֹן הוּא כְּלִי הַקָּשָׁה שֶׁעָשׂוּי מִלּוּחוֹת עֵץ. כְּדֵי לְנַגֵּן בִּקְסִילוֹפוֹן מַקִּישִׁים עַל הַלּוּחוֹת בְּעֶזְרַת מַקּוֹשִׁים, שֶׁדּוֹמִים לְפַטִּישִׁים קְטַנִּים. הַלּוּחוֹת שֶׁל הַקְּסִילוֹפוֹן מְסֻדָּרִים מֵהַנָּמוּךְ לַגָּבוֹהַּ, כְּמוֹ הַקְּלִידִים שֶׁל הַפְּסַנְתֵּר, אֲבָל כָּל לוּחַ הוּא בְּאֹרֶךְ אַחֵר: הַלּוּחוֹת הָאֲרֻכִּים מְפִיקִים צְלִילִים נְמוּכִים, וְהַקְּצָרִים – צְלִילִים גְּבוֹהִים. יֵשׁ הֲמוֹן סוּגִים שֶׁל קְסִילוֹפוֹנִים בִּמְקוֹמוֹת שׁוֹנִים בָּעוֹלָם, וַאֲפִלּוּ קְסִילוֹפוֹנִים מְיֻחָדִים לִילָדִים!"}, {"id": "תֻּפִּים", "display_name": "תֻּפִּים", "category": "musical_instruments", "text": "תֹּף הוּא כְּלִי הַקָּשָׁה שֶׁקּוֹבֵעַ אֶת הַקֶּצֶב לִכְלֵי הַנְּגִינָה הָאֲחֵרִים, וּמְלַוֶּה גַּם מִצְעָדִים, רִקּוּדִים וּמְחוֹלוֹת. יֵשׁ הֲמוֹן סוּגִים שֶׁל תֻּפִּים בְּכָל מִינֵי מְקוֹמוֹת בָּעוֹלָם. יֵשׁ תֻּפִּים שֶׁמַּקִּישִׁים עֲלֵיהֶם בְּמַקְּלוֹת מְיֻחָדִים, כְּמוֹ תֹּף הַ\"סְּנֶר\", תֹּף הַ\"טָּם-טָם\" וְכָל מִינֵי מְצִלּוֹת. עַל תֻּפִּים אֲחֵרִים מְנַגְּנִים בְּעֶזְרַת הָרַגְלַיִם, כְּמוֹ תֹּף הַבָּס אוֹ הַ\"הַי-הֶט\". יַחַד הֵם יוֹצְרִים מִקְצָבִים נֶהֱדָרִים!"}, {"id": "קוֹאָלָה", "display_name": "קוֹאָלָה", "category": "animals", "text": "הַקּוֹאָלָה הוּא בַּעַל-חַיִּים אָפֹר-שֶׁחֹם, קָטָן וְחָמוּד מְאוֹד, שֶׁחַי רַק בְּאוֹסְטְרַלְיָה. אֲנָשִׁים רַבִּים נוֹסְעִים לְאוֹסְטְרַלְיָה בִּמְיֻחָד כְּדֵי לִרְאוֹת אוֹתוֹ. קוֹאָלוֹת אוֹכְלוֹת רַק עָלִים שֶׁל עֵץ מְסֻיָּם - הָאֵיקָלִיפְּטוּס, וְהֵן מְטַפְּסוֹת עָלָיו בְּעֶזְרַת מִין צִפָּרְנַיִם חַדּוֹת, שֶׁנִּקְרָאוֹת טְפָרִים. הֵן גַּם יְשֵׁנוֹת בֵּין עַנְפֵי הָאֵיקָלִיפְּטוּס. קוֹאָלוֹת הֵן עַצְלָנִיּוֹת מְאוֹד. הֵן יְשֵׁנוֹת כִּמְעַט כָּל הַיּוֹם, בְּלִי לָזוּז יוֹתֵר מִדַּי. הֵן גַּם מַעֲדִיפוֹת לִחְיוֹת לְבַד, בְּלִי חֲבֵרִים. הַגּוּרִים שֶׁל הַקּוֹאָלָה גְּדֵלִים בְּתוֹךְ הַכִּיס שֶׁל אִמָּא שֶׁלָּהֶם, מַמָּשׁ כְּמוֹ קֶנְגּוּרוּ."}, {"id": "חָתוּל", "display_name": "חָתוּל", "category": "animals", "text": "הֶחָתוּל הוּא בַּעַל-חַיִּים קָטָן וְשָׂעִיר, שֶׁאֲנָשִׁים רַבִּים אוֹהֲבִים לְגַדֵּל כְּחַיַּת מַחְמָד. הוּא אוֹהֵב לִישֹׁן בְּמֶשֶׁךְ רֹב הַיּוֹם, וּמְסֻגָּל לִקְפֹּץ מַמָּשׁ גָּבוֹהַּ. כְּשֶׁחָתוּל נוֹפֵל, הוּא נוֹחֵת לָרֹב עַל כַּפּוֹת הָרַגְלַיִם שֶׁלּוֹ. חֲתוּלִים בּוֹרְחִים מִכְּלָבִים וְאוֹהֲבִים לִרְדֹּף אַחֲרֵי עַכְבָּרִים, צִפּוֹרִים וַחֲרָקִים. חֲתוּלִים הֵם יְצוּרִים נְקִיִּים מְאוֹד, אֲבָל בִּמְקוֹם לְהִתְרַחֵץ בְּמַיִם, הֵם מְלַקְּקִים אֶת עַצְמָם. חֲתוּלִים מְסֻגָּלִים לִרְאוֹת בַּחֲשֵׁכָה, וְלִשְׁמֹעַ אֶת הָרַחַשׁ הַקַּל בְּיוֹתֵר."}, {"id": "צִ'יטָה", "display_name": "צִ'יטָה", "category": "animals", "text": "הַצִּ'יטָה הִיא הַחַיָּה הַמְּהִירָה בְּיוֹתֵר בַּתֵּבֵל. הִיא רָצָה מַהֵר כָּל כָּךְ, שֶׁהִיא מְסֻגֶּלֶת לְהַשִּׂיג אֲפִלּוּ מְכוֹנִית! הַצִּ'יטָה שַׁיֶּכֶת לְמִשְׁפַּחַת הַחֲתוּלִיִּים, מַמָּשׁ כְּמוֹ הָאַרְיֵה וְהַנָּמֵר. צִ'יטוֹת חַיּוֹת בְּאַפְרִיקָה וּבְאַסְיָה, וְהַגַּב שֶׁלָּהֶן מְכֻסֶּה בַּהֲמוֹן כְּתָמִים שְׁחוֹרִים. הֵן צָדוֹת בַּעֲלֵי חַיִּים רַבִּים – אַיָּלוֹת, אַנְטִילוֹפּוֹת וְלִפְעָמִים גַּם זֶבְּרוֹת. הַצִּ'יטָה לֹא רוֹדֶפֶת אַחֲרֵי טַרְפָּהּ לְאֹרֶךְ זְמַן, כִּי הִיא מִתְעַיֶּפֶת מַהֵר מְאוֹד. לַצִּ'יטָה יֵשׁ עֵינַיִם חַדּוֹת לְהַפְלִיא, וְהִיא מְסֻגֶּלֶת לְהַבְחִין בִּדְבָרִים מִמֶּרְחָק עָצוּם."}, {"id": "פִּיל", "display_name": "פִּיל", "category": "animals", "text": "הַפִּיל הוּא בַּעַל-הַחַיִּים הֲכִי גָּדוֹל שֶׁחַי בַּיַּבָּשָׁה. הַפִּילִים חַיִּים בְּאַפְרִיקָה וּבְאַסְיָה, בִּיעָרוֹת אוֹ בִּשְׁטָחִים פְּתוּחִים. פִּילִים הֵם כְּבֵדִים מְאוֹד וְיֵשׁ לָהֶם אָזְנַיִם עֲנָקִיּוֹת וּמִתְנַפְנְפוֹת. הַפִּיל הוּא יְצוּר חָכָם וְעָדִין בְּיוֹתֵר. יֵשׁ לוֹ חֵדֶק אָרֹךְ וְהוּא מִשְׁתַּמֵּשׁ בּוֹ כְּדֵי לְהָרִיחַ, לְהָרִים דְּבָרִים, לְהִתְקַלֵּחַ וְלִשְׁתּוֹת, וְלִפְעָמִים אֲפִלּוּ כְּדֵי לְלַטֵּף וּלְחַבֵּק! הַפִּילִים מִשְׁתַּמְּשִׁים בַּחֵדֶק שֶׁלָּהֶם גַּם כַּחֲצוֹצְרָה, כְּדֵי לְהַשְׁמִיעַ בּוֹ תְּרוּעוֹת רָמוֹת. לְפִילִים רַבִּים יֵשׁ זוּג שִׁנַּיִם קִדְמִיּוֹת אֲרֻכּוֹת וּמְעֻקָּלוֹת, שֶׁקּוֹרְאִים לָהֶן חָטִים."}, {"id": "צְפַרְדֵּעַ", "display_name": "צְפַרְדֵּעַ", "category": "animals", "text": "הַצְּפַרְדֵּעַ הִיא בַּעַל-חַיִּים קָטָן שֶׁחַי לְיַד בִּצּוֹת וַאֲגַמִּים. צְפַרְדֵּעַ הִיא דּוּ-חַי: זֹאת אוֹמֶרֶת שֶׁהִיא מְסֻגֶּלֶת לִחְיוֹת גַּם בַּמַּיִם וְגַם בַּיַּבָּשָׁה. יֵשׁ צְפַרְדֵּעִים בְּכָל מִינֵי צְבָעִים. בְּקִדְמַת הַפֶּה יֵשׁ לַצְּפַרְדֵּעַ לָשׁוֹן דְּבִיקָה וַאֲרֻכָּה מְאוֹד. הִיא מִשְׁתַּמֶּשֶׁת בַּלָּשׁוֹן שֶׁלָּהּ כְּדֵי לִתְפֹּס יַתּוּשִׁים וַחֲרָקִים אֲחֵרִים שֶׁהִיא אוֹכֶלֶת. לַצְּפַרְדֵּעַ יֵשׁ עֵינַיִם מְיֻחָדוֹת, שֶׁמְּסֻגָּלוֹת לְהִסְתַּכֵּל לְהַרְבֵּה כִּוּוּנִים שׁוֹנִים. צְפַרְדֵּעַ לְעוֹלָם אֵינָהּ עוֹצֶמֶת עֵינַיִם, אֲפִלּוּ כְּשֶׁהִיא יְשֵׁנָה!"}, {"id": "דְּרָקוֹן קוֹמוֹדוֹ", "display_name": "דְּרָקוֹן קוֹמוֹדוֹ", "category": "animals", "text": "דְּרָקוֹן קוֹמוֹדוֹ הוּא הַלְּטָאָה הֲכִי גְּדוֹלָה בָּעוֹלָם. הוּא נִקְרָא עַל שֵׁם הַמָּקוֹם הָרִאשׁוֹן שֶׁבּוֹ מָצְאוּ אוֹתוֹ, הָאִי קוֹמוֹדוֹ שֶׁבְּאִינְדּוֹנֶזְיָה. הוּא גָּדוֹל, יָרֹק וְכָבֵד, וְיֵשׁ לוֹ עֵינַיִם מַפְחִידוֹת וְזָנָב רַב-עָצְמָה. דְּרָקוֹנֵי קוֹמוֹדוֹ מְסֻגָּלִים לַעֲבֹר מֶרְחַקִּים קְצָרִים בִּמְהִירוּת רַבָּה, וְלָכֵן הֵם יְכוֹלִים לָצוּד חַיּוֹת גְּדוֹלוֹת, כְּמוֹ בּוּפָלוֹ וַחֲזִירֵי בַּר. הַנְּשִׁיכָה שֶׁלָּהֶם אַרְסִית וּמְסֻכֶּנֶת מְאוֹד. אַחֲרֵי שֶׁדְּרָקוֹנִית קוֹמוֹדוֹ מְטִילָה בֵּיצִים, הִיא קוֹבֶרֶת אוֹתָן בָּאֲדָמָה."}, {"id": "בַּרְוָזָן", "display_name": "בַּרְוָזָן", "category": "animals", "text": "הַבַּרְוָזָן הוּא בַּעַל-חַיִּים יוֹצֵא דֹּפֶן בִּמְיֻחָד, שֶׁנִּרְאֶה כְּמוֹ שִׁלּוּב שֶׁל בּוֹנֶה עִם בַּרְוָז. יֵשׁ לוֹ כַּפּוֹת רַגְלַיִם שְׁטוּחוֹת וּמַקּוֹר רָחָב, וְהוּא חַי רַק בְּאוֹסְטְרַלְיָה. הַבַּרְוָזָן הוּא אֶחָד מִשְּׁנֵי הַיּוֹנְקִים הַיְּחִידִים שֶׁמְּטִילִים בֵּיצִים; הַשֵּׁנִי הוּא הַקִּפּוֹדָן. הבַּרְוְזָנִית חוֹפֶרֶת תְּעָלוֹת קְטַנּוֹת בַּבֹּץ, וְשָׁם הִיא מְטַפֶּלֶת בַּגּוּרִים שֶׁלָּהּ אַחֲרֵי שֶׁבָּקְעוּ מֵהַבֵּיצִים. לַזְּכָרִים יֵשׁ בָּרֶגֶל בְּלִיטָה קָשָׁה שֶׁנִּקְרֵאת דָּרְבָּן, וְהִיא מְכִילָה אֶרֶס."}, {"id": "קִפּוֹדָג", "display_name": "קִפּוֹדָג", "category": "animals", "text": "הַקִּפּוֹדָג הוּא דָּג מוּזָר, שֶׁמֵּגֵן עַל עַצְמוֹ בְּדֶרֶךְ מְיֻחֶדֶת מְאוֹד. בִּשְׁעַת סַכָּנָה, הוּא בּוֹלֵעַ בִּמְהִירוּת הֲמוֹן מַיִם וּמִתְנַפֵּחַ, עַד שֶׁהוּא נִרְאֶה כְּמוֹ כַּדּוּר גָּדוֹל עִם קוֹצִים. בְּצוּרָה כָּזֹאת, אִם חַיָּה כָּלְשֶׁהִי תְּנַסֶּה לִטְרֹף אוֹתוֹ, יִהְיֶה לָהּ קָשֶׁה מְאוֹד לְהַחְזִיק אֶת הַקִּפּוֹדָג הַקּוֹצָנִי בַּפֶּה. הַקִּפּוֹדָג הוּא גַּם אַרְסִי מְאוֹד, וְהָאֶרֶס שֶׁלּוֹ עָלוּל לִפְגֹּעַ בְּכָל יְצוּר חַי. בַּעַל-הַחַיִּים הַיָּחִיד שֶׁמְּחֻסָּן מִפְּנֵי הָאֶרֶס שֶׁל הַקִּפּוֹדָג הוּא הַכָּרִישׁ."}, {"id": "עַקְרָב", "display_name": "עַקְרָב", "category": "animals", "text": "הָעַקְרָב הוּא בַּעַל-חַיִּים קָטָן, עִם זָנָב אָרֹךְ וּמְחֻדָּד וּצְבָתוֹת גְּדוֹלוֹת. בִּשְׁעַת סַכָּנָה, הוּא מִשְׁתַּמֵּשׁ בִּקְצֵה זְנָבוֹ כְּדֵי לַעֲקֹץ כָּל יְצוּר שֶׁמְּאַיֵּם עָלָיו. לָעַקְרָב יֵשׁ שְׁמוֹנֶה רַגְלַיִם. רֹב הָעַקְרַבִּים חַיִּים בַּמִּדְבָּר, אֲבָל יֵשׁ מִינֵי עַקְרַבִּים שֶׁחַיִּים בַּיְּעָרוֹת וּבֶהָרִים. הֵם אוֹכְלִים חֲרָקִים, וְיֵשׁ לָהֶם שִׁרְיוֹן נֻקְשֶׁה שֶׁמֵּגֵן עֲלֵיהֶם. בְּמֶשֶׁךְ הַיּוֹם הֵם יְשֵׁנִים מִתַּחַת לִסְלָעִים אוֹ מִתַּחַת לָאֲדָמָה, וְיוֹצְאִים לִפְעִילוּת בִּשְׁעוֹת הַלַּיְלָה."}, {"id": "סוּס-יָם (נִיבְתָן)", "display_name": "סוּס-יָם (נִיבְתָן)", "category": "animals", "text": "סוּס-הַיָּם הוּא בַּעַל-חַיִּים גָּדוֹל וְכָבֵד שֶׁחַי בַּמַּיִם הַקָּרִים שֶׁל אוֹקְיָנוֹס הַקֶּרַח הַצְּפוֹנִי, בְּאֵזוֹר הַקֹּטֶב. רֹב הַזְּמַן הוּא מְבַלֶּה בַּמַּיִם הַקְּפוּאִים וְעַל פְּנֵי הַקֶּרַח. בַּיַּבָּשָׁה הוּא אָמְנָם מְסֻרְבָּל, אֲבָל בַּמַּיִם הוּא שַׂחְיָן וְצוֹלְלָן מִמַּדְרֵגָה רִאשׁוֹנָה. סוּס-הַיָּם הוּא חוּם, יֵשׁ לוֹ שָׂפָם גָּדוֹל וּשְׁנֵי נִיבִים אֲרֻכִּים מְאוֹד. סוּסֵי-הַיָּם מִשְׁתַּמְּשִׁים בַּנִּיבִים שֶׁלָּהֶם כְּדֵי לְהָגֵן עַל עַצְמָם, וּכְדֵי לִשְׁלֹף אֶת עַצְמָם מִתּוֹךְ הַמַּיִם. הֵם חַיִּים בִּקְבוּצוֹת גְּדוֹלוֹת, וּמְטַפְּלִים בַּגּוּרִים שֶׁלָּהֶם."}, {"id": "לִוְיָתָן", "display_name": "לִוְיָתָן", "category": "animals", "text": "הַלִּוְיָתָן הוּא בַּעַל-חַיִּים עֲנָקִי שֶׁחַי בְּמֵי הַיָּם. הוּא שׂוֹחֶה בַּמַּיִם מַמָּשׁ כְּמוֹ דָּג, אֲבָל הַלִּוְיָתָן אֵינוֹ דָּג – אֶלָּא יוֹנֵק. הוּא לֹא נוֹשֵׁם מִתַּחַת לַמַּיִם: בִּקְצֵה רֹאשׁוֹ יֵשׁ חוֹר נְשִׁיפָה גָּדוֹל, שֶׁדַּרְכּוֹ הוּא נוֹשֵׁם וְנוֹשֵׁף אֲוִיר וּמַיִם. לִוְיְתָנִים חַיִּים בִּקְבוּצוֹת, מִתְיַדְּדִים זֶה עִם זֶה, וּשְׁנֵי הַהוֹרִים מְטַפְּלִים בַּגּוּרִים שֶׁלָּהֶם. לִוְיְתָנִים הֵם חֲכָמִים מְאוֹד וְאוֹהֲבִים לָשִׁיר. אֶפְשָׁר לִשְׁמֹעַ אֶת הַקּוֹלוֹת הַחֲזָקִים שֶׁלָּהֶם גַּם מִמֶּרְחָק רַב."}, {"id": "עֲטַלֵּף", "display_name": "עֲטַלֵּף", "category": "animals", "text": "הָעֲטַלֵּף הוּא בַּעַל-חַיִּים קָטָן עִם כְּנָפַיִם, שֶׁנִּרְאֶה כְּמוֹ עַכְבָּר מְעוֹפֵף. זֶהוּ הַיּוֹנֵק הַיְּחִידִי שֶׁמְּסֻגָּל לָעוּף. הָעֲטַלֵּפִים פְּעִילִים בַּלַּיְלָה וִישֵׁנִים בְּמֶשֶׁךְ הַיּוֹם – הֲפוּכִים, כְּשֶׁהָרֹאשׁ לְמַטָּה וְהָרַגְלַיִם לְמַעְלָה! כְּשֶׁעֲטַלֵּף מְעוֹפֵף בַּחֲשֵׁכָה, הוּא מִשְׁתַּמֵּשׁ בְּחוּשׁ הַשְּׁמִיעָה הַמְּצֻיָּן שֶׁלּוֹ כְּדֵי לָדַעַת לְאָן לִפְנוֹת. יֵשׁ עֲטַלֵּפִים שֶׁגָּרִים בִּמְעָרוֹת. רֹב הָעֲטַלֵּפִים אוֹכְלִים חֲרָקִים אוֹ פֵּרוֹת, אֲבָל יֵשׁ כָּאֵלֶּה שֶׁטּוֹרְפִים חַיּוֹת קְטַנּוֹת. מִין מְיֻחָד שֶׁל עֲטַלֵּף, שֶׁנִּקְרָא עֲטַלֵּף הָעַרְפָּד, נִזּוֹן אַךְ וְרַק מִדָּם!"}, {"id": "כֶּלֶב", "display_name": "כֶּלֶב", "category": "animals", "text": "הַכֶּלֶב הוּא יְדִידוֹ הַטּוֹב בְּיוֹתֵר שֶׁל הָאָדָם. אֲנָשִׁים רַבִּים מְגַדְּלִים כְּלָבִים כְּחַיּוֹת מַחְמָד, כִּי הֵם נֶאֱמָנִים וּמְלֵאֵי אַהֲבָה. הַכֶּלֶב הוּא חַיָּה מְבֻיֶּתֶת; זֹאת אוֹמֶרֶת שֶׁהוּא רָגִיל לִחְיוֹת בְּחֶבְרַת בְּנֵי אָדָם, שֶׁלֹּא כְּמוֹ חַיַּת בַּר. כְּלָבִים מִצְטַיְּנִים בְּחוּשׁ רֵיחַ מְפֻתָּח לְהַפְלִיא, וְהֵם מְתַקְשְׁרִים בֵּינֵיהֶם בְּעֶזְרַת נְבִיחוֹת וִילָלוֹת. כְּלָבִים עוֹזְרִים לָנוּ בִּדְרָכִים רַבּוֹת. לְמָשָׁל, יֵשׁ כַּלְבֵי נְחִיָּה מְיֻחָדִים, שֶׁעוֹזְרִים לָאֲנָשִׁים עִוְּרִים לְהַגִּיעַ מִמָּקוֹם לְמָקוֹם, וְגַם כְּלָבִים שֶׁעוֹזְרִים לַמִּשְׁטָרָה לִמְצֹא אֲנָשִׁים שֶׁהִיא מְחַפֶּשֶׂת!"}, {"id": "דּוֹלְפִין", "display_name": "דּוֹלְפִין", "category": "animals", "text": "הַדּוֹלְפִין הוּא בַּעַל-חַיִּים גָּדוֹל שֶׁחַי בַּיָּם. הוּא אָמְנָם שׂוֹחֶה בַּמַּיִם כְּמוֹ דָּג – אֲבָל הוּא יוֹנֵק, בְּדִיּוּק כְּמוֹ הַלִּוְיָתָן. הַדּוֹלְפִין הוּא אַחַד הַיְּצוּרִים הֲכִי פִּקְּחִיִּים בָּעוֹלָם. דּוֹלְפִינִים הֵם גַּם יְדִידוּתִיִּים מְאוֹד. הֵם אוֹהֲבִים לְנַתֵּר מֵעַל הַמַּיִם וּלְשַׂחֵק אֵלֶּה עִם אֵלֶּה, עִם חַיּוֹת אֲחֵרוֹת וַאֲפִלּוּ עִם בְּנֵי אָדָם. הַדּוֹלְפִינִים חַיִּים בִּקְבוּצוֹת וְאוֹכְלִים דָּגִים וּבַעֲלֵי חַיִּים קְטַנִּים אֲחֵרִים. כְּדֵי לְתַקְשֵׁר בֵּינֵיהֶם, הֵם מַשְׁמִיעִים שְׁרִיקוֹת וְקוֹלוֹת נְקִישָׁה מְיֻחָדִים."}, {"id": "גִ'ירָפָה", "display_name": "גִ'ירָפָה", "category": "animals", "text": "הַגִּ'ירָפָה הִיא הַחַיָּה הֲכִי גְּבוֹהָה בָּעוֹלָם. יֵשׁ לָהּ צַוָּאר אָרֹךְ מְאוֹד, רַגְלַיִם אֲרֻכּוֹת, לָשׁוֹן אֲרֻכָּה וְקַרְנַיִם קְטַנּוֹת, וְהַגּוּף שֶׁלָּהּ מָלֵא כְּתָמִים חוּמִים. הַגִּ'ירָפוֹת חַיּוֹת בְּאַפְרִיקָה וְאוֹכְלוֹת עָלִים מִצַּמָּרוֹת שֶׁל עֵצִים גְּבוֹהִים, שֶׁשּׁוּם חַיָּה אַחֶרֶת לֹא מְסֻגֶּלֶת לְהַגִּיעַ אֲלֵיהֶם. הַגִּ'ירָפוֹת כִּמְעַט אַף פַּעַם לֹא מַפְסִיקוֹת לַעֲמֹד עַל הָרַגְלַיִם – הֵן אֲפִלּוּ יְשֵׁנוֹת בַּעֲמִידָה! כְּשֶׁגִּ'ירָפָה רוֹצָה לִשְׁתּוֹת, הִיא צְרִיכָה לַעֲמֹד בְּפִשּׂוּק רָחָב מְאוֹד אוֹ לְכוֹפֵף אֶת הַבִּרְכַּיִם כְּדֵי לְהַגִּיעַ עַד לַמַּיִם."}, {"id": "הִיפּוֹפּוֹטָם", "display_name": "הִיפּוֹפּוֹטָם", "category": "animals", "text": "הַהִיפּוֹפּוֹטָם הוּא בַּעַל-חַיִּים גָּדוֹל וְכָבֵד. יֵשׁ לוֹ פֶּה עֲנָקִי וְרַגְלַיִם קְצָרוֹת. הוּא חַי בְּאַפְרִיקָה וּמְבַלֶּה רֹב הַיּוֹם בַּמַּיִם. כְּשֶׁהַשֶּׁמֶשׁ שׁוֹקַעַת, הוּא יוֹצֵא מֵהַמַּיִם לֶאֱכֹל עֵשֶׂב. הָאָזְנַיִם שֶׁל הַהִיפּוֹפּוֹטָם, וְגַם הָעֵינַיִם וְהַנְּחִירַיִם שֶׁלּוֹ, נִמְצָאִים בַּקָּצֶה הָעֶלְיוֹן שֶׁל רֹאשׁוֹ. לָכֵן הוּא יָכוֹל לְהַשְׁאִיר אוֹתָם בַּחוּץ כְּשֶׁהוּא שׁוֹקֵעַ כֻּלּוֹ מִתַּחַת לַמַּיִם, כּוֹלֵל הָרֹאשׁ. הַהִיפּוֹפּוֹטָם יָכֹל לִישׁוֹן מִתַּחַת לַמַּיִם: כְּשֶׁהוּא זָקוּק לַאֲוִיר, הוּא מוֹצִיא אֶת הַנְּחִירַיִם שֶׁלּוֹ מֵהַמַּיִם מִתּוֹךְ שֵׁנָה, בְּלִי לְהִתְעוֹרֵר אֲפִלּוּ!"}, {"id": "מֶדוּזָה", "display_name": "מֶדוּזָה", "category": "animals", "text": "הַמֶּדוּזָה הִיא יְצוּר יַמִּי מוּזָר שֶׁנִּרְאֶה כְּמוֹ מִטְרִיָּה אוֹ פִּטְרִיָּה. יֵשׁ לָהּ גּוּף רַךְ וּזְרוֹעוֹת צַיִד, שֶׁנִּרְאוֹת כְּמוֹ חוּטִים דַּקִּים וַאֲרֻכִּים. לַמֶּדוּזָה אֵין פָּנִים וְגַם לֹא מוֹחַ, וַאֲפִלּוּ לֹא לֵב! גַּם עֲצָמוֹת אֵין לָהּ. יֵשׁ מֶדוּזוֹת שְׁקוּפוֹת וְיֵשׁ צִבְעוֹנִיּוֹת. רֹב הַמֶּדוּזוֹת הֵן אַרְסִיּוֹת וְהַצְּרִיבָה שֶׁלָּהֶן מַכְאִיבָה מְאוֹד."}, {"id": "אַרְיֵה", "display_name": "אַרְיֵה", "category": "animals", "text": "הָאַרְיֵה הוּא בַּעַל-חַיִּים פִּרְאִי שֶׁשַּׁיָּךְ לְמִשְׁפַּחַת הַחֲתוּלִיִּים. הוּא חַי בְּאַפְרִיקָה וּבְאַסְיָה. הָרֹאשׁ שֶׁלּוֹ עָטוּר רַעֲמָה יְפֵהפִיָּה כְּמוֹ כֶּתֶר, וְרַבִּים קוֹרְאִים לוֹ \"מֶלֶךְ הַחַיּוֹת\". אֲרָיוֹת שׁוֹאֲגִים בְּקוֹל חָזָק מְאוֹד שֶׁנִּשְׁמָע לַמֶּרְחַקִּים. הֵם חַיִּים בִּקְבוּצוֹת וְצָדִים חַיּוֹת אֲחֵרוֹת לְמַאֲכָל. הַזָּכָר הוּא עַצְלָן גָּדוֹל. רֹב הַיּוֹם הוּא מְבַלֶּה בְּשֵׁנָה, וּמַעֲדִיף שֶׁהַלְּבִיאָה – הַנְּקֵבָה שֶׁל הָאַרְיֵה – תֵּצֵא לַצַּיִד בְּעַצְמָהּ: אַחֲרֵי הַכֹּל, הִיא צַיֶּדֶת הַרְבֵּה יוֹתֵר טוֹבָה מִמֶּנּוּ!"}, {"id": "תְּמָנוּן", "display_name": "תְּמָנוּן", "category": "animals", "text": "הַתְּמָנוּן הוּא יְצוּר בַּעַל שְׁמוֹנֶה זְרוֹעוֹת וּפֶה דְּמוּי מַקּוֹר, שֶׁחַי בְּמֵי הַיָּם. גּוּפוֹ שֶׁל הַתְּמָנוּן רַךְ וְגָמִישׁ, כִּי אֵין לוֹ בִּכְלָל עֲצָמוֹת. לָכֵן תְּמָנוּנִים יְכוֹלִים לְהִדָּחֵק לְתוֹךְ מְקוֹמוֹת צָרִים בִּמְיֻחָד. הַתְּמָנוּן הוּא פִּקֵּחַ וְיֵשׁ לוֹ זִכָּרוֹן מְצֻיָּן. יֵשׁ לוֹ דְּרָכִים רַבּוֹת לְהָגֵן עַל עַצְמוֹ: חֵלֶק מֵהַתְּמָנוּנִים מְסֻגָּלִים לְשַׁנּוֹת אֶת צִבְעָם, אֲחֵרִים יוֹרִים עָנָן שֶׁל דְּיוֹ כֵּהֶה שֶׁמַּסְתִּיר אוֹתָם מֵעֵין רוֹאִים, וְיֵשׁ בֵּינֵיהֶם כָּאֵלֶּה שֶׁמְּסֻגָּלִים לְהִתְחַפֵּשׂ לִיצוּרִים אֲחֵרִים לְגַמְרֵי!"}, {"id": "זְאֵב", "display_name": "זְאֵב", "category": "animals", "text": "הַזְּאֵב הוּא בַּעַל-חַיִּים פִּרְאִי וְיָפֶה מִמִּשְׁפַּחַת הַכַּלְבִּיִּים, וְהוּא נָפוֹץ בִּמְקוֹמוֹת רַבִּים בְּרַחֲבֵי הָעוֹלָם. זְאֵבִים חַיִּים בִּלְהָקוֹת. לַהֲקָה שֶׁל זְאֵבִים כּוֹלֶלֶת מִשְׁפָּחָה וּבָהּ שְׁנֵי הוֹרִים, שֶׁהֵם הַמַּנְהִיגִים שֶׁל הַלַּהֲקָה, עִם הַגּוּרִים שֶׁלָּהֶם, וְלִפְעָמִים גַּם זְאֵבִים נוֹסָפִים. חַבְרֵי הַלַּהֲקָה מְשׁוֹטְטִים יַחַד, מְגַדְּלִים יַחַד אֶת הַגּוּרִים וְיוֹצְאִים יַחַד לָצוּד טֶרֶף."}, {"id": "זֶבְּרָה", "display_name": "זֶבְּרָה", "category": "animals", "text": "הַזֶּבְּרָה הִיא חַיָּה מְפֻרְסֶמֶת שֶׁנִּרְאֵית כְּמוֹ סוּס בְּפִּיגָ'מָה, כִּי כָּל גּוּפָהּ מְכֻסֶּה פַּסִּים שְׁחוֹרִים וּלְבָנִים. לְכָל זֶבְּרָה יֵשׁ סִדּוּר פַּסִּים שׁוֹנֶה, שֶׁמְּיֻחָד רַק לָהּ. אַף אֶחָד לֹא יוֹדֵעַ מַדּוּעַ וְלָמָּה לוֹבֶשֶׁת הַזֶּבְּרָה פִּיגָ'מָה, אוֹ מַהִי בְּדִיּוּק הַסִּבָּה שֶׁיֵּשׁ לָהּ פַּסִּים. יֵשׁ אוֹמְרִים שֶׁהִיא מִשְׁתַּמֶּשֶׁת בַּפַּסִּים לְהַסְוָאָה, כְּדֵי לְבַלְבֵּל אֶת הָאוֹיֵב, וְאוּלַי אֲפִלּוּ כְּדֵי לְהַרְחִיק זְבוּבִים! הַזֶּבְּרוֹת חַיּוֹת בְּאַפְרִיקָה. הֵן אוֹכְלוֹת עֵשֶׂב וְחַיּוֹת בַּעֲדָרִים. כְּשֶׁחַיּוֹת אֲחֵרוֹת רוֹדְפוֹת אַחֲרֵיהֶן, הַזֶּבְּרוֹת בּוֹרְחוֹת בְּזִיגְזָגִים."}, {"id": "חָגָב", "display_name": "חָגָב", "category": "animals", "text": "הֶחָגָב הוּא חֶרֶק גָּדוֹל שֶׁמּוֹפִיעַ בְּכָל מִינֵי צְבָעִים. לַחֲגָבִים יֵשׁ עֵינַיִם גְּדוֹלוֹת, אַרְבַּע כְּנָפַיִם וְשֵׁשׁ רַגְלַיִם. הָרַגְלַיִם הָאֲחוֹרִיּוֹת שֶׁל הֶחָגָב אֲרֻכּוֹת מְאוֹד, וְהוּא מִשְׁתַּמֵּשׁ בָּהֶן כְּדֵי לְנַתֵּר וְלִקְפֹּץ. חֲגָבִים מְסֻגָּלִים לִקְפֹּץ לְמֶרְחָק שֶׁגָּדוֹל מֵאֹרֶךְ גּוּפָם פִּי עֶשְׂרִים! הַחֲגָבִים אוֹכְלִים צְמָחִים. לִפְעָמִים הֵם מַזִּיקִים לַשָּׂדוֹת ולַגִּדּוּלִים שֶׁל הַחַקְלָאִים. כְּדֵי לְהַשְׁמִיעַ קוֹל, הֶחָגָב מְשַׁפְשֵׁף אֶת רַגְלָיו הָאֲחוֹרִיּוֹת בַּכְּנָפַיִם הַקִּדְמִיּוֹת שֶׁלּוֹ. תּוּכְלוּ לְנַחֵשׁ אֵיפֹה הָאָזְנַיִם שֶׁלּוֹ? בְּצִדֵּי הַבֶּטֶן!"}, {"id": "אִיגוּאָנָה", "display_name": "אִיגוּאָנָה", "category": "animals", "text": "הָאִיגוּאָנָה הִיא לְטָאָה גְּדוֹלָה וִירַקְרַקָּה שֶׁחַיָּה בְּאָמֶרִיקָה הַדְּרוֹמִית וְהַמֶּרְכָּזִית. יֵשׁ לָהּ זָנָב אָרֹךְ, שִׁנַּיִם וְצִפָּרְנַיִם חַדּוֹת, וְשׁוּרָה שֶׁל קַשְׂקַשִּׂים קוֹצָנִיִּים עַל הַגַּב. אִיגוּאָנוֹת אוֹהֲבוֹת לִחְיוֹת עַל עֵצִים שֶׁצּוֹמְחִים לְיַד מַיִם, וְלֶאֱכֹל פֵּרוֹת וְעָלִים. הֵן גַּם קְ
