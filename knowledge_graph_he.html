ם: קֶטְשׁוֹפּ, מָיוֹנֶז, חַרְדָּל אוֹ רֹטֶב בַּרְבִּיקְיוּ."}, {"id": "מְרַק מִיסוֹ", "display_name": "מְרַק מִיסוֹ", "category": "traditional_food", "text": "מְרַק מיסוֹ הוּא תַּבְשִׁיל יָדוּעַ מֵהַמִּטְבָּח הַיַּפָּנִי. זֶהוּ מָרָק שֶׁנּוֹצַר מֵעִרְבּוּב שֶׁל דַאשִׁי - מָרָק יַפָּנִי בְּסִיסִי שֶׁעָשׂוּי מִדָּגִים, פִּטְרִיּוֹת אוֹ אַצּוֹת - יַחַד עִם מִשְׁחָה בְּשֵׁם מיסוֹ, שֶׁעֲשׂוּיָה מִפּוֹלֵי סוֹיָה, פִּטְרִיּוֹת וּמֶלַח. בְּיַפָּן אוֹכְלִים מְרַק מיסוֹ לַאֲרוּחַת בֹּקֶר, בְּתוֹסֶפֶת אֹרֶז לָבָן. הַיַּפָּנִים שׁוֹתִים אֶת מְרַק הַמיסוֹ יָשָׁר מִתּוֹךְ קַעֲרִיּוֹת עֲמֻקּוֹת, כְּמוֹ שֶׁשּׁוֹתִים מִכּוֹס, וּמִשְׁתַּמְּשִׁים בְּמַקְּלוֹת-אֲכִילָה כְּדֵי לִגְרֹף אֶת הַתֹּכֶן הַמּוּצָק מִתּוֹךְ הַמָּרָק."}, {"id": "מוּסָקָה", "display_name": "מוּסָקָה", "category": "traditional_food", "text": "מוּסָקָה הִיא מַאֲכָל בְּשָׂרִי מֵאֵזוֹר בְּאֵירוֹפָּה שֶׁנִּקְרָא חֶבֶל הַבַּלְקָן. אֶפְשָׁר לִמְצֹא מוּסָקָה גַּם בְּמִטְבָּחִים שֶׁל אֲרָצוֹת אֲחֵרוֹת, כְּמוֹ טוּרְקְיָה וְאַרְצוֹת עֲרָב. לְכָל מָקוֹם דֶּרֶךְ מְיֻחֶדֶת מִשֶּׁלּוֹ לְהָכִין מוּסָקָה, אֲבָל הַמְּפֻרְסֶמֶת מִכֻּלָּן הִיא הַמּוּסָקָה הַיְּוָנִית: הִיא עֲשׂוּיָה מִשְּׁכָבוֹת שֶׁל חָצִיל וּבָשָׂר טָחוּן עִם עַגְבָנִיּוֹת וְתַבְלִינִים, וּמְצֻפָּה בְּרֹטֶב מְיֻחָד שֶׁמְּכִינִים מֵחָלָב וּמִקֶּמַח."}, {"id": "פַּבְלוֹבָה", "display_name": "פַּבְלוֹבָה", "category": "traditional_food", "text": "פַּבְלוֹבָה הִיא קִנּוּחַ מָתוֹק וְטָעִים שֶׁמַּגִּיעַ מֵאוֹסְטְרַלְיָה וּנְיוּ-זִילַנְד. הוּא נִקְרָא עַל-שֵׁם רַקְדָנִית בָּלֶט רוּסִיָּה מְפֻרְסֶמֶת, שֶׁבִּקְּרָה בִּשְׁתֵּי הָאֲרָצוֹת הָאֵלֶּה לִפְנֵי כִּמְעַט מֵאָה שָׁנָה. הַפַּבְלוֹבָה פְּרִיכָה מִבַּחוּץ וְרַכָּה מִבִּפְנִים, וְהִיא עֲשׂוּיָה מִקֶּצֶף שֶׁל חֶלְבּוֹנֵי בֵּיצִים וְסֻכָּר. הַפַּבְלוֹבָה מֻגֶּשֶׁת בְּתוֹסֶפֶת קַצֶּפֶת וּפֵרוֹת טְרִיִּים - בְּדֶרֶךְ-כְּלָל פֵּרוֹת יַעַר, וְלִפְעָמִים גַּם פֵּרוֹת אֲחֵרִים."}, {"id": "פִּיצָה", "display_name": "פִּיצָה", "category": "traditional_food", "text": "פִּיצָה הִיא מַאֲפֶה אִיטַלְקִי שֶׁאוֹהֲבִים לֶאֱכֹל בְּכָל רַחֲבֵי הָעוֹלָם. בְּדֶרֶךְ כְּלָל הַפִּיצָה עֲשׂוּיָה מִבָּצֵק שָׁטוּחַ וּמְעֻגָּל, מָרוּחַ בְּרֹטֶב עַגְבָנִיּוֹת וּמְצֻפֶּה בִּגְבִינָה. אֶת הַפִּיצָה מְכִינִים בְּפִּיצֶרִיָּה, וְלָרֹב חוֹתְכִים אוֹתָהּ לִפְרוּסוֹת מְשֻׁלָּשׁוֹת. אֶפְשָׁר לָשִׂים עַל הַפִּיצָה כִּמְעַט כָּל תּוֹסֶפֶת שֶׁתּוּכְלוּ לַחְשֹׁב עָלֶיהָ. יֵשׁ פִּיצוֹת מִבָּצֵק עָבֶה אוֹ דַּק, פִּיצוֹת עִם פִּטְרִיּוֹת וְזֵיתִים וְעִם כָּל מִינֵי גְּבִינוֹת, וְיֵשׁ אֲפִלּוּ מְקוֹמוֹת שֶׁמַּגִּישִׁים פִּיצָה בְּלִי גְּבִינָה בִּכְלָל!"}, {"id": "רִיזוֹטוֹ", "display_name": "רִיזוֹטוֹ", "category": "traditional_food", "text": "רִיזוֹטוֹ הוּא תַּבְשִׁיל אִיטַלְקִי מֵאֹרֶז לָבָן עָגֹל. הַשֵּׁם \"רִיזוֹטוֹ\" בָּא מֵהַמִּלָּה הָאִיטַלְקִית \"רִיזוֹ\", שֶׁפֵּרוּשָׁהּ אֹרֶז. יֵשׁ הַרְבֵּה מַתְכּוֹנִים לַהֲכָנַת רִיזוֹטוֹ, אֲבָל כִּמְעַט בְּכֻלָּם צָרִיךְ קֹדֶם לְבַשֵּׁל אֶת הָאֹרֶז עִם בָּצָל בְּחֶמְאָה אוֹ בְּשֶׁמֶן זַיִת, וְאָז לְהוֹסִיף בְּאִטִּיּוּת נוֹזְלִים, תּוֹךְ כְּדֵי עִרְבּוּב. רִיזוֹטוֹ הוּא קְצָת יוֹתֵר דָּבִיק וְלַח מֵאֹרֶז רָגִיל. אִיטַלְקִים אוֹכְלִים רִיזוֹטוֹ לִפְנֵי הַמָּנָה הָעִקָּרִית בָּאֲרוּחָה."}, {"id": "סְפָּגֶטִי", "display_name": "סְפָּגֶטִי", "category": "traditional_food", "text": "סְפָּגֶטִי הוּא פַּסְטָה בְּצוּרַת אִטְרִיּוֹת אֲרֻכּוֹת וְדַקּוֹת. כְּמוֹ כָּל סוּגֵי הַפַּסְטָה, גַּם סְפָּגֶטִי הוּא מַאֲכָל אִיטַלְקִי. סְפָּגֶטִי עָשׂוּי מִקֶּמַח חִטָּה וּמַיִם, וְאוֹכְלִים אוֹתוֹ בְּתוֹסֶפֶת כָּל מִינֵי רְטָבִים – כְּמוֹ רֹטֶב עַגְבָנִיּוֹת, שֶׁמֶן זַיִת, שַׁמֶּנֶת אוֹ רֹטֶב בּוֹלוֹנֶז, שֶׁמְּכִינִים מִבָּשָׂר טָחוּן וְרֶסֶק עַגְבָנִיּוֹת. אִם אַתֶּם לֹא רוֹצִים בָּלָגָן וְלִכְלוּךְ בָּאֲרוּחָה, כְּדַאי לָכֶם לְלַפֵּף אֶת הַסְּפָּגֶטִי שֶׁלָּכֶם סְבִיב הַמַּזְלֵג לִפְנֵי שֶׁאַתֶּם מַכְנִיסִים אוֹתוֹ לַפֶּה!"}, {"id": "סוּשִׁי", "display_name": "סוּשִׁי", "category": "traditional_food", "text": "סוּשִׁי הוּא מָנָה קְטַנָּה מֵהַמִּטְבָּח הַיַּפָּנִי. מְכִינִים אוֹתוֹ מֵאֹרֶז מְיֻחָד שֶׁמְּבֻשָּׁל בְּחֹמֶץ וּמְמֻלָּא בְּדָגִים נָאִים אוֹ בִּירָקוֹת. יֵשׁ הַרְבֵּה סוּגִים שׁוֹנִים שֶׁל סוּשִׁי; חֵלֶק מֵהַסּוּגִים עֲטוּפִים בְּאַצּוֹת אוֹ בְּטוֹפוּ, שֶׁעָשׂוּי מִפּוֹלֵי סוֹיָה. אוֹכְלִים סוּשִׁי בְּתוֹסֶפֶת רֹטֶב סוֹיָה, פְּרוּסוֹת זַנְגְּוִיל וּמִמְרַח וַּסָאבִּי, שֶׁהוּא חָרִיף מְאוֹד. לִפְעָמִים אוֹכְלִים אוֹתוֹ בְּעֶזְרַת מַקְּלוֹת אֲכִילָה וְלִפְעָמִים בָּאֶצְבָּעוֹת - תָּלוּי אֵיזֶה סוּשִׁי יֵשׁ בַּצַּלַּחַת."}, {"id": "טַאקוֹ", "display_name": "טַאקוֹ", "category": "traditional_food", "text": "טַאקוֹ הוּא מָנָה מֵהַמִּטְבָּח הַמֶּקְסִיקָנִי. הוּא עָשׂוּי מִטּוֹרְטִיָּה - שֶׁהִיא לֶחֶם שָׁטוּחַ מִקֶּמַח תִּירָס אוֹ חִטָּה - מְקֻפֶּלֶת וּמְמֻלֵּאת בְּמַאֲכָלִים שׁוֹנִים: בָּשָׂר, עוֹף, פֵּרוֹת יָם, גְּבִינָה וִירָקוֹת. גַּם בְּאַרְצוֹת הַבְּרִית וּבִמְדִינוֹת אֲחֵרוֹת אוֹהֲבִים לֶאֱכֹל טַאקוֹ. אוֹכְלִים אוֹתוֹ כְּמוֹ שֶׁאוֹכְלִים כָּרִיךְ, וְאֶפְשָׁר לְהוֹסִיף לוֹ רֹטֶב סַלְסָה, יְרָקוֹת טְרִיִּים, פֶּטְרוֹזִילְיָה, שַׁמֶּנֶת חֲמוּצָה וּגְוַּאקָמוֹלִי, שֶׁהוּא מִטְבָּל אָבוֹקָדוֹ מֶקְסִיקָנִי."}, {"id": "פָלָאפֶל", "display_name": "פָלָאפֶל", "category": "traditional_food", "text": "פָלָאפֶל הוּא כַּדּוּר שֶׁעָשׂוּי מִגַּרְגְּרֵי חוּמוּס טְחוּנִים עִם פֶּטְרוֹזִילְיָה וְתַבְלִינִים. לָרֹב מְטַגְּנִים אֶת הַפָלָאפֶל בְּשֶׁמֶן עָמֹק. פָלָאפֶל הוּא הַמַּאֲכָל הַלְּאֻמִּי בְּיִשְׂרָאֵל, אִם כִּי אוֹכְלִים אוֹתוֹ גַּם בְּאַרְצוֹת עֲרָב – וְהוּא הִגִּיעַ כַּנִּרְאֶה מִמִּצְרַיִם, וְאוּלַי בִּכְלָל מֵהֹדּוּ! הֲכִי כֵּיף לִדְחֹס כַּמָּה כַּדּוּרֵי פָלָאפֶל לְתוֹךְ פִּתָּה, בְּתוֹסֶפֶת טְחִינָה וְסָלַט יְרָקוֹת חָתוּךְ דַּק, וְלֶאֱכֹל בְּתֵאָבוֹן."}, {"id": "חוּמוּס", "display_name": "חוּמוּס", "category": "traditional_food", "text": "חוּמוּס הוּא מִמְרָח פּוֹפּוּלָרִי מֵהַמִּטְבָּח הָעֲרָבִי. הוּא עָשׂוּי מִתַּעֲרֹבֶת שֶׁל גַּרְגְּרֵי חוּמוּס מְבֻשָּׁלִים וּמְעוּכִים עִם טְחִינָה, מִיץ לִימוֹן, שׁוּם, תַּבְלִינִים וְשֶׁמֶן זַיִת. אֶפְשָׁר לֶאֱכֹל חוּמוּס כְּמִמְרָח עִקָּרִי עַל לֶחֶם אוֹ כְּתוֹסֶפֶת לְפָלָאפֶל, לְקַבַּאבּ וְכִמְעַט לְכָל מָנָה אַחֶרֶת – אֲבָל הֲכִי כֵּיף לְנַגֵּב חוּמוּס מֵהַצַּלַּחַת בְּעֶזְרַת פִּתָּה. חוּמוּס טָרִי הוּא לֹא רַק טָעִים, אֶלָּא גַּם בָּרִיא!"}, {"id": "קַבַּאבּ", "display_name": "קַבַּאבּ", "category": "traditional_food", "text": "קַבַּאבּ הוּא קְצִיצָה אֲרֻכָּה מִבָּשָׂר טָחוּן – לָרֹב בְּשַׂר טָלֶה אוֹ כֶּבֶשׂ, אֲבָל לִפְעָמִים בָּקָר – מְעֻרְבָּב עִם בָּצָל, פֶּטְרוֹזִילְיָה וְתַבְלִינִים. בַּמָּקוֹר הִגִּיעָה הַמָּנָה מִפָּרָס וּמֵאַרְצוֹת עֲרָב, אֲבָל כַּיּוֹם אוֹכְלִים אוֹתָהּ בְּכָל רַחֲבֵי הָעוֹלָם, בִּשְׁלַל צוּרוֹת וּגְדָלִים. בְּדֶרֶךְ כְּלָל צוֹלִים אֶת הַקַּבַּאבּ בַּגְּרִיל עַל שִׁפּוּד. אוֹכְלִים אוֹתוֹ בְּתוֹךְ פִּתָּה אוֹ בְּצַלַּחַת, לִפְעָמִים בְּתוֹסֶפֶת אֹרֶז לָבָן."}, {"id": "חְרַיְמֶה", "display_name": "חְרַיְמֶה", "category": "traditional_food", "text": "חְרַיְמֶה הוּא תַּבְשִׁיל שֶׁל דָּג בְּרֹטֶב עַגְבָנִיּוֹת חָרִיף מֵהַמִּטְבָּח הַצְּפוֹן-אַפְרִיקָאִי. הַחְרַיְמֶה הִגִּיעַ לְיִשְׂרָאֵל עִם יְהוּדִים שֶׁבָּאוּ אַרְצָה מִצְּפוֹן אַפְרִיקָה, וְהַיּוֹם זֶהוּ אַחַד הַמַּאֲכָלִים הָאֲהוּבִים עַל הַיִּשְׂרְאֵלִים. רַבִּים נוֹהֲגִים לֶאֱכֹל חְרַיְמֶה בְּעֶרֶב שַׁבָּת עִם חַלָּה טְרִיָּה, שֶׁטּוֹבְלִים אוֹתָהּ בְּרֹטֶב הָעַגְבָנִיּוֹת. כְּשֶׁאוֹכְלִים חְרַיְמֶה, אָסוּר לִשְׁכֹּחַ לְהַנִּיחַ עַל הַשֻּׁלְחָן כּוֹס מַיִם קָרִים, כִּי לְעִתִּים קְרוֹבוֹת הַתַּבְשִׁיל הַזֶּה חָרִיף מְאוֹד!"}, {"id": "גֶּפִילְטֶע פִישׁ", "display_name": "גֶּפִילְטֶע פִישׁ", "category": "traditional_food", "text": "גֶּפִילְטֶע פִישׁ הוּא מַאֲכָל יְהוּדִי-אַשְׁכְּנַזִּי, שֶׁהִגִּיעַ לְיִשְׂרָאֵל עִם הָעוֹלִים מֵאֵירוֹפָּה. בְּיִידִישׁ, שְׂפָתָם שֶׁל רֹב יְהוּדֵי אֵירוֹפָּה, פֵּרוּשׁ הַשֵּׁם הוּא \"דָּג מְמֻלָּא\". יֵשׁ שֶׁמְּכִינִים אוֹתוֹ בְּצוּרַת פְּרוּסוֹת שֶׁל דָּג עִם מִלּוּי, אֲבָל רַבִּים טוֹחֲנִים אֶת בְּשַׂר הַדָּג וְהוֹפְכִים אוֹתוֹ לִקְצִיצָה. רַבִּים מַעֲדִיפִים גֶּפִילְטֶע פִישׁ בְּטַעַם מְתַקְתַּק, וַאֲחֵרִים מַעֲדִיפִים דַּוְקָא תִּבּוּל חָרִיף. לָרֹב מַנִּיחִים עַל הַקְּצִיצָה פְּרוּסַת גֶּזֶר מְבֻשָּׁל וּמַגִּישִׁים עִם חֲזֶרֶת אֲדֻמָּה. נָהוּג לֶאֱכֹל גֶּפִילְטֶע פִישׁ בְּעִקָּר בְּחַגִּים, כְּמוֹ רֹאשׁ הַשָּׁנָה וּפֶסַח."}, {"id": "אִינְגְ'רָה", "display_name": "אִינְגְ'רָה", "category": "traditional_food", "text": "אִינְגְ'רָה הִיא מַאֲפֶה שָׁטוּחַ, גָּדוֹל וְעָגֹל מֵהַמִּטְבָּח הָאֶתְיוֹפִּי. טָעֲמָה חֲמַצְמַץ וְעָדִין, וְהָעוֹלִים מֵאֶתְיוֹפְּיָה אוֹכְלִים אוֹתָהּ כִּמְעַט כָּל יוֹם גַּם בָּאָרֶץ. הָאִינְגְ'רָה עֲשׂוּיָה מִדָּגָן מְיֻחָד בַּשֵּׁם \"טֶף\", שֶׁצּוֹמֵחַ בְּעִקָּר בְּאֶתְיוֹפְּיָה. אֶפְשָׁר לְהִשְׁתַּמֵּשׁ בָּאִינְגְ'רָה כְּמוֹ בְּצַלַּחַת וְסַכּוּ\"ם: מַנִּיחִים עָלֶיהָ תַּבְשִׁילִים וְסָלָטִים, וְאוֹכְלִים אוֹתָם בְּעֶזְרַת חֲתִיכוֹת שֶׁקּוֹרְעִים מֵהַמַּאֲפֶה! הַחֵלֶק הָעֶלְיוֹן שֶׁל הָאִינְגְ'רָה מְנֻקָּד בַּהֲמוֹן שְׁקָעִים קְטַנִּים, שֶׁהָאֶתְיוֹפִּים קוֹרְאִים לָהֶם \"עֵינַיִם\"."}, {"id": "בַּקְלַאוָּה", "display_name": "בַּקְלַאוָּה", "category": "traditional_food", "text": "בַּקְלַאוָּה הִיא מַאֲפֶה קָטָן וּמָתוֹק מְאוֹד שֶׁעָשׂוּי מִבָּצֵק דַּק, מְמֻלָּא אֱגוֹזִים וּשְׁקֵדִים אוֹ פִיסְטוּקִים טְחוּנִים, וְאָפוּי בִּדְבַשׁ וְחֶמְאָה. אֶפְשָׁר לְהָכִין בַּקְלַאוָּה בְּצוּרוֹת שׁוֹנוֹת - מְגֻלְגֶּלֶת לְגָלִיל אוֹ חֲתוּכָה לִמְשֻׁלָּשִׁים וְלִמְעֻיָּנִים. זֶהוּ קִנּוּחַ אָהוּב בַּאֲרָצוֹת רַבּוֹת בָּעוֹלָם, כְּמוֹ טוּרְקְיָה, יָוָן וּמְדִינוֹת עֲרָב, וְנָפוֹץ מְאוֹד גַּם בְּיִשְׂרָאֵל. אֲנָשִׁים אָכְלוּ בַּקְלַאוָּה כְּבָר לִפְנֵי אַלְפֵי שָׁנִים, וְהִיא נֶחְשְׁבָה לְמַעֲדַן מְלָכִים אֵצֶל הַסֻּלְטָאנִים בְּטוּרְקְיָה."}, {"id": "כְּנַאפֶה", "display_name": "כְּנַאפֶה", "category": "traditional_food", "text": "כְּנַאפֶה הִיא קִנּוּחַ חַם וּמָתוֹק מֵהַמִּטְבָּח הָעַרְבִי. כְּנַאפֶה עֲשׂוּיָה מֵאִטְרִיּוֹת דַּקִּיקוֹת בַּשֵּׁם \"קָדָאִיף\" וּמִגְּבִינַת עִזִּים, שֶׁאוֹפִים אוֹתָן יַחַד בְּתַבְנִית עֲנָקִית. אֶפְשָׁר לְהָכִין כְּנַאפֶה בְּצוּרַת עוּגָה רְחָבָה אוֹ בִּגְלִילִים קְטַנִּים כְּמוֹ אֶצְבָּעוֹת. בְּיִשְׂרָאֵל מַגִּישִׁים כְּנַאפֶה טְעִימָה מְאוֹד בִּמְקוֹמוֹת כְּמוֹ נָצְרַת, יָפוֹ, חֵיפָה וּמִזְרַח יְרוּשָׁלַיִם. מֻסְלְמִים רַבִּים אוֹהֲבִים לֶאֱכֹל כְּנַאפֶה בְּמַהֲלַךְ חַג הָרַמַדָאן - חֹדֶשׁ שֶׁבּוֹ אָסוּר לֶאֱכֹל בְּמֶשֶׁךְ הַיּוֹם, אֶלָּא רַק לִפְנֵי זְרִיחַת הַשֶּׁמֶשׁ אוֹ אַחֲרֵי שֶׁהִיא שׁוֹקַעַת."}, {"id": "אַרְגֶּנְטִינָה", "display_name": "אַרְגֶּנְטִינָה", "category": "countries", "text": "אַרְגֶּנְטִינָה הִיא הַמְּדִינָה הַשְּׁנִיָּה בְּגָדְלָהּ בְּיַבֶּשֶׁת אָמֶרִיקָה הַדְּרוֹמִית. מַפְּלֵי אִיגוּאַסוּ, שֶׁהֵם מֵהַמַּפָּלִים הַיָּפִים בְּיוֹתֵר בָּעוֹלָם, נִמְצָאִים בְּאַרְגֶּנְטִינָה. הַבִּירָה שֶׁל אַרְגֶּנְטִינָה, בּוּאֶנוֹס אַיְרֶס, הִיא אַחַת הֶעָרִים הֲכִי גְּדוֹלוֹת בָּעוֹלָם. בְּאַרְגֶּנְטִינָה מְנַגְּנִים הֲמוֹן מוּזִיקָה, וּמִשָּׁם הִגִּיעַ הָרִקּוּד הַזּוּגִי הַמְּפֻרְסָם שֶׁנִּקְרָא טַנְגּוֹ. הָאַרְגֶּנְטִינָאִים אוֹהֲבִים כַּדּוּרֶגֶל וְהַמַּאֲכָל הַמָּסָרְתִּי שֶׁלָּהֶם הוּא בָּשָׂר צָלוּי עַל הָאֵשׁ, שֶׁנִּקְרָא אָסָאדוֹ. פַּעַם בְּשָׁנָה, הָאַרְגֶּנְטִינָאִים חוֹגְגִים חַג מְיֻחָד שֶׁנִּקְרָא \"יוֹם הַיְּדִידוּת\", וּבוֹ הֵם מַעֲנִיקִים מַתָּנוֹת לַיְּדִידִים שֶׁלָּהֶם."}, {"id": "בְּרָזִיל", "display_name": "בְּרָזִיל", "category": "countries", "text": "בְּרָזִיל הִיא הַמְּדִינָה הֲכִי גְּדוֹלָה בִּדְרוֹם אָמֶרִיקָה, וְהַמְּדִינָה הַחֲמִישִׁית בְּגָדְלָהּ בָּעוֹלָם. בְּרָזִיל מְכֻסָּה בְּיַעֲרוֹת גֶּשֶׁם, וּבָהּ זוֹרֵם אַחַד הַנְּהָרוֹת הָאֲרֻכִּים בְּיוֹתֵר בָּעוֹלָם – נְהַר הָאָמָזוֹנָס. בְּכָל שָׁנָה חוֹגְגִים הַבְּרָזִילָאִים קַרְנָבָל עַלִּיז שֶׁל מוּזִיקָה, רִקּוּדִים וְתַחְפּוֹשׂוֹת מַרְהִיבוֹת עַיִן. הַבְּרָזִילָאִים אוֹהֲבִים מְאוֹד כַּדּוּרֶגֶל. בִּבְּרָזִיל יֵשׁ הֲכִי הַרְבֵּה סוּגִים שֶׁל חַיּוֹת וּצְמָחִים בָּעוֹלָם. זֹאת גַּם הַמְּדִינָה שֶׁיֵּשׁ בָּהּ הֲכִי הַרְבֵּה מִינִים שֶׁל קוֹפִים!"}, {"id": "יָוָן", "display_name": "יָוָן", "category": "countries", "text": "יָוָן הִיא מְדִינָה בְּאֵירוֹפָּה, שֶׁמֻּרְכֶּבֶת מִשֶּׁטַח יַבָּשָׁה גָּדוֹל וּלְצִדּוֹ אַלְפֵי אִיִּים. חֵלֶק מֵאִיֵּי יָוָן גְּדוֹלִים, וַאֲחֵרִים קְטַנִּים מַמָּשׁ. יָוָן הִיא אַחַת הָאֲרָצוֹת הֲכִי חֲשׁוּבוֹת בַּהִיסְטוֹרְיָה שֶׁל הָעוֹלָם. יֵשׁ בָּהּ הַרְבֵּה בִּנְיָנִים וּמִבְנִים עַתִּיקִים, וּבָהּ הִמְצִיאוּ אֶת הָאוֹלִימְפְּיָאדָה! הַמּוּזִיקָה הַיְּוָנִית הִיא יָפָה וּמְלֵאַת חַיִּים וּמְנַגְּנִים אוֹתָהּ בִּכְלִי נְגִינָה מָסָרְתִּיִּים, כְּמוֹ בּוּזוּקִי. הַמִּטְבָּח הַיְּוָנִי כּוֹלֵל מַאֲכָלִים טְעִימִים כְּמוֹ צָזִיקִי וּמוּסָקָה."}, {"id": "אִיטַלְיָה", "display_name": "אִיטַלְיָה", "category": "countries", "text": "אִיטַלְיָה הִיא אֶרֶץ אֵירוֹפִּית, שֶׁצּוּרָתָהּ עַל הַמַּפָּה מַזְכִּירָה מַגָּף. רוֹמָא, בִּירַת אִיטַלְיָה, הָיְתָה פַּעַם הָעִיר הֲכִי חֲשׁוּבָה בָּעוֹלָם, וְהִיא מְלֵאָה בִּנְיָנִים יָפִים וִיצִירוֹת אָמָּנוּת. אָמָּנִים מְפֻרְסָמִים רַבִּים – צַיָּרִים, מְשׁוֹרְרִים וּמַלְחִינִים – נוֹלְדוּ בְּאִיטַלְיָה. הַמִּטְבָּח הָאִיטַלְקִי אָהוּב עַל רַבִּים בְּרַחֲבֵי הָעוֹלָם וְהוּא כּוֹלֵל מַאֲכָלִים טְעִימִים כְּמוֹ פִּיצָה, פַּסְטָה וְלָזַנְיָה. הָאִיטַלְקִים לְעוֹלָם לֹא שׁוֹכְחִים לְקַנֵּחַ אֲרוּחָה טוֹבָה בְּסֵפֶל שֶׁל קָפֶה אֶסְפְּרֶסוֹ חַם!"}, {"id": "יַפָּן", "display_name": "יַפָּן", "category": "countries", "text": "יַפָּן הִיא מְדִינָה בְּאַסְיָה, שֶׁמֻּרְכֶּבֶת מֵאַרְבָּעָה אִיִּים גְּדוֹלִים וְעוֹד אַלְפֵי אִיִּים קְטַנִּים. בְּיַפָּן יֵשׁ הֲמוֹן יְעָרוֹת וְהָרֵי גַּעַשׁ. הָאָמָּנוּת הַיַּפָּנִית הִיא מְיֻחֶדֶת בְּמִינָהּ, וְכָךְ גַּם הַמּוּזִיקָה הַיַּפָּנִית וְהַתֵּאַטְרוֹן הַיַּפָּנִי, שֶׁנִּקְרָא קָבּוּקִי. הַמִּטְבָּח הַיַּפָּנִי כּוֹלֵל מָנוֹת טְעִימוֹת כְּמוֹ סוּשִׁי, אִטְרִיּוֹת אוּדוֹן וּמְרַק מיסוֹ. פַּעַם הָיוּ בְּיַפָּן לוֹחֲמִים נוֹעָזִים בְּשֵׁם סָמוּרָאִים, שֶׁנִּלְחֲמוּ בְּעֶזְרַת חֲרָבוֹת מְעֻקָּלוֹת. הַיַּפָּנִים אוֹהֲבִים הִתְאַבְּקוּת סוּמוֹ - סְפּוֹרְט שֶׁבּוֹ שְׁנֵי מִתְחָרִים גְּדוֹלִים, שְׁמֵנִים וַחֲזָקִים מְנַסִּים לִדְחֹף זֶה אֶת זֶה מִחוּץ לְמַעְגָּל."}, {"id": "אוֹסְטְרַלְיָה", "display_name": "אוֹסְטְרַלְיָה", "category": "countries", "text": "אוֹסְטְרַלְיָה הִיא אֶרֶץ עֲנָקִית וְאַחַת מֵחֲמֵשׁ הַיַּבָּשׁוֹת בָּעוֹלָם. בְּאוֹסְטְרַלְיָה יֵשׁ הַרְבֵּה בַּעֲלֵי חַיִּים מְיֻחָדִים כְּמוֹ הַקֶּנְגּוּרוּ, הַקּוֹאָלָה וְהַבַּרְוָזָן. הָאוֹסְטְרָלִים אוֹהֲבִים לַעֲסֹק בִּסְפּוֹרְט וְלִצְלוֹת בָּשָׂר בָּאֲוִיר הַפָּתוּחַ. בֶּעָבָר נָהֲגוּ לִשְׁלֹחַ פּוֹשְׁעִים אַנְגְּלִים לְאוֹסְטְרַלְיָה הָרְחוֹקָה בְּתוֹר עֹנֶשׁ. הַתּוֹשָׁבִים הָרִאשׁוֹנִים שֶׁל אוֹסְטְרַלְיָה נִקְרָאִים אָבּוֹרִיגִ'ינִים. בְּרֵאשִׁית הַדֶּרֶךְ הֵם לֹא הִסְתַּדְּרוּ הֵיטֵב עִם הַתּוֹשָׁבִים הַחֲדָשִׁים, אֲבָל כַּיּוֹם הֵם חַיִּים יַחְדָּו בְּשָׁלוֹם."}, {"id": "סִין", "display_name": "סִין", "category": "countries", "text": "סִין הִיא אֶרֶץ עֲנָקִית בְּיַבֶּשֶׁת אַסְיָה, וּמִסְפַּר הַתּוֹשָׁבִים בָּהּ הוּא הַגָּדוֹל בְּיוֹתֵר בָּעוֹלָם. הַסִּינִים אוֹכְלִים הַרְבֵּה אֹרֶז וְאִטְרִיּוֹת, וְהֵם אֵלֶּה שֶׁגִּלּוּ אֶת הַתֵּה. סִין הִיא מוֹלַדְתּוֹ שֶׁל דֹּב הַפַּנְדָּה. בְּיָמִים עָבָרוּ שָׁלְטוּ בְּסִין קֵיסָרִים, שֶׁגָּרוּ בְּמָקוֹם מְיֻחָד בְּשֵׁם \"הָעִיר הָאֲסוּרָה\": אַף אֶחָד לֹא יָכוֹל הָיָה לְהִכָּנֵס לָעִיר הַזֹּאת בְּלִי רְשׁוּתָם. הַסִּינִים גַּם בָּנוּ אֶת הַחוֹמָה הֲכִי אֲרֻכָּה בָּעוֹלָם, כְּדֵי לְהָגֵן עַל אַרְצָם מִפְּנֵי פּוֹלְשִׁים. מְסַפְּרִים שֶׁאֶפְשָׁר לִרְאוֹת אֶת הַחוֹמָה הַסִּינִית אֲפִלּוּ מִן הֶחָלָל הַחִיצוֹן!"}, {"id": "צָרְפַת", "display_name": "צָרְפַת", "category": "countries", "text": "צָרְפַת הִיא מְדִינָה גְּדוֹלָה בְּאֵירוֹפָּה. הִיא הָיְתָה בֵּין הַמְּדִינוֹת הָרִאשׁוֹנוֹת שֶׁהִכְרִיזוּ שֶׁאֲנָשִׁים הֵם חָפְשִׁיִּים וְשֶׁאֵין צֹרֶךְ בְּשִׁלְטוֹנָם שֶׁל מְלָכִים וּמְלָכוֹת. עִיר הַבִּירָה שֶׁל צָרְפַת הִיא פָּרִיז. יֵשׁ בָּהּ הַרְבֵּה אַרְמוֹנוֹת וּבִנְיָנִים יָפִים, וְאָמָּנִים רַבִּים רוֹצִים לִחְיוֹת בָּהּ. הַצָּרְפָתִים אוֹהֲבִים אֹכֶל טוֹב וְיַיִן מְשֻׁבָּח. הַקְּרוּאָסוֹן, מַאֲפֶה צָרְפָתִי מְפֻרְסָם, נִמְכַּר כַּיּוֹם כִּמְעַט בְּכָל מָקוֹם בָּעוֹלָם. בְּצָרְפַת נֶעֱרָךְ מֵרוֹץ הָאוֹפַנַּיִם הֲכִי חָשׁוּב בָּעוֹלָם, שֶׁנִּקְרָא \"טוּר דֶּה פְרַנְס\"."}, {"id": "מֶקְסִיקוֹ", "display_name": "מֶקְסִיקוֹ", "category": "countries", "text": "מֶקְסִיקוֹ הִיא מְדִינָה גְּדוֹלָה מְאוֹד בְּאָמֶרִיקָה הַצְּפוֹנִית. יֵשׁ בָּהּ הָמוֹן הָרֵי גַּעַשׁ, מִדְבָּרִיּוֹת וַאֲפִלּוּ ג'וּנְגֶּלִים. לִפְנֵי מֵאוֹת שָׁנִים חַי בְּמֶקְסִיקוֹ עַם מְיֻחָד בְּמִינוֹ – הָאַצְטֶקִים: הֵם בָּנוּ עָרִים רַבּוֹת וְיָפוֹת, פִּירָמִידוֹת וּמִקְדָּשִׁים. חֵלֶק מֵהַמִּבְנִים הָאֵלֶּה עֲדַיִן עוֹמְדִים עַל תִּלָּם, וְתַיָּרִים רַבִּים מַגִּיעִים לִרְאוֹת אוֹתָם. הַמֶּקְסִיקָנִים חוֹבְשִׁים סוֹמְבְּרֶרוֹ – כּוֹבַע רְחַב-שׁוּלַיִם שֶׁמָּגֵן עֲלֵיהֶם מִפְּנֵי הַשֶּׁמֶשׁ. הָאֹכֶל הַמֶּקְסִיקָנִי חָרִיף וְטָעִים – כְּמוֹ טַאקוֹ וּמָנוֹת אֲחֵרוֹת מִתִּירָס וּמִשְּׁעוּעִית."}, {"id": "מָרוֹקוֹ", "display_name": "מָרוֹקוֹ", "category": "countries", "text": "מָרוֹקוֹ הִיא מְדִינָה בְּאַפְרִיקָה. רֹב שִׁטְחָהּ שֶׁל מָרוֹקוֹ שַׁיָּךְ לְמִדְבַּר סָהָרָה, שֶׁהוּא הַמִּדְבָּר הֲכִי גָּדוֹל וַהֲכִי חַם בָּעוֹלָם – אֲבָל בְּצִדָּהּ הַצְּפוֹנִי, הַגּוֹבֵל בַּיָּם הַתִּיכוֹן, יֵשׁ חוֹפִים יְפֵהפִיִּים. גַּם רֶכֶס הָרֵי הָאַטְלָס, שֶׁבּוֹ מִתְנַשְּׂאִים הָרִים עֲנָקִיִּים, עוֹבֵר בְּשֶׁטַח מָרוֹקוֹ. אַחַת הַמָּנוֹת הַמְּפֻרְסָמוֹת בַּמִּטְבָּח הַמָּרוֹקָאִי הִיא קוּסְקוּס – חִטָּה טְחוּנָה וּמְבֻשֶּׁלֶת וּמֵעָלֶיהָ יְרָקוֹת, בָּשָׂר וְרֹטֶב. מָרוֹקָאִים הֵם מְאָרְחִים נִפְלָאִים, וְתָמִיד יַצִּיעוּ לָאוֹרְחִים שֶׁלָּהֶם תֵּה מָתוֹק עִם נַעְנַע."}, {"id": "נֶפָּאל", "display_name": "נֶפָּאל", "category": "countries", "text": "נֶפָּאל הִיא מְדִינָה בְּאַסְיָה, שֶׁגּוֹבֶלֶת בְּסִין וּבְהֹדּוּ. הַבִּירָה שֶׁל נֶפָּאל הִיא קַטְמַנְדּוּ – עִיר עַתִּיקָה עִם מִקְדָּשִׁים וּפְסָלִים יְפֵהפִיִּים. הַנְּקֻדָּה הֲכִי גְּבוֹהָה בְּהַר הָאֶוֶרֶסְט, וּבְעֶצֶם הֲכִי גְּבוֹהָה בָּעוֹלָם כֻּלּוֹ, נִמְצֵאת בְּנֶפָּאל. אֲנָשִׁים רַבִּים מֵרַחֲבֵי הָעוֹלָם מַגִּיעִים לְנֶפָּאל כְּדֵי לְנַסּוֹת לְטַפֵּס עַל הָאֶוֶרֶסְט. לַדֶּגֶל שֶׁל נֶפָּאל יֵשׁ צוּרָה מְיֻחֶדֶת: הוּא מֻרְכָּב מִשְּׁנֵי מְשֻׁלָּשִׁים, שֶׁנִּרְאִים כְּמוֹ הָרֵי הַהִימָלַאיָה שֶׁבְּנֶפָּאל."}, {"id": "סְפָרַד", "display_name": "סְפָרַד", "category": "countries", "text": "סְפָרַד הִיא מְדִינָה בְּאֵירוֹפָּה. זוֹהִי אֶרֶץ יָפָה מְאוֹד, מְלֵאָה הָרִים וּנְהָרוֹת. הָעָם הַסְּפָרַדִּי מִצְטַיֵּן בִּסְפּוֹרְט, וְהַקְּבוּצוֹת הַסְּפָרַדִּיּוֹת זוֹכוֹת בְּהַרְבֵּה גְּבִיעִים בְּכַדּוּרֶגֶל וּבְכַדּוּרְסַל. הַסְּפָרַדִּים אוֹהֲבִים מְאוֹד אָמָּנוּת, מוּזִיקָה וְרִקּוּדִים. סְפָרַד הִיא מוֹלַדְתָּהּ שֶׁל הַגִּיטָרָה, וּמַרְבִּים לְנַגֵּן בָּהּ בְּמוֹפְעֵי פְלָמֶנְקוֹ, שֶׁהוּא רִקּוּד סְפָרַדִּי מָסָרְתִּי. הַסְּפָרַדִּים נֶהֱנִים בְּכָל יוֹם מֵהַפְסָקַת צָהֳרַיִם, הַנִּקְרֵאת בִּסְפָרַדִּית \"סִיאֶסְטָה\", לְצֹרֶךְ נִמְנוּם קָצָר וּמְרַעֲנֵן. הַמִּטְבָּח הַסְּפָרַדִּי כּוֹלֵל בֵּין הַשְּׁאָר טָאפַּאס - מָנוֹת זְעִירוֹת וּטְעִימוֹת – וּפָּאֵיָה, שֶׁהִיא מָנָה עִם אֹרֶז."}, {"id": "וֶנֶצוּאֶלָה", "display_name": "וֶנֶצוּאֶלָה", "category": "countries", "text": "וֶנֶצוּאֶלָה הִיא מְדִינָה בִּדְרוֹם אָמֶרִיקָה. עִיר הַבִּירָה שֶׁלָּהּ, קָרָקָס, נִקְרֵאת עַל שֵׁם שֵׁבֶט שֶׁל עַם אַמִּיץ וְנוֹעָז, וְשׁוֹכֶנֶת בְּעֵמֶק מַקְסִים. בְּוֶנֶצוּאֶלָה יֵשׁ מִגְוָן גָּדוֹל שֶׁל סְבִיבוֹת וְנוֹפִים: יַעֲרוֹת גֶּשֶׁם, עֲרָבוֹת, נְהָרוֹת, הָרִים, חוֹפֵי יָם וַאֲפִלּוּ מִדְבָּר! הַמַּפָּל הֲכִי גָּבוֹהַּ בָּעוֹלָם, מַפַּל אַנְחֶל, נִמְצָא בְּוֶנֶצוּאֶלָה. אִם תְּבַקְּרוּ בְּוֶנֶצוּאֶלָה, תּוּכְלוּ לִרְאוֹת הָרִים שֶׁצּוּרָתָם מַזְכִּירָה שֻׁלְחָן עֲנָקִי, וְהֵם אָכֵן נִקְרָאִים \"הָרֵי שֻׁלְחָן\". הַתּוֹשָׁבִים בְּוֶנֶצוּאֶלָה מְדַבְּרִים סְפָרַדִּית, וְהֵם חַמִּים וִידִידוּתִיִּים מְאוֹד."}, {"id": "גֶּרְמַנְיָה", "display_name": "גֶּרְמַנְיָה", "category": "countries", "text": "גֶּרְמַנְיָה הִיא מְדִינָה גְּדוֹלָה בְּאֵירוֹפָּה. פַּעַם הִיא הָיְתָה מְחֻלֶּקֶת לִשְׁתֵּי מְדִינוֹת, שֶׁלֹּא הִסְתַּדְּרוּ בֵּינֵיהֶן – מַעֲרַב גֶּרְמַנְיָה וּמִזְרַח גֶּרְמַנְיָה. בְּאֶמְצַע בֶּרְלִין, עִיר הַבִּירָה שֶׁל גֶּרְמַנְיָה, עָבְרָה אֲפִלּוּ חוֹמָה שֶׁחִלְּקָה אוֹתָהּ לִשְׁנַיִם! כַּיּוֹם גֶּרְמַנְיָה מְאֻחֶדֶת, וְהִיא מְדִינָה עֲשִׁירָה וַחֲזָקָה מְאוֹד. בְּגֶרְמַנְיָה יֵשׁ מָסֹרֶת עֲשִׁירָה שֶׁל מוּזִיקָה, אָמָּנוּת וּמַדָּע. הַגֶּרְמָנִים מְיַצְּרִים מְכוֹנִיּוֹת מְצֻיָּנוֹת. בְּגֶרְמַנְיָה יֵשׁ כְּבִישִׁים מְהִירִים שֶׁמֻּתָּר לִנְהֹג בָּהֶם כַּמָּה מַהֵר שֶׁמִּתְחַשֵּׁק, אֲבָל הַנַּהָגִים הַגֶּרְמָנִים נוֹהֲגִים תָּמִיד בִּזְהִירוּת רַבָּה."}, {"id": "הֹדּוּ", "display_name": "הֹדּוּ", "category": "countries", "text": "הֹדּוּ הִיא מְדִינָה עֲנָקִית בְּאַסְיָה, וּמִסְפַּר הַתּוֹשָׁבִים בָּהּ הוּא הַשֵּׁנִי בְּגָדְלוֹ בָּעוֹלָם, אַחֲרֵי סִין. בְּהֹדּוּ יֵשׁ הָמוֹן הָרִים, נְהָרוֹת וְג'וּנְגֶּלִים. הַחַיָּה הַלְּאֻמִּית שֶׁל הֹדּוּ הִיא טִיגְרִיס בֶּנְגָּלִי. מִקְדָּשִׁים רַבִּים בְּהֹדּוּ מֻקְדָּשִׁים לְזִכְרוֹ שֶׁל בּוּדְהָה, אִישׁ חָכָם שֶׁחַי לִפְנֵי אַלְפֵי שָׁנִים וְלִמֵּד אֲנָשִׁים אֵיךְ לִחְיוֹת בְּשַׁלְוָה וּבְנֹעַם. תַּעֲשִׂיַּת הַסְּרָטִים הַהֹדִּית, שֶׁנִּמְצֵאת בָּעִיר מוּמְבַּי, מְכֻנָּה \"בּוֹלִיווּד\" בְּשֶׁל דִּמְיוֹנָהּ לְהוֹלִיווּד - בְּכָל שָׁנָה מְצַלְּמִים בָּהּ יוֹתֵר מֵאֶלֶף סִרְטֵי קוֹלְנוֹעַ!"}, {"id": "תֵּימָן", "display_name": "תֵּימָן", "category": "countries", "text": "תֵּימָן הִיא מְדִינָה עַרְבִית בְּיַבֶּשֶׁת אַסְיָה. תֵּימָן שׁוֹכֶנֶת בְּמִדְבָּר, וּמֶזֶג הָאֲוִיר בָּהּ חַם מְאוֹד. הַגְּבָרִים בְּתֵימָן לוֹבְשִׁים שִׂמְלָה אֲרֻכָּה וְנוֹשְׂאִים פִּגְיוֹן מָסָרְתִּי שֶׁנִּקְרָא גַ'נְבִּיָּה, עִם קַת מְגֻלֶּפֶת מִקֶּרֶן שֶׁל קַרְנַף. בְּתֵימָן יֵשׁ עִיר מְיֻחֶדֶת, שִׁיבַּאם, וּבָהּ מֵאוֹת מִגְדָּלִים יָפִים עֲשׂוּיִים מִבֹּץ. בְּסוּקוּטְרָה, אִי שֶׁשַּׁיָּךְ לְתֵימָן, יֵשׁ צִמְחִיָּה יוֹצֵאת דֹּפֶן, עִם מֵאוֹת מִינֵי צְמָחִים שֶׁלֹּא קַיָּמִים בְּשׁוּם מָקוֹם אַחֵר בָּעוֹלָם!"}, {"id": "רוּסְיָה", "display_name": "רוּסְיָה", "category": "countries", "text": "רוּסְיָה הִיא הַמְּדִינָה הֲכִי גְּדוֹלָה בָּעוֹלָם. חֵלֶק מִמֶּנָּה נִמְצָא בְּאֵירוֹפָּה וְחֵלֶק בְּאַסְיָה. יֵשׁ בָּהּ הַרְבֵּה יְעָרוֹת, הָרִים וּנְהָרוֹת, וְגַם עַרְבוֹת עֵשֶׂב עֲצוּמוֹת. בְּרוּסְיָה יֵשׁ בַּעֲלֵי חַיִּים רַבִּים, כְּמוֹ הַטִּיגְרִיס הַסִּיבִּירִי, שֶׁהוּא הַטִּיגְרִיס הֲכִי גָּדוֹל בָּעוֹלָם. בְּרוּסְיָה יֵשׁ מָסֹרֶת אֲרֻכָּה שֶׁל אָמָּנוּת וּמַדָּע, וְהִיא הָיְתָה הַמְּדִינָה הָרִאשׁוֹנָה שֶׁשָּׁלְחָה אַסְטְרוֹנָאוּט לֶחָלָל! רַבִּים אוֹמְרִים שֶׁהָרַקְדָנִים בַּבּוֹלְשׁוֹי, לַהֲקַת הַבָּלֶט הָרוּסִית, הֵם הֲכִי טוֹבִים בָּעוֹלָם."}, {"id": "אַנְגְּלִיָּה", "display_name": "אַנְגְּלִיָּה", "category": "countries", "text": "אַנְגְּלִיָּה נִמְצֵאת בִּבְּרִיטַנְיָה, שֶׁהִיא אִי גָּדוֹל לְיַד אֵירוֹפָּה. פַּעַם הָיְתָה אַנְגְּלִיָּה מֶרְכָּזָהּ שֶׁל הָאִימְפֶּרְיָה הַבְּרִיטִית - מַמְלָכָה עֲצוּמָה שֶׁשָּׁלְטָה בִּמְקוֹמוֹת רַבִּים וְשׁוֹנִים בָּעוֹלָם. בִּירָתָהּ שֶׁל אַנְגְּלִיָּה הִיא לוֹנְדּוֹן. מַלְכַּת אַנְגְּלִיָּה, אֶלִיזַבֶּת הַשְּׁנִיָּה, חַיָּה שָׁם בְּאַרְמוֹן שֶׁשּׁוֹמְרִים עָלָיו חַיָּלִים בְּמַדִּים אֲדֻמִּים, שֶׁחוֹבְשִׁים לְרֹאשָׁם כּוֹבָעִים שְׁחוֹרִים עֲנָקִיִּים. הָאַנְגְּלִים הֵם שֶׁהִמְצִיאוּ אֶת הַכַּדּוּרֶגֶל. וְהֵם לְעוֹלָם אֵינָם שׁוֹכְחִים לִשְׁתּוֹת תֵּה אַחַר הַצָּהֳרַיִם!"}, {"id": "מִצְרַיִם", "display_name": "מִצְרַיִם", "category": "countries", "text": "מִצְרַיִם הִיא מְדִינָה בְּאַפְרִיקָה. רֹב שִׁטְחָהּ הוּא אָמְנָם מִדְבָּר, אֲבָל זוֹרֵם בָּהּ אַחַד הַנְּהָרוֹת הֲכִי אֲרֻכִּים בָּעוֹלָם – הַנִּילוּס. לִפְנֵי אַלְפֵי שָׁנִים בָּנוּ הַמִּצְרִים הַקַּדְמוֹנִים בְּאַרְצָם פִּירָמִידוֹת, וְכַיּוֹם מַגִּיעִים תַּיָּרִים מִכָּל רַחֲבֵי הָעוֹלָם כְּדֵי לִרְאוֹת אוֹתָן. הַתַּיָּרִים בָּאִים לְבַקֵּר גַּם אֶת הַסְּפִינְקְס – פֶּסֶל עָצוּם בְּגָדְלוֹ, שֶׁיֵּשׁ לוֹ רֹאשׁ שֶׁל מֶלֶךְ וְגוּף שֶׁל אַרְיֵה. הַמִּצְרִים הַקְּדוּמִים לֹא כָּתְבוּ אוֹתִיּוֹת, אֶלָּא הִשְׁתַּמְּשׁוּ בִּמְקוֹמָן בְּצִיּוּרִים זְעִירִים שֶׁנִּקְרְאוּ הִירוֹגְלִיפִים, אוֹ כְּתַב חַרְטֻמִּים – כִּמְעַט כְּמוֹ בְּחוֹבֶרֶת קוֹמִיקְס!"}, {"id": "אַרְצוֹת הַבְּרִית", "display_name": "אַרְצוֹת הַבְּרִית", "category": "countries", "text": "אַרְצוֹת הַבְּרִית שֶׁל אָמֶרִיקָה הִיא מְדִינָה עֲנָקִית בְּיַבֶּשֶׁת אָמֶרִיקָה הַצְּפוֹנִית. אַרְצוֹת הַבְּרִית מֻרְכֶּבֶת מֵחֲמִשִּׁים מְדִינוֹת, שֶׁמְּשַׁתְּפוֹת פְּעֻלָּה כְּדֵי לְנַהֵל אֶת הָאֶרֶץ הַמְּשֻׁתֶּפֶת. אַרְצוֹת הַבְּרִית הִיא הַמְּדִינָה הַחֲזָקָה בְּיוֹתֵר בָּעוֹלָם, וְהִיא מְסַיַּעַת לַאֲרָצוֹת רַבּוֹת כְּשֶׁהֵן זְקוּקוֹת לְעֶזְרָה. אַרְצוֹת הַבְּרִית הָיְתָה הַמְּדִינָה הָרִאשׁוֹנָה שֶׁשָּׁלְחָה אָדָם לַיָּרֵחַ. מוּזִיקַת הַגֶּ'ז צָמְחָה בְּאַרְצוֹת הַבְּרִית. הָאָמֶרִיקָנִים אוֹהֲבִים כַּדּוּרְסַל וּבֵּיְסְבּוֹל, וְרַבִּים מֵהֶם נֶהֱנִים לֶאֱכֹל מָזוֹן מָהִיר, כְּמוֹ הַמְבּוּרְגֶּר וְנַקְנִיקִיָּה בְּלַחְמָנִיָּה."}, {"id": "שְׁוַיְץ", "display_name": "שְׁוַיְץ", "category": "countries", "text": "שְׁוַיְץ הִיא מְדִינָה עֲשִׁירָה וְיָפָה בְּאֵירוֹפָּה. יֵשׁ בָּהּ הָמוֹן הָרִים מֻשְׁלָגִים, נוֹפִים מַרְהִיבִים וְיוֹתֵר מֵאֶלֶף אֲגַמִּים. אֲנָשִׁים רַבִּים נוֹסְעִים לִשְׁוַיְץ בִּמְיֻחָד כְּדֵי לְטַיֵּל בָּהּ וְלַעֲשׂוֹת סְקִי. בִּשְׁוַיְץ מְכִינִים שׁוֹקוֹלָד מְשֻׁבָּח וּגְבִינוֹת טְעִימוֹת בְּיוֹתֵר. הַשְּׁעוֹנִים הַשְּׁוֵיצָרִיִּים נֶחְשָׁבִים לַשְּׁעוֹנִים הֲכִי מְדֻיָּקִים בָּעוֹלָם! לִפְנֵי כְּמָאתַיִם שָׁנָה הֶחְלִיטוּ הַשְּׁוֵיצָרִים שֶׁמְּדִינָתָם לֹא תִּתְעָרֵב בְּסִכְסוּכִים בֵּין הַמְּדִינוֹת הַשְּׁכֵנוֹת, וּמֵאָז הֵם מַקְפִּידִים עַל כָּךְ מְאוֹד."}, {"id": "זִימְבַּבּוּאֶה", "display_name": "זִימְבַּבּוּאֶה", "category": "countries", "text": "זִימְבַּבּוּאֶה נִמְצֵאת בְּאַפְרִיקָה, וְהִיא מְדִינָה לְלֹא מוֹצָא לַיָּם: כֻּלָּהּ מֻקֶּפֶת בְּיַבָּשָׁה, וְאֵין לָהּ חוֹפִים בִּכְלָל. בְּזִימְבַּבּוּאֶה נִמְצָאִים מַפְּלֵי וִיקְטוֹרְיָה, שֶׁהֵם בֵּין הַמַּפָּלִים הֲכִי יָפִים בָּעוֹלָם. לִפְנֵי מֵאוֹת שָׁנִים הָיְתָה זִימְבַּבּוּאֶה מַמְלָכָה רַבַּת עָצְמָה, וְכַיּוֹם תַּיָּרִים מְבַקְּרִים בְּחָרְבוֹת עִיר הַבִּירָה הָעַתִּיקָה שֶׁלָּהּ, שֶׁהָיָה בָּהּ אַרְמוֹן אֶבֶן עֲנָקִי. בְּזִימְבַּבּוּאֶה יֵשׁ פַּרְק מְיֻחָד, פַּרְק מַטוֹבּוֹ, שֶׁבּוֹ אֶפְשָׁר לִרְאוֹת סְלָעִים עֲצוּמִים שֶׁעוֹמְדִים זֶה עַל גַּבֵּי זֶה בְּלִי לִפֹּל!"}, {"id": "יִשְׂרָאֵל", "display_name": "יִשְׂרָאֵל", "category": "countries", "text": "מְדִינַת יִשְׂרָאֵל הוּקְמָה כְּדֵי לִהְיוֹת בַּיִת לַיְּהוּדִים מִכָּל הָעוֹלָם. מֵאָז קוּם הַמְּדִינָה הִגִּיעוּ אֵלֶיהָ יְהוּדִים מִכָּל אַרְצוֹת תֵּבֵל וְהֵבִיאוּ אִתָּם הַרְבֵּה שָׂפוֹת, תַּרְבֻּיּוֹת, מִנְהָגִים וּמַאֲכָלִים שֶׁהִתְעַרְבְּבוּ אֵלֶּה בְּאֵלֶּה וְיָצְרוּ עֹשֶׁר תַּרְבּוּתִי. הָעוֹלִים הַחֲדָשִׁים הִצְטָרְפוּ לַיְּהוּדִים שֶׁכְּבָר חָיוּ בָּאָרֶץ מִקֹּדֶם, לְצַד הָעַרְבִים, הַבֶּדוּאִים, הַדְּרוּזִים וְהַצֶּ'רְקֶסִים. בִּירָתָהּ שֶׁל יִשְׂרָאֵל הִיא יְרוּשָׁלַיִם וּבָהּ מְקוֹמוֹת קְדוֹשִׁים לַיְּהוּדִים, לַנּוֹצְרִים וְלַמֻּסְלְמִים. יִשְׂרָאֵל שׁוֹכֶנֶת בְּיַבֶּשֶׁת אַסְיָה, לְחוֹפֵי הַיָּם הַתִּיכוֹן, וְיֵשׁ בָּהּ נוֹפִים מִכָּל הַסּוּגִים: הַר מֻשְׁלָג בַּחֹרֶף, צִמְחִיָּה עֲשִׁירָה, חוֹפִים, עֲמָקִים, יְעָרוֹת, מִדְבָּר, אֲגַמִּים וּמְעָרוֹת."}, {"id": "אֶתְיוֹפְּיָה", "display_name": "אֶתְיוֹפְּיָה", "category": "countries", "text": "אֶתְיוֹפְּיָה הִיא מְדִינָה גְּדוֹלָה מְאוֹד בְּאַפְרִיקָה. זוֹ אֶרֶץ הֲרָרִית, וְיֵשׁ בָּהּ אֲזוֹרִים קְרִירִים וְגַם חַמִּים מְאוֹד. לְמַעֲשֶׂה, הַמָּקוֹם הֲכִי חַם בָּעוֹלָם נִמְצָא בְּאֶתְיוֹפְּיָה! בִּירָתָהּ שֶׁל אֶתְיוֹפְּיָה הִיא אַדִיס אַבֶּבָּה, כְּלוֹמַר \"פֶּרַח חָדָשׁ\" בְּאֶתְיוֹפִּית. בְּאֶתְיוֹפְּיָה חַיִּים עַמִּים וּשְׁבָטִים רַבִּים, וְדוֹבְרִים בָּהּ יוֹתֵר מִשְּׁמוֹנִים שָׂפוֹת שׁוֹנוֹת. זוֹ גַּם הָאֶרֶץ הָרִאשׁוֹנָה בָּעוֹלָם שֶׁבָּהּ גִּדְּלוּ וְהֵכִינוּ קָפֶה. לְיִשְׂרָאֵל הִגִּיעוּ יְהוּדִים רַבִּים מֵאֶתְיוֹפְּיָה וְהֵבִיאוּ אִתָּם תַּרְבּוּת וּמִנְהָגִים מְיֻחָדִים, אָמָּנוּת עֲשִׁירָה וּמַאֲכָלִים טְעִימִים."}, {"id": "פֶּסֶל הַחֵרוּת", "display_name": "פֶּסֶל הַחֵרוּת", "category": "landmarks", "text": "פֶּסֶל הַחֵרוּת הוּא פֶּסֶל עֲנָקִי שֶׁל אִשָּׁה הָאוֹחֶזֶת לַפִּיד בְּיָד אַחַת וְלוּחַ בַּיָּד הַשְּׁנִיָּה, וְאַחַת מֵרַגְלֶיהָ עוֹמֶדֶת עַל שַׁרְשֶׁרֶת שְׁבוּרָה. הַפֶּסֶל הָיָה מַתָּנָה שֶׁצָּרְפַת הֶעֱנִיקָה לָעָם הָאָמֶרִיקָנִי, וּמֵאָז הָפַךְ לְאַחַד הַסְּמָלִים הֲכִי מְפֻרְסָמִים שֶׁל אַרְצוֹת הַבְּרִית. פֶּסֶל הַחֵרוּת נִצָּב עַל אִי קָטָן מוּל הָעִיר נְיוּ יוֹרְק, וּמְבָרֵךְ לְשָׁלוֹם כָּל מִי שֶׁמַּגִּיעַ אֵלֶיהָ דֶּרֶךְ הַיָּם. אֲנָשִׁים רַבִּים עוֹלִים עַל מַעְבֹּרֶת כְּדֵי לְבַקֵּר אֶת הַפֶּסֶל וּלְכַבֵּד אֶת מֶסֶר הַחֵרוּת שֶׁלּוֹ."}, {"id": "מִגְדַּל פִּיזָה", "display_name": "מִגְדַּל פִּיזָה", "category": "landmarks", "text": "מִגְדַּל פִּיזָה קָרוּי עַל שֵׁם הָעִיר הָאִיטַלְקִית פִּיזָה, שֶׁבָּהּ הוּא נִצָּב. הַמִּגְדָּל נוֹטֶה עַל צִדּוֹ וְנִרְאֶה כְּאִלּוּ הוּא עוֹמֵד לִפֹּל! הַסִּבָּה הִיא שֶׁהַמִּגְדָּל נִבְנָה לִפְנֵי הֲמוֹן שָׁנִים עַל קַרְקַע רַכָּה, וְצַד אֶחָד שֶׁלּוֹ פָּשׁוּט שָׁקַע בָּאֲדָמָה. מִגְדַּל פִּיזָה הוּא מִגְדַּל פַּעֲמוֹנִים עָגֹל שֶׁשַּׁיָּךְ לַכְּנֵסִיָּה שֶׁל פִּיזָה. יֵשׁ בּוֹ שְׁמוֹנֶה קוֹמוֹת, שִׁבְעָה פַּעֲמוֹנִים וְיוֹתֵר מִמָּאתַיִם קְשָׁתוֹת מִשַּׁיִשׁ."}, {"id": "אַרְמוֹן וֶרְסַאי", "display_name": "אַרְמוֹן וֶרְסַאי", "category": "landmarks", "text": "אַרְמוֹן וֶרְסַאי הוּא אַרְמוֹן מַלְכוּת מְהֻדָּר בְּוֶרְסַאי שֶׁבְּצָרְפַת. פַּעַם גָּרוּ בּוֹ הַמְּלָכִים וְהַמְּלָכוֹת שֶׁל צָרְפַת, עַד שֶׁהַמֶּלֶךְ לוּאִי הַשִּׁשָּׁה-עָשָׂר וְאִשְׁתּוֹ מַארִי אַנְטוּאַנֶט סֻלְּקוּ מִמֶּנּוּ בְּבֹשֶׁת פָּנִים, אַחֲרֵי שֶׁהִתְאַכְזְרוּ לְתוֹשָׁבֵי צָרְפַת. בְּאַרְמוֹן וֶרְסַאי יֵשׁ הָמוֹן רָהִיטִים מְפֹאָרִים, פְּסָלִים, צִיּוּרִים וְקִשּׁוּטִים מַקְסִימִים אֲחֵרִים. הָאוּלָם הַמַּרְשִׁים מִכֻּלָּם הוּא אוּלַם הַמַּרְאוֹת, הַמָּלֵא מַרְאוֹת וּקְשָׁתוֹת מַרְהִיבוֹת עַיִן. מִחוּץ לָאַרְמוֹן יֵשׁ גַּם מִזְרָקוֹת וְגַנִּים נִפְלָאִים."}, {"id": "אַקְרוֹפּוֹלִיס", "display_name": "אַקְרוֹפּוֹלִיס", "category": "landmarks", "text": "אַקְרוֹפּוֹלִיס הוּא מִבְצָר מְפֻרְסָם שֶׁנִּבְנָה בְּיָוָן הָעַתִּיקָה לִפְנֵי אַלְפֵי שָׁנִים, עַל גִּבְעָה סַלְעִית בָּעִיר אָתוּנָה. הָאַקְרוֹפּוֹלִיס הָיָה הַמָּקוֹם הֲכִי גָּבוֹהַּ בְּאָתוּנָה הָעַתִּיקָה וְהָיוּ בּוֹ בִּנְיָנִים מַרְשִׁימִים, מִקְדָּשִׁים וְתֵאַטְרוֹנִים. אַנְשֵׁי אָתוּנָה נָהֲגוּ לְהַגִּיעַ לְשָׁם כְּדֵי לְהִתְפַּלֵּל וְלַחְגֹּג חַגִּים וּפֶסְטִיבָלִים. אֲחָדִים מֵהַבִּנְיָנִים שֶׁל אַקְרוֹפּוֹלִיס עֲדַיִן עוֹמְדִים עַל תִּלָּם, וְתַיָּרִים מִכָּל רַחֲבֵי הָעוֹלָם בָּאִים לִרְאוֹת אוֹתָם."}, {"id": "הַפִּירָמִידוֹת", "display_name": "הַפִּירָמִידוֹת", "category": "landmarks", "text": "הַפִּירָמִידוֹת שֶׁל מִצְרַיִם הֵן מִבְנֵי אֶבֶן עַתִּיקִים וַעֲצוּמִים בְּגָדְלָם. יֵשׁ לָהֶן צוּרָה מְיֻחֶדֶת מְאוֹד: הַקִּירוֹת מְשֻׁלָּשִׁים, וְאִלּוּ הָרִצְפָּה מְרֻבַּעַת. הַמִּצְרִים הַקְּדוּמִים הֵקִימוּ אֶת הַפִּירָמִידוֹת בְּתוֹר אֲתָרֵי קְבוּרָה עֲנָקִיִּים לְמַלְכֵי מִצְרַיִם, הַפַּרְעוֹנִים, שֶׁנִּקְבְּרוּ בָּהֶן יַחַד עִם הַתַּכְשִׁיטִים וְהָרְכוּשׁ שֶׁלָּהֶם. כְּדֵי לִבְנוֹת פִּירָמִידָה אַחַת נִדְרְשׁוּ אַלְפֵי פּוֹעֲלִים! בְּמִצְרַיִם יֵשׁ יוֹתֵר מִמֵּאָה וּשְׁלוֹשִׁים פִּירָמִידוֹת. הַגְּדוֹלוֹת וְהַמְּפֻרְסָמוֹת שֶׁבָּהֶן נִמְצָאוֹת בָּעִיר גִּיזָה."}, {"id": "פּוֹמְפֵּי", "display_name": "פּוֹמְפֵּי", "category": "landmarks", "text": "פּוֹמְפֵּי הִיא עִיר עַתִּיקָה בְּאִיטַלְיָה. לִפְנֵי אַלְפֵי שָׁנִים הָיְתָה זוֹ עִיר נָאָה וְתוֹסֶסֶת, וְגָרוּ בָּהּ אֲנָשִׁים עֲשִׁירִים מְאוֹד וְגַם עֲנִיִּים. יוֹם קַיִץ אֶחָד הִתְפָּרֵץ פִּתְאוֹם הַר הַגַּעַשׁ הַסָּמוּךְ, וֶזוּב, וְהָעִיר כֻּלָּהּ נִקְבְּרָה בִּן רֶגַע תַּחַת הָאֵפֶר הַלּוֹהֵט. כִּמְעַט אַלְפַּיִם שָׁנָה אַחַר כָּךְ, בַּחֲפִירוֹת אַרְכֵאוֹלוֹגִיּוֹת, הִתְגַּלְּתָה פּוֹמְפֵּי מִתַּחַת לָאֵפֶר כְּאִלּוּ קָפְאָה בַּזְּמַן: רְחוֹבוֹת, בָּתֵּי מְגוּרִים, מִקְדָּשִׁים, תֵּאַטְרוֹנִים, חֲנֻיּוֹת וּכְלֵי עֲבוֹדָה נִשְׁמְרוּ בִּשְׁלֵמוּתָם, וְאִפְשְׁרוּ לָנוּ לִלְמֹד רַבּוֹת עַל חַיֵּיהֶם שֶׁל הָרוֹמָאִים הַקַּדְמוֹנִים."}, {"id": "מַפְּלֵי נִיאָגָרָה", "display_name": "מַפְּלֵי נִיאָגָרָה", "category": "landmarks", "text": "מַפְּלֵי נִיאָגָרָה הֵם שְׁלוֹשָׁה מַפָּלִים מַרְשִׁימִים בַּגְּבוּל שֶׁבֵּין מְדִינַת קָנָדָה לְאַרְצוֹת הַבְּרִית. הַמַּיִם בְּמַפְּלֵי נִיאָגָרָה זוֹרְמִים בִּמְהִירוּת מְסַחְרֶרֶת – בְּכָל שְׁנִיָּה צוֹנְחִים בַּמַּפָּלִים מִילְיוֹנֵי לִיטְרִים שֶׁל מַיִם! הָעָצְמָה שֶׁל הַמַּיִם חֲזָקָה כָּל כָּךְ, שֶׁהִיא מְיַצֶּרֶת כַּמּוּת אַדִּירָה שֶׁל חַשְׁמַל. מְסֻכָּן מְאוֹד לִקְפֹּץ לְמֵי הַמַּפָּלִים, אֲבָל הָיוּ בּוֹדְדִים שֶׁעָשׂוּ זֹאת, וַאֲחָדִים אֲפִלּוּ הָלְכוּ עַל חֶבֶל מָתוּחַ מֵעַל הַמַּפָּלִים! תַּיָּרִים רַבִּים מְבַקְּרִים בְּמַפְּלֵי נִיאָגָרָה מִדֵּי שָׁנָה וּמִתְפַּעֲלִים מֵהַמַּרְאֶה הַמַּרְהִיב שֶׁל הַמַּיִם הַשּׁוֹצְפִים."}, {"id": "אִי הַפַּסְחָא", "display_name": "אִי הַפַּסְחָא", "category": "landmarks", "text": "אִי הַפַּסְחָא, שֶׁנִּקְרָא גַּם רַפַּה נוּי, הוּא אִי קָטָן בָּאוֹקְיָנוֹס הַשָּׁקֵט. אִי הַפַּסְחָא מָלֵא בְּמֵאוֹת פְּסָלִים עֲנָקִיִּים שֶׁל דְּמֻיּוֹת בְּשֵׁם מוֹאָי, שֶׁנֶּחְצְבוּ מֵאֲבָנִים עֲצוּמוֹת בְּגָדְלָן. הַתּוֹשָׁבִים הָרִאשׁוֹנִים שֶׁל הָאִי הֵם שֶׁפִּסְּלוּ אוֹתָם. הֵם עָבְדוּ בִּקְבוּצוֹת, וְנִדְרְשָׁה לָהֶם שָׁנָה שְׁלֵמָה כְּדֵי לְהַשְׁלִים כָּל פֶּסֶל. אַף אֶחָד עוֹד לֹא יוֹדֵעַ בְּדִיּוּק אֵיךְ הֵם הִצְלִיחוּ לְהוֹבִיל אֶת הַפְּסָלִים הָעֲנָקִיִּים הָאֵלֶּה לִמְקוֹמָם, וְגַם לֹא מַדּוּעַ הֵקִימוּ אוֹתָם."}, {"id": "מָאצ'וּ פִּיצ'וּ", "display_name": "מָאצ'וּ פִּיצ'וּ", "category": "landmarks", "text": "מָאצ'וּ פִּיצ'וּ הָיְתָה עִירָם שֶׁל בְּנֵי הָאִינְקָה – עַם גָּדוֹל שֶׁחַי בִּדְרוֹם אָמֶרִיקָה לִפְנֵי מֵאוֹת שָׁנִים. זֶהוּ אֲתָר קָסוּם, הַשּׁוֹכֵן עַל רֶכֶס שֶׁל הָרִים גְּבוֹהִים בִּמְדִינַת פֶּרוּ. מָאצ'וּ פִּיצ'וּ נִבְנְתָה כַּנִּרְאֶה בְּתוֹר אֲחֻזָּה לַקֵּיסָר שֶׁל הָאִינְקָה. בְּנֵי הָאִינְקָה בָּנוּ בָּהּ בִּנְיְנֵי אֶבֶן יָפִים לָרֹב: אַרְמוֹנוֹת, מִקְדָּשִׁים וּבָתֵּי מְגוּרִים. הֵם הֵקִימוּ גַּם טֶרָסוֹת – מַדְרֵגוֹת מְיֻחָדוֹת בָּהָר – לְצֹרֶךְ גִּדּוּל מָזוֹן. תַּיָּרִים רַבִּים מְבַקְּרִים בְּפֶּרוּ וּמְטַפְּסִים בָּרֶגֶל עַל הֶהָרִים כְּדֵי לַחְזוֹת בַּמַּרְאֶה הַמֻּפְלָא שֶׁל הָאֲתָר."}, {"id": "מַפְּלֵי אִיגוּאַסוּ", "display_name": "מַפְּלֵי אִיגוּאַסוּ", "category": "landmarks", "text": "מַפְּלֵי אִיגוּאַסוּ הֵם מַפָּלִים עֲצוּמִים בִּנְהַר הָאִיגוּאַסוּ, שֶׁזּוֹרֵם בֵּין אַרְגֶּנְטִינָה וּבְּרָזִיל. מַפְּלֵי אִיגוּאַסוּ מֻרְכָּבִים בְּעֶצֶם מִמָּאתַיִם שִׁבְעִים וַחֲמִשָּׁה מַפָּלִים נִפְרָדִים, שֶׁיּוֹצְרִים יַחַד צוּרָה שֶׁל פַּרְסָה. הֶחֵלֶק הֲכִי מַרְשִׁים בַּמַּפָּלִים נִקְרָא \"הַגָּרוֹן שֶׁל הַשָּׂטָן\". סְבִיב הַמַּפָּלִים מְלַבְלְבִים צְמָחִים יְפֵהפִיִּים, וְאֶפְשָׁר לִרְאוֹת שָׁם לְהָקוֹת שֶׁל סִיסִים כֵּהִים – צִפּוֹרִים קְטַנּוֹת שֶׁמִּתְעוֹפְפוֹת יָשָׁר לְתוֹךְ מֵי הַמַּפָּל. לְעִתִּים קְרוֹבוֹת מוֹפִיעָה מֵעַל מַפְּלֵי אִיגוּאַסוּ קֶשֶׁת מַרְהִיבָה."}, {"id": "לוֹךְ נֶס", "display_name": "לוֹךְ נֶס", "category": "landmarks", "text": "לוֹךְ נֶס הוּא אֲגַם גָּדוֹל וְעָמֹק בִּסְקוֹטְלַנְד. יֵשׁ אֲנָשִׁים שֶׁמַּאֲמִינִים כִּי בְּתוֹךְ מֵימָיו הָאֲפֵלִים שֶׁל הָאֲגַם שׁוֹכֵן יְצוּר עֲנָקִי. הֵם קוֹרְאִים לוֹ \"הַמִּפְלֶצֶת מִלּוֹךְ נֶס\", וּבְשֵׁם חִבָּה – נֶסִי. מְסַפְּרִים שֶׁלְּנֶסִי יֵשׁ גּוּף גָּדוֹל וְצַוָּאר אָרֹךְ, כְּמוֹ מִין דִּינוֹזָאוּר שֶׁחַי בַּמַּיִם. יֵשׁ כָּאֵלֶּה שֶׁאֲפִלּוּ צִלְּמוּ אֶת הַמִּפְלֶצֶת. מַדְּעָנִים שֶׁחָקְרוּ אֶת הָאֲגַם טוֹעֲנִים שֶׁכָּל הַסִּפּוּרִים הָאֵלֶּה הֵם שְׁטֻיּוֹת וְשֶׁנֶּסִי לֹא בֶּאֱמֶת קַיֶּמֶת."}, {"id": "קִילִימַנְגָ'רוֹ", "display_name": "קִילִימַנְגָ'רוֹ", "category": "landmarks", "text": "קִילִימַנְגָ'רוֹ הוּא הָהָר הֲכִי גָּבוֹהַּ בְּאַפְרִיקָה, וְלָכֵן יֵשׁ הַקּוֹרְאִים לוֹ \"הַגַּג שֶׁל אַפְרִיקָה\". הוּא נִמְצָא בִּמְדִינַת טַנְזַנְיָה, וְהַפִּסְגָּה הַמְּפֻרְסֶמֶת שֶׁלּוֹ מְכֻסָּה קֶרַח. קִילִימַנְגָ'רוֹ הוּא בְּעֶצֶם הַר גַּעַשׁ רָדוּם, שֶׁאֵינוֹ מִתְפָּרֵץ עוֹד. הָהָר הָעֲנָקִי כּוֹלֵל סְבִיבוֹת רַבּוֹת וְשׁוֹנוֹת: יְעָרוֹת, קְבוּצוֹת שִׂיחִים, בִּצּוֹת קְטַנּוֹת וַאֲפִלּוּ מִדְבָּר. קִילִימַנְגָ'רוֹ הוּא בֵּיתָן שֶׁל חַיּוֹת רַבּוֹת כְּמוֹ פִּילִים, קוֹפִים, עֶדְרֵי בּוּפָלוֹ וְאַנְטִילוֹפּוֹת וַהֲמוֹן צִפּוֹרִים."}, {"id": "בִּיג בֶּן", "display_name": "בִּיג בֶּן", "category": "landmarks", "text": "בִּיג בֶּן הוּא כִּנּוּיוֹ שֶׁל מִגְדַּל שְׁעוֹנִים גָּבוֹהַּ בְּלוֹנְדּוֹן, בִּירַת אַנְגְּלִיָּה. הַשְּׁעוֹנִים בַּמִּגְדָּל הֵם הַגְּדוֹלִים בָּעוֹלָם – הֵם פּוֹנִים לְכָל אַרְבַּעַת הַכִּוּוּנִים, וְכָל מִי שֶׁמַּבִּיט בַּמִּגְדָּל יָכוֹל לִרְאוֹת מָה הַשָּׁעָה. לֹא רַבִּים יוֹדְעִים זֹאת, אֲבָל \"בִּיג בֶּן\" הוּא בְּעֶצֶם שֵׁם הַחִבָּה שֶׁל הַפַּעֲמוֹן הָעֲנָקִי בַּמִּגְדָּל, שֶׁמּוֹדִיעַ עַל הַשָּׁעָה בְּצִלְצוּלָיו, וְלֹא שֶׁל הַמִּגְדָּל עַצְמוֹ. הַפַּעֲמוֹן הַזֶּה, יַחַד עִם עוֹד אַרְבָּעָה פַּעֲמוֹנִים קְטַנִּים יוֹתֵר, מְצַלְצֵל מַנְגִּינָה נְעִימָה שֶׁנִּשְׁמַעַת לְמֵרָחוֹק."}, {"id": "אֶוֶרֶסְט", "display_name": "אֶוֶרֶסְט", "category": "landmarks", "text": "אֶוֶרֶסְט הוּא הָהָר הֲכִי גָּבוֹהַּ בָּעוֹלָם. הוּא נִמְצָא בַּגְּבוּל בֵּין נֶפָּאל לְטִיבֶּט, וְהוּא אֶחָד מֵהָרֵי הַהִימָלַאיָה שֶׁבְּיַבֶּשֶׁת אַסְיָה. פִּסְגַּת הָהָר מְכֻסָּה שֶׁלֶג כָּבֵד בְּכָל יְמוֹת הַשָּׁנָה. הַטִּפּוּס אֶל רֹאשׁ הָהָר הַזֶּה קָשֶׁה וּמְסֻכָּן מְאוֹד: הָאֶוֶרֶסְט הוּא גָּבוֹהַּ וְתָלוּל לְהַחְרִיד, מֶזֶג הָאֲוִיר מַקְפִּיא עֲצָמוֹת, וְלִפְעָמִים יֵשׁ מַפּוֹלוֹת שְׁלָגִים בַּדֶּרֶךְ. וְלַמְרוֹת כָּל זֹאת – אַלְפֵי אֲנָשִׁים אַמִּיצִים כְּבָר הֵעֵזּוּ וְטִפְּסוּ עָלָיו עַד לַפִּסְגָּה!"}, {"id": "הַחוֹמָה הַגְּדוֹלָה שֶׁל סִין", "display_name": "הַחוֹמָה הַגְּדוֹלָה שֶׁל סִין", "category": "landmarks", "text": "הַחוֹמָה הַגְּדוֹלָה שֶׁל סִין הִיא קִיר אָרֹךְ מְאוֹד, שֶׁהַסִּינִים בָּנוּ כְּדֵי לְהָגֵן עַל אַרְצָם מִפְּנֵי אוֹיְבִים. זֶהוּ הַמִּבְנֶה הָאָרֹךְ בְּיוֹתֵר שֶׁהוּקַם בָּעוֹלָם אֵי פַּעַם, וְהַבְּנִיָּה שֶׁלּוֹ נִמְשְׁכָה כִּמְעַט אַלְפַּיִם שָׁנָה! הַחוֹמָה נִבְנְתָה מֵאֶבֶן, מֵעֵץ, מִלְּבֵנִים וּמֵאֲדָמָה. הָעֲבוֹדָה הָיְתָה קָשָׁה בְּיוֹתֵר וְהַפּוֹעֲלִים סָבְלוּ מְאוֹד. הַחוֹמָה הַגְּדוֹלָה שֶׁל סִין אֲרֻכָּה כָּל כָּךְ, שֶׁמְּסַפְּרִים שֶׁאֶפְשָׁר לִרְאוֹת אוֹתָהּ אֲפִלּוּ מֵהֶחָלָל הַחִיצוֹן!"}, {"id": "מִגְדַּל אַיְפֶל", "display_name": "מִגְדַּל אַיְפֶל", "category": "landmarks", "text": "מִגְדַּל אַיְפֶל – שֶׁהוּא הָאֲתָר הֲכִי מְפֻרְסָם בְּפָּרִיז, בִּירַת צָרְפַת – הוּא מִגְדָּל גָּבוֹהַּ מְאוֹד. אִם תַּגִּיעוּ לְפָּרִיז, לֹא תּוּכְלוּ לְפַסְפֵס אוֹתוֹ. הוּא נִבְנָה לִפְנֵי יוֹתֵר מִמֵּאָה שָׁנָה וְנִקְרָא עַל שֵׁם גּוּסְטַב אַיְפֶל, הַבְּעָלִים שֶׁל הַחֶבְרָה שֶׁבָּנְתָה אוֹתוֹ. מִגְדַּל אַיְפֶל עָשׂוּי כֻּלּוֹ מִבַּרְזֶל, וּבַלַּיְלָה הוּא מְקֻשָּׁט בִּשְׁלַל אוֹרוֹת מַרְהִיבִים. מִדֵּי שָׁנָה מְבַקְּרִים בּוֹ מִילְיוֹנֵי תַּיָּרִים, וְרַבִּים מֵהֶם מְטַפְּסִים עַד לְרֹאשׁ הַמִּגְדָּל כְּדֵי לְהַשְׁקִיף עַל פָּרִיז הַיְּפֵהפִיָּה מִלְּמַעְלָה."}, {"id": "אַרְמִיטָאז'", "display_name": "אַרְמִיטָאז'", "category": "landmarks", "text": "מוּזֵאוֹן אַרְמִיטָאז', הַשּׁוֹכֵן בָּעִיר סַנְקְט פֶּטֶרְבּוּרְג בְּרוּסְיָה, הוּא אַחַד הַמּוּזֵאוֹנִים הַגְּדוֹלִים וְהַוָּתִיקִים בְּיוֹתֵר בָּעוֹלָם. הוּא מִשְׂתָּרֵעַ עַל פְּנֵי כַּמָּה וְכַמָּה אַרְמוֹנוֹת וּמִבְנִים מְפֹאָרִים. הַשַּׁלִּיטִים בְּרוּסְיָה, שֶׁנִּקְרְאוּ צָארִים, נָהֲגוּ לְהִתְגּוֹרֵר בְּאַחַד הָאַרְמוֹנוֹת הָאֵלֶּה לִפְנֵי שֶׁהֶחְלִיטוּ לַהֲפֹךְ אוֹתוֹ לְמוּזֵאוֹן. בָּאַרְמִיטָאז' יֵשׁ יוֹתֵר מִשְּׁלוֹשָׁה מִילְיוֹן יְצִירוֹת אָמָּנוּת: צִיּוּרִים, פְּסָלִים, אָמָּנוּת עַתִּיקָה, תַּכְשִׁיטִים וְעוֹד שְׁלַל חֲפָצִים מַקְסִימִים אֲחֵרִים מִמְּקוֹמוֹת שׁוֹנִים וּמִתְּקוּפוֹת שׁוֹנוֹת."}, {"id": "טַאג' מַאהָל", "display_name": "טַאג' מַאהָל", "category": "landmarks", "text": "הַטַּאג' מַאהָל הוּא אַרְמוֹן קְבוּרָה גָּדוֹל וּמְפֹאָר בָּעִיר אַגְרָה שֶׁבְּהֹדּוּ. שַׁלִּיט הֹדִּי בָּנָה אוֹתוֹ לִפְנֵי מֵאוֹת שָׁנִים לְזֵכֶר אִשְׁתּוֹ הָאֲהוּבָה, שֶׁאוֹתָהּ כִּנָּה \"כֶּתֶר הָאַרְמוֹן\" – טַאג' מַאהָל. הָאַרְמוֹן עָשׂוּי כֻּלּוֹ שַׁיִשׁ לָבָן וּמְקֻשָּׁט בַּאֲבָנִים יְקָרוֹת. נִדְרְשׁוּ יוֹתֵר מֵעֶשְׂרִים שָׁנָה כְּדֵי לִבְנוֹת אוֹתוֹ! תַּיָּרִים מִכָּל רַחֲבֵי הָעוֹלָם מַגִּיעִים לִרְאוֹת אֶת הַמִּבְנֶה הַמַּקְסִים. מִחוּץ לָאַרְמוֹן יֵשׁ גַּן גָּדוֹל וְיָפֶה וּבְרֵכַת מַיִם עֲנָקִית."}, {"id": "סְטוֹנְהֶנְג'", "display_name": "סְטוֹנְהֶנְג'", "category": "landmarks", "text": "סְטוֹנְהֶנְג' הוּא מַעְגָּל שֶׁל אֲבָנִים עֲצוּמוֹת, שֶׁנִּבְנָה בְּאַנְגְּלִיָּה לִפְנֵי אַלְפֵי שָׁנִים. אַף אֶחָד אֵינוֹ יוֹדֵעַ בְּדִיּוּק לָמָּה בָּנוּ אֶת סְטוֹנְהֶנְג'. יֵשׁ אוֹמְרִים שֶׁזֶּה הָיָה מָקוֹם שֶׁמִּתְפַּלְּלִים בּוֹ, אוֹ אֲתָר שֶׁל קְבוּרָה. אֲחֵרִים מַאֲמִינִים שֶׁבִּימֵי קֶדֶם נָהֲגוּ לְהִתְכַּנֵּס שָׁם כְּדֵי לִצְפּוֹת בַּשֶּׁמֶשׁ, בַּיָּרֵחַ וּבַכּוֹכָבִים. הָאֲבָנִים שׁוֹקְלוֹת טוֹנוֹת רַבּוֹת – וְאִישׁ עוֹד לֹא גִּלָּה בְּדִיּוּק אֵיךְ הַפּוֹעֲלִים שֶׁבָּנוּ אֶת סְטוֹנְהֶנְג' הִצְלִיחוּ לְהַנִּיחַ אוֹתָן שָׁם."}, {"id": "הַכֹּתֶל הַמַּעֲרָבִי", "display_name": "הַכֹּתֶל הַמַּעֲרָבִי", "category": "landmarks", "text": "הַכֹּתֶל הַמַּעֲרָבִי הוּא אֲתָר בָּעִיר הָעַתִּיקָה שֶׁל יְרוּשָׁלַיִם. לִפְנֵי כְּאַלְפַּיִם שָׁנָה, הַכֹּתֶל הָיָה חֵלֶק מֵהַחוֹמָה שֶׁהִקִּיפָה אֶת בֵּית הַמִּקְדָּשׁ. אַחֲרֵי שֶׁבֵּית הַמִּקְדָּשׁ נֶהֱרַס, הַשָּׂרִיד הַיָּחִיד שֶׁנּוֹתַר מִמֶּנּוּ עַד הַיּוֹם הוּא הַכֹּתֶל הַמַּעֲרָבִי. בְּשָׂפוֹת אֲחֵרוֹת קוֹרְאִים לוֹ \"כֹּתֶל הַדְּמָעוֹת\", כִּי הַיְּהוּדִים שֶׁבָּאוּ לְהִתְפַּלֵּל מוּלוֹ נָהֲגוּ לִבְכּוֹת עַל חֻרְבַּן בֵּית הַמִּקְדָּשׁ. אֲנָשִׁים רַבִּים רוֹשְׁמִים תְּפִלּוֹת, מִשְׁאָלוֹת וּבַקָּשׁוֹת עַל פְּתָקִים קְטַנִּים וְתוֹחֲבִים אוֹתָם בֵּין אַבְנֵי הַכֹּתֶל, בְּתִקְוָה שֶׁיִּתְגַּשְּׁמוּ."}, {"id": "פֶּטְרָה (הַסֶּלַע הָאָדֹם)", "display_name": "פֶּטְרָה (הַסֶּלַע הָאָדֹם)", "category": "landmarks", "text": "פֶּטְרָה הִיא עִיר עַתִּיקָה שֶׁנִּמְצֵאת בְּמִדְבָּר בִּדְרוֹם יַרְדֵּן, בְּאֵזוֹר הֲרֵי אֱדוֹם. הִיא נִבְנְתָה בִּידֵי שֵׁבֶט עַרְבִי קָדוּם, הַנַּבָּטִים, שֶׁחָצְבוּ בָּהָר מִקְדָּשִׁים, אַרְמוֹנוֹת קְבוּרָה, בִּנְיָנִים מַרְהִיבִים וַאֲפִלּוּ תֵּאַטְרוֹן. פֶּטְרָה נִקְרֵאת גַּם \"הָעִיר הַוְּרֻדָּה\", בִּגְלַל צֶבַע הַסְּלָעִים שֶׁמֵּהֶם הִיא בְּנוּיָה, וּבְעִבְרִית – הַסֶּלַע הָאָדֹם. הַנַּבָּטִים חָצְבוּ בָּהּ גַּם תְּעָלוֹת מְיֻחָדוֹת, שֶׁהִזְרִימוּ מַיִם מִמָּקוֹם לְמָקוֹם. בָּעֵת הָעַתִּיקָה הִגִּיעוּ לְפֶּטְרָה אֲנָשִׁים מִכָּל רַחֲבֵי הָעוֹלָם כְּדֵי לִקְנוֹת וְלִמְכֹּר בָּהּ מֶשִׁי וְתַבְלִינִים."}, {"id": "יַם הַמֶּלַח", "display_name": "יַם הַמֶּלַח", "category": "landmarks", "text": "יַם הַמֶּלַח הוּא אֲגַם מֶלַח גָּדוֹל, שֶׁנִּמְצָא בֵּין יִשְׂרָאֵל לְיַרְדֵּן, וְהוּא הַמָּקוֹם הֲכִי נָמוּךְ בָּעוֹלָם. הַמַּיִם בְּיַם הַמֶּלַח מְלוּחִים פִּי עֲשָׂרָה מִמֵּי יָם רְגִילִים, וְלָכֵן דָּגִים אֵינָם יְכוֹלִים לִחְיוֹת בּוֹ. מִי שֶׁנִּכְנָס לְיַם הַמֶּלַח לֹא צָרִיךְ לָדַעַת לִשְׂחוֹת: הַמַּיִם כָּל כָּךְ כְּבֵדִים מֵרֹב מֶלַח, שֶׁאֶפְשָׁר פָּשׁוּט לָצוּף עֲלֵיהֶם! תַּיָּרִים מִכָּל הָעוֹלָם מְבַקְּרִים בְּיַם הַמֶּלַח, חֶלְקָם גַּם כְּדֵי לְהִתְרַפֵּא מִמַּחֲלוֹת שׁוֹנוֹת. רַבִּים מוֹרְחִים עַל גּוּפָם אֶת הַבֹּץ הַשָּׁחוֹר שֶׁבְּחוֹף הַיָּם, כִּי הוּא עָשִׁיר בִּמְלָחִים מְיֻחָדִים וּבְרִיאִים."}, {"id": "מַכְתֵּשׁ רָמוֹן", "display_name": "מַכְתֵּשׁ רָמוֹן", "category": "landmarks", "text": "מַכְתֵּשׁ רָמוֹן, שֶׁנִּמְצָא בַּנֶּגֶב, הוּא הַמַּכְתֵּשׁ הֲכִי גָּדוֹל בְּיִשְׂרָאֵל. מַכְתֵּשׁ הוּא כְּמוֹ בּוֹר עֲנָקִי וְרָחָב בַּקַּרְקַע. רֹב הַמַּכְתְּשִׁים בָּעוֹלָם נוֹצְרוּ מִפְּגִיעָה שֶׁל מֶטֶאוֹרִיט שֶׁנָּפַל מֵהֶחָלָל; אֲבָל מַכְתֵּשׁ רָמוֹן, כְּמוֹ שְׁאַר הַמַּכְתְּשִׁים בַּנֶּגֶב, נוֹצַר לְאֹרֶךְ שָׁנִים רַבּוֹת, שֶׁבָּהֶן זָרְמוּ מַיִם עַל שִׁכְבוֹת הַסֶּלַע וְשָׁחֲקוּ אוֹתָן בְּהַדְרָגָה. בְּמַכְתֵּשׁ רָמוֹן מִתְגּוֹרְרִים בַּעֲלֵי חַיִּים מִסּוּגִים שׁוֹנִים כְּמוֹ יְעֵלִים, שׁוּעָלִים וּנְחָשִׁים, וְאֶפְשָׁר לִמְצֹא בּוֹ הַרְבֵּה סְלָעִים מְיֻחָדִים בִּשְׁלַל צְבָעִים."}, {"id": "הַגַּנִּים הַבָּהָאִים", "display_name": "הַגַּנִּים הַבָּהָאִים", "category": "landmarks", "text": "הַגַּנִּים הַבָּהָאִים הֵם גַּנִּים מְדֹרָגִים יְפֵהפִיִּים שֶׁשּׁוֹכְנִים עַל הַר הַכַּרְמֶל בְּחֵיפָה. הַגַּנִּים הֵם הַמֶּרְכָּז הָעוֹלָמִי שֶׁל אַנְשֵׁי הַדָּת הַבָּהָאִית, שֶׁמַּטִּיפָה לְשָׁלוֹם בָּעוֹלָם וְלִיחָסִים טוֹבִים בֵּין בְּנֵי אָדָם. הַגַּנִּים מֻרְכָּבִים מִתְּשַׁע-עֶשְׂרֵה טֶרָסוֹת, שֶׁהֵן מַדְרֵגוֹת הַבְּנוּיוֹת בָּהָר. בְּמֶרְכַּז הַגַּנִּים נִמְצָא מִקְדַּשׁ הַבַּאבּ, שָׁם קָבוּר מְיַסֵּד הַדָּת הַבָּהָאִית. כְּשֶׁעוֹלִים לַטֶּרָסָה הָעֶלְיוֹנָה, מַגִּיעִים לְתַצְפִּית מַרְהִיבָה עַל הָעִיר חֵיפָה וְעַל הַיָּם."}, {"id": "רוּחַ", "display_name": "רוּחַ", "category": "nature", "text": "רוּחַ הִיא תְּנוּעָה שֶׁל אֲוִיר שֶׁאֶפְשָׁר לְהַרְגִּישׁ בָּהּ. רוּחַ יְכוֹלָה לִהְיוֹת רְגוּעָה וּנְעִימָה, כְּמוֹ רוּחַ יָם קַלָּה, אֲבָל לִפְעָמִים הִיא חֲזָקָה מְאוֹד וַאֲפִלּוּ מְסֻכֶּנֶת, כְּמוֹ בְּסוּפָה פִּרְאִית. רוּחַ יְכוֹלָה לְהָזִיז דְּבָרִים. רוּחוֹת קַלּוֹת מְזִיזוֹת דְּבָרִים קְטַנְטַנִּים כְּמוֹ אָבָק, וְרוּחוֹת חֲזָקוֹת יְכוֹלוֹת לְהָזִיז אֲפִלּוּ בָּתִּים! בְּנֵי אָדָם מִשְׁתַּמְּשִׁים בְּכוֹחַ הָרוּחַ בִּדְרָכִים רַבּוֹת. בֶּעָבָר נָהֲגוּ לִבְנוֹת טַחֲנוֹת רוּחַ, שֶׁהֵזִיזוּ בְּעֶזְרַת הָרוּחַ אֲבָנִים גְּדוֹלוֹת כְּדֵי לִטְחֹן חִטָּה. כַּיּוֹם מִשְׁתַּמְּשִׁים בָּרוּחַ כְּדֵי לְהָפִיק חַשְׁמַל."}, {"id": "אִי", "display_name": "אִי", "category": "nature", "text": "אִי הוּא שֶׁטַח אֲדָמָה מֻקָּף בְּמַיִם. בָּעוֹלָם יֵשׁ אַלְפֵי אִיִּים - בְּמֵי הָאוֹקְיָנוֹסִים, בַּיָּם וַאֲפִלּוּ בָּאֲגַמִּים וּבַנְּהָרוֹת. אִי שֶׁאֲנָשִׁים הֵקִימוּ נִקְרָא אִי מְלָאכוּתִי. יֵשׁ אִיִּים רַבִּים שֶׁאַף אֶחָד לֹא גָּר בָּהֶם; לְמָקוֹם כָּזֶה קוֹרְאִים אִי בּוֹדֵד. לָאִי הַגָּדוֹל בְּיוֹתֵר בָּעוֹלָם קוֹרְאִים גְּרִינְלַנְד, אֲבָל לֹא גָּרִים בּוֹ הַרְבֵּה אֲנָשִׁים, כִּי רֹב הַשֶּׁטַח שֶׁלּוֹ מְכֻסֶּה קֶרַח!"}, {"id": "גֵּיְזֶר", "display_name": "גֵּיְזֶר", "category": "nature", "text": "גֵּיְזֶר הוּא עַמּוּד שֶׁל מַיִם רוֹתְחִים וְקִיטוֹר, שֶׁפּוֹרֵץ בְּעָצְמָה מִתּוֹךְ הָאֲדָמָה. כַּאֲשֶׁר גֵּיְזֶר מִתְפָּרֵץ, הוּא יָכוֹל לְהַגִּיעַ לְגֹבַהּ שֶׁל בִּנְיָן גָּבוֹהַּ. הִתְפָּרְצוּת שֶׁל גֵּיְזֶר מִתְרַחֶשֶׁת כְּשֶׁמַּיִם מִתַּחַת לָאֲדָמָה נַעֲשִׂים חַמִּים כָּל-כָּךְ, שֶׁהֵם חַיָּבִים לִבְקֹעַ הַחוּצָה. יֵשׁ גֵּיְזֶרִים שֶׁמִּתְפָּרְצִים כָּל כַּמָּה דַּקּוֹת, וַאֲחֵרִים מִתְפָּרְצִים כָּל כַּמָּה שָׁעוֹת. יֵשׁ יוֹתֵר מֵאֶלֶף גֵּיְזֶרִים בָּעוֹלָם. רַבִּים מֵהֶם נִמְצָאִים בַּפַּרְק הַלְּאֻמִּי יֶלוֹסְטוֹן שֶׁבְּאַרְצוֹת הַבְּרִית."}, {"id": "בָּרָק", "display_name": "בָּרָק", "category": "nature", "text": "בָּרָק הוּא הֶבְזֵק הָאוֹר הַבָּהִיר שֶׁרוֹאִים בַּשָּׁמַיִם כְּשֶׁיֵּשׁ סוּפַת רְעָמִים, מַמָּשׁ לִפְנֵי שֶׁשּׁוֹמְעִים אֶת הָרַעַם. הָאוֹר נָע מַהֵר יוֹתֵר מִן הַקּוֹל, וְזוֹ הַסִּבָּה שֶׁרוֹאִים אֶת הַבָּרָק לִפְנֵי שֶׁשּׁוֹמְעִים אֶת הָרַעַם. בְּרָקִים עוֹבְרִים בֵּין עָנָן לָאֲדָמָה אוֹ בֵּין שְׁנֵי עֲנָנִים. פְּגִיעַת בָּרָק הִיא כְּמוֹ מַכַּת חַשְׁמַל בְּעָצְמָה אַדִּירָה, וְהִיא חַמָּה אֲפִלּוּ יוֹתֵר מֵהַשֶּׁמֶשׁ! לָכֵן הַבָּרָק מְסֻכָּן מְאוֹד. בִּזְמַן סוּפַת רְעָמִים, כְּדַאי לְהִזָּהֵר וְלֹא לַעֲמֹד מִתַּחַת לְעֵץ אוֹ לְיַד מַיִם."}, {"id": "מַפַּל מַיִם", "display_name": "מַפַּל מַיִם", "category": "nature", "text": "מַפָּל הוּא קֶטַע בְּנָהָר אוֹ בְּנַחַל, שֶׁבּוֹ הַמַּיִם נוֹפְלִים מִמָּקוֹם גָּבוֹהַּ לְתוֹךְ בְּרֵכָה גְּדוֹלָה, וּמִשָּׁם מַמְשִׁיכִים לִזְרֹם הָלְאָה. רֹב הַמַּפָּלִים נוֹצָרִים לְאַחַר שֶׁזֶּרֶם הַמַּיִם מְקַלֵּף בְּהַדְרָגָה שְׁכָבוֹת דַּקּוֹת שֶׁל אֲדָמָה, עַד שֶׁנּוֹצָרִים גְּבָהִים שׁוֹנִים בַּעֲרוּץ הַנַּחַל אוֹ הַנָּהָר. מַפַּל מַיִם הוּא מַרְאֶה יְפֵהפֶה, וְהַצְּלִיל שֶׁל הַמַּיִם הַצּוֹנְחִים וְהַגּוֹעֲשִׁים עָשׂוּי לִהְיוֹת מְרַגֵּשׁ מְאוֹד. הַמַּפָּל הַגָּבוֹהַּ בְּיוֹתֵר בָּעוֹלָם הוּא מַפַּל אַנְחֶל בְּוֶנֶצוּאֶלָה: הוּא גָּבוֹהַּ יוֹתֵר מֵהַבִּנְיָן הֲכִי גָּבוֹהַּ בָּעוֹלָם!"}, {"id": "פֶּרַח", "display_name": "פֶּרַח", "category": "nature", "text": "פֶּרַח הוּא הֶחֵלֶק בַּצֶּמַח שֶׁמּוֹפִיעַ כַּאֲשֶׁר הַצֶּמַח פּוֹרֵחַ. רֹב הַפְּרָחִים הֵם צִבְעוֹנִיִּים וּבַעֲלֵי רֵיחַ נָעִים, וְזֶה חָשׁוּב מְאוֹד, כִּי כָּכָה הֵם מְפַתִּים אֶת הַחֲרָקִים לְהִתְקָרֵב אֲלֵיהֶם. הַחֲרָקִים שׁוֹתִים אֶת הַצּוּף הַמָּתוֹק שֶׁל הַפֶּרַח וְאוֹסְפִים עַל גּוּפָם אֶת הָאַבְקָה שֶׁלּוֹ, שֶׁנִּקְרֵאת פּוֹלֶן; כָּךְ הֵם עוֹזְרִים לַצְּמָחִים לְהִתְרַבּוֹת וּלְהַצְמִיחַ פְּרָחִים חֲדָשִׁים. הַפֶּרַח הֲכִי גָּדוֹל בָּעוֹלָם הוּא הַלּוּף הָעֲנָק, שֶׁגָּדֵל בְּאִינְדּוֹנֶזְיָה. הוּא גָּבוֹהַּ כְּמוֹ בֶּן-אָדָם, אֲבָל פּוֹרֵחַ רַק אַחַת לְכַמָּה שָׁנִים, לְמֶשֶׁךְ שְׁלוֹשָׁה יָמִים בִּלְבַד!"}, {"id": "אַטְמוֹסְפֶרָה", "display_name": "אַטְמוֹסְפֶרָה", "category": "nature", "text": "הָאַטְמוֹסְפֶרָה הִיא כְּמוֹ שְׂמִיכָה בִּלְתִּי-נִרְאֵית שֶׁמְּכַסָּה אֶת הָעוֹלָם וּמְגִנָּה עָלָיו. הִיא שׁוֹמֶרֶת שֶׁהָאֲוִיר שֶׁאָנוּ נוֹשְׁמִים יִשָּׁאֵר קָרוֹב אֵלֵינוּ. הָאַטְמוֹסְפֶרָה הִיא גַּם קְצָת כְּמוֹ מַזְגָן עֲנָקִי: בִּזְכוּתָהּ לֹא חַם מִדַּי בְּמֶשֶׁךְ הַיּוֹם וְלֹא קַר מִדַּי בְּמֶשֶׁךְ הַלַּיְלָה, כְּדֵי שֶׁאֲנָשִׁים, חַיּוֹת וּצְמָחִים יוּכְלוּ לְהַמְשִׁיךְ לִחְיוֹת בְּנוֹחוּת. הָאֵזוֹר שֶׁמִּחוּץ לָאַטְמוֹסְפֶרָה נִקְרָא הֶחָלָל הַחִיצוֹן, וְשָׁם נִמְצָאִים הַיָּרֵחַ, הַשֶּׁמֶשׁ וְכוֹכְבֵי הַלֶּכֶת הָאֲחֵרִים."}, {"id": "קֶשֶׁת בֶּעָנָן", "display_name": "קֶשֶׁת בֶּעָנָן", "category": "nature", "text": "קֶשֶׁת בֶּעָנָן הִיא צוּרַת קֶשֶׁת יָפָה וְצִבְעוֹנִית שֶׁרוֹאִים לִפְעָמִים בַּשָּׁמַיִם, כְּשֶׁיּוֹרֵד גֶּשֶׁם בִּזְמַן שֶׁהַשֶּׁמֶשׁ זוֹרַחַת. הַקֶּשֶׁת הַזֹּאת מֻרְכֶּבֶת מִשִּׁבְעָה פַּסִּים, כָּל פַּס בְּצֶבַע אַחֵר: אָדֹם, כָּתֹם, צָהֹב, יָרֹק, כָּחֹל, כָּחֹל-כֵּהֶה וְסָגֹל. אוֹר הַשֶּׁמֶשׁ הַלָּבָן שֶׁאָנוּ מַכִּירִים הוּא בְּעֶצֶם תַּעֲרֹבֶת שֶׁל כָּל הַצְּבָעִים הָאֵלֶּה. כְּשֶׁאֲנַחְנוּ רוֹאִים קֶשֶׁת, אֲנַחְנוּ רוֹאִים בְּעֶצֶם אֶת אוֹר הַשֶּׁמֶשׁ דֶּרֶךְ טִפּוֹת הַגֶּשֶׁם. הַטִּפּוֹת מַפְרִידוֹת בֵּין הַצְּבָעִים שֶׁבְּאוֹר הַשֶּׁמֶשׁ."}, {"id": "יַעַר גֶּשֶׁם", "display_name": "יַעַר גֶּשֶׁם", "category": "nature", "text": "יַעַר גֶּשֶׁם הוּא יַעַר שֶׁלָּרֹב חַם בּוֹ כָּל יְמוֹת הַשָּׁנָה וְיוֹרֵד הֲמוֹן גֶּשֶׁם. יַעֲרוֹת גֶּשֶׁם צוֹמְחִים בְּהַרְבֵּה אֲרָצוֹת בָּעוֹלָם, כְּמוֹ בְּרָזִיל וְאַפְרִיקָה. רַבִּים מִיַּעֲרוֹת הַגֶּשֶׁם כַּיּוֹם כְּבָר אֵינָם גְּדוֹלִים כְּפִי שֶׁהָיוּ פַּעַם. אֲנָשִׁים כּוֹרְתִים אֶת הָעֵצִים בַּיְּעָרוֹת הָאֵלֶּה כְּדֵי לְהִשְׁתַּמֵּשׁ בָּהֶם כְּחֹמֶר גֶּלֶם, וּמְנַצְּלִים אֶת הַשֶּׁטַח שֶׁהִתְפַּנָּה מֵעֵצִים כְּדֵי לְגַדֵּל יְבוּלִים וְלִבְנוֹת בָּתִּים חֲדָשִׁים. בְּיָמֵינוּ, אֲנָשִׁים רַבִּים מִתְאַמְּצִים לְהַצִּיל אֶת יַעֲרוֹת הַגֶּשֶׁם, שֶׁהֵם בֵּיתָם שֶׁל הַרְבֵּה חַיּוֹת וּצְמָחִים."}, {"id": "עֵמֶק", "display_name": "עֵמֶק", "category": "nature", "text": "עֵמֶק הוּא שֶׁטַח נָמוּךְ וְאָרֹךְ בֵּין שְׁנֵי הָרִים אוֹ שְׁתֵּי גְּבָעוֹת. רֹב הָעֲמָקִים נוֹצָרִים כַּאֲשֶׁר שֶׁלֶג אוֹ קַרְחוֹן נְמַסִּים וְהוֹפְכִים לְמַיִם, וְהַמַּיִם הָאֵלֶּה זוֹרְמִים בְּמִדְרוֹן וְיוֹצְרִים נָהָר. בְּמֶשֶׁךְ הַשָּׁנִים, הַנָּהָר סוֹחֵף אֶת הָאֲדָמָה בְּקַרְקָעִית הֶעָרוּץ שֶׁבּוֹ הוּא זוֹרֵם, וְכָךְ הַקַּרְקַע הוֹלֶכֶת וְשׁוֹקַעַת, עַד שֶׁנּוֹצַר עֵמֶק. הָאֲדָמָה בְּתַחְתִּית הָעֵמֶק הִיא לָרֹב מְצֻיֶּנֶת לְחַקְלָאוּת, וְלָכֵן פַּעַם הֶעֱדִיפוּ אֲנָשִׁים רַבִּים לָגוּר בַּעֲמָקִים וּלְגַדֵּל בָּהֶם צְמָחִים וִיבוּלִים."}, {"id": "לַבָּה", "display_name": "לַבָּה", "category": "nature", "text": "לַבָּה הִיא נוֹזֵל חַם מְאוֹד שֶׁנִּפְלַט מִתּוֹךְ הַר גַּעַשׁ כְּשֶׁהָהָר מִתְפָּרֵץ. צִבְעָהּ שֶׁל הַלַּבָּה בְּדֶרֶךְ כְּלָל כָּתֹם אוֹ אָדֹם. הִיא עֲשׂוּיָה מִסְּלָעִים שֶׁנּוֹצְרוּ מִתַּחַת לָאֲדָמָה, אֲבָל כְּשֶׁהַר הַגַּעַשׁ מִתְפָּרֵץ הַסְּלָעִים מִתְחַמְּמִים כָּל כָּךְ, שֶׁהֵם נְמַסִּים וְהוֹפְכִים לְנוֹזֵל. הַלַּבָּה חַמָּה הַרְבֵּה יוֹתֵר מֵהַתַּנּוּר הֲכִי חַם בָּעוֹלָם! כְּשֶׁלַּבָּה חַמָּה נֶחְשֶׂפֶת לָאֲוִיר שֶׁמִּחוּץ לְהַר הַגַּעַשׁ, הִיא מִתְקָרֶרֶת בְּהַדְרָגָה וְהוֹפֶכֶת לִסְלָעִים, שֶׁנִּקְרָאִים סְלָעִים גַּעֲשִׁיִּים."}, {"id": "אֵשׁ", "display_name": "אֵשׁ", "category": "nature", "text": "אֵשׁ נוֹצֶרֶת מֵחִמּוּם שֶׁל חֹמֶר שֶׁיָּכוֹל לִבְעֹר, כְּמוֹ עֵץ אוֹ נְיָר, וְהִיא מְפִיקָה אוֹר בּוֹהֵק, חֹם וְעָשָׁן. הָאֵשׁ עוֹזֶרֶת לָנוּ: אֲנַחְנוּ מִשְׁתַּמְּשִׁים בָּהּ לְמָאוֹר, לְחִמּוּם וּלְבִשּׁוּל. כְּשֶׁקַּר, נָעִים לָשֶׁבֶת לְיַד אָח בּוֹעֶרֶת, וְכֵּיף לִצְלוֹת מַרְשְׁמֶלוֹ טָעִים עַל מְדוּרָה. אֲבָל אִם הָאֵשׁ יוֹצֵאת מִכְּלַל שְׁלִיטָה, הִיא עֲלוּלָה לְהַשְׁמִיד יְעָרוֹת וְלַהֲרֹס בָּתִּים, אוֹ לִגְרֹם לָנוּ כְּוִיּוֹת כּוֹאֲבוֹת. לָכֵן חָשׁוּב לִנְהֹג בָּהּ בִּזְהִירוּת רַבָּה, וְלִזְכֹּר שֶׁאָסוּר לְשַׂחֵק בְּאֵשׁ אַף פַּעַם."}, {"id": "עָנָן", "display_name": "עָנָן", "category": "nature", "text": "עָנָן הוּא קְבוּצָה שֶׁל טִפּוֹת מַיִם קְטַנְטַנּוֹת וּרְסִיסֵי קֶרַח זְעִירִים שֶׁמִּשְׁקָלָם קַל כְּמוֹ נוֹצָה, וְלָכֵן הֵם מְרַחֲפִים בָּאֲוִיר. הָרוּחַ מְזִיזָה אֶת הָעֲנָנִים וְגוֹרֶמֶת לָהֶם לְשַׁנּוֹת צוּרָה כָּל הַזְּמַן. לִפְעָמִים כֵּיף לְהִסְתַּכֵּל עַל עֲנָנִים וּלְגַלּוֹת בָּהֶם צוּרוֹת שֶׁמַּזְכִּירוֹת לָנוּ כָּל מִינֵי דְּבָרִים. כְּשֶׁהָעֲנָנִים מִתְמַלְּאִים וּמִתְעַבִּים, טִפּוֹת הַמַּיִם שֶׁבָּהֶם מִתְנַגְּשׁוֹת זוֹ בְּזוֹ, מִתְמַזְּגוֹת וְנַעֲשׂוֹת גְּדוֹלוֹת וּכְבֵדוֹת יוֹתֵר. כְּשֶׁהַטִּפּוֹת כְּבֵדוֹת מִדַּי וְלֹא יְכוֹלוֹת לְרַחֵף, הֵן נוֹשְׁרוֹת מַטָּה – וּמַתְחִיל לָרֶדֶת גֶּשֶׁם!"}, {"id": "אוֹקְיָנוֹס", "display_name": "אוֹקְיָנוֹס", "category": "nature", "text": "אוֹקְיָנוֹס הוּא יָם עֲנָקִי שֶׁמַּפְרִיד בֵּין יַבָּשׁוֹת. רֹב שֶׁטַח הָעוֹלָם מְכֻסֶּה בְּאוֹקְיָנוֹסִים. יֵשׁ חֲמִשָּׁה אוֹקְיָנוֹסִים: הָאוֹקְיָנוֹס הַשָּׁקֵט, הָאוֹקְיָנוֹס הָאַטְלַנְטִי, הָאוֹקְיָנוֹס הַהָדִּי, הָאוֹקְיָנוֹס הַדְּרוֹמִי וְאוֹקְיָנוֹס הַקֶּרַח הַצְּפוֹנִי. הַגָּדוֹל מִכֻּלָּם הוּא הָאוֹקְיָנוֹס הַשָּׁקֵט, וְהַחַם מִכֻּלָּם הוּא הָאוֹקְיָנוֹס הַהָדִּי. אוֹקְיָנוֹס הַקֶּרַח הַצְּפוֹנִי נִקְרָא כָּךְ כִּי הוּא מְכֻסֶּה קֶרַח רֹב הַזְּמַן, כָּל כָּךְ קַר שָׁם. בָּאוֹקְיָנוֹסִים יֵשׁ מְקוֹמוֹת עֲמֻקִּים כָּל כָּךְ, שֶׁאוֹר הַשֶּׁמֶשׁ לְעוֹלָם לֹא מַגִּיעַ אֲלֵיהֶם, וְהֵם חֲשׁוּכִים לְגַמְרֵי!"}, {"id": "מַיִם", "display_name": "מַיִם", "category": "nature", "text": "הַמַּיִם הֵם נוֹזֵל שֶׁמְּכַסֶּה אֶת רֹב כַּדּוּר-הָאָרֶץ, וְהֵם חֲשׁוּבִים לָנוּ מְאוֹד. אֲנַחְנוּ שׁוֹתִים מַיִם, מִתְרַחֲצִים בְּמַיִם וּמַשְׁקִים בָּהֶם צְמָחִים כְּדֵי שֶׁיִּגְדְּלוּ. לַמַּיִם אֵין שׁוּם צֶבַע אוֹ רֵיחַ. מַיִם יְכוֹלִים לִהְיוֹת מְלוּחִים, כְּמוֹ בַּיָּם לְמָשָׁל, אוֹ מְתוּקִים, כְּמוֹ בָּאֲגַמִּים וּבַנְּחָלִים. כְּשֶׁיּוֹרֵד גֶּשֶׁם, הַמַּיִם צוֹנְחִים אַרְצָה מֵהָעֲנָנִים. אִם תָּשִׂימוּ מַיִם בְּמָקוֹם קַר מְאוֹד, הֵם יִקְפְּאוּ וְיַהַפְכוּ לְקֶרַח."}, {"id": "רַעַם", "display_name": "רַעַם", "category": "nature", "text": "רַעַם הוּא הָרַעַשׁ הֶחָזָק שֶׁמַּשְׁמִיעַ הַבָּרָק. הַבָּרָק הוּא חַשְׁמַלִּי וְחַם מְאוֹד, וּכְשֶׁהוּא מְחַמֵּם אֶת הָאֲוִיר בִּמְהִירוּת רַבָּה, זֶה גּוֹרֵם לְרַעַשׁ חָזָק מְאוֹד בַּשָּׁמַיִם. הָאוֹר נָע מַהֵר יוֹתֵר מִן הַקּוֹל, וְלָכֵן פְּעָמִים רַבּוֹת אֲנַחְנוּ שׁוֹמְעִים אֶת הָרַעַם אַחֲרֵי שֶׁכְּבָר רָאִינוּ אֶת הַבָּרָק. סוּפַת רְעָמִים הִיא מֶזֶג אֲוִיר סוֹעֵר עִם הַרְבֵּה רְעָמִים וּבְרָקִים. יֵשׁ כָּאֵלֶּה שֶׁחוֹשְׁבִים שֶׁהָרַעַם מַפְחִיד, אֲבָל אַל תִּדְאֲגוּ - הוּא מִתְרַחֵשׁ הַרְחֵק וְלֹא יָכוֹל לִפְגֹּעַ בְּאַף אֶחָד."}, {"id": "הוּרִיקָן", "display_name": "הוּרִיקָן", "category": "nature", "text": "הוּרִיקָן הוּא סוּפָה חֲזָקָה מְלֻוָּה בְּגֶשֶׁם שׁוֹטֵף, בְּרוּחוֹת עַזּוֹת וּבְסוּפוֹת רְעָמִים. הָרוּחַ בַּסּוּפָה חֲזָקָה כָּל כָּךְ, שֶׁהִיא נָעָה מַהֵר יוֹתֵר מִמְּכוֹנִית! מֶרְכַּז הַסּוּפָה נִקְרָא \"עֵין הַסְּעָרָה\": זֶהוּ אֵזוֹר גָּדוֹל, שָׁקֵט וּשְׁטוּף-שֶׁמֶשׁ, אֲבָל הָרוּחוֹת מִסְּבִיבוֹ מְלֵאוֹת עָצְמָה. סוּפוֹת הוּרִיקָן מַתְחִילוֹת בָּאוֹקְיָנוֹס וּמִתְקַדְּמוֹת לְעֵבֶר הַיַּבָּשָׁה, וְהֵן עֲלוּלוֹת לִגְרֹם נְזָקִים גְּדוֹלִים. בְּכָל פַּעַם שֶׁמַּגִּיעַ הוּרִיקַן, החזאים נוֹתֶנים לוֹ שֵׁם – כְּמוֹ אַרְתוּר, אוֹ אַנְדְרֵיאָה."}, {"id": "הַר גַּעַשׁ", "display_name": "הַר גַּעַשׁ", "category": "nature", "text": "הַר גַּעַשׁ הוּא הַר מִסּוּג מְיֻחָד, שֶׁלִּפְעָמִים מִתְפָּרֵץ בְּאֹפֶן פִּתְאוֹמִי - וְאָז נִפְלָט מִמֶּנּוּ הַרְבֵּה חֹמֶר לוֹהֵט, יַחַד עִם סְלָעִים וְאֵפֶר. הַחֹמֶר שֶׁפּוֹרֵץ מִתּוֹךְ הַר הַגַּעַשׁ נִקְרָא לַבָּה. הִתְפָּרְצוּת גַּעֲשִׁית הִיא תּוֹפָעָה מְסֻכֶּנֶת, שֶׁעֲלוּלָה לִגְרֹם נֶזֶק גָּדוֹל. יֵשׁ הַרְבֵּה הָרֵי גַּעַשׁ בָּעוֹלָם. הַר הַגַּעַשׁ הֲכִי גָּדוֹל הוּא מַאוּנָה לוֹאָה, שֶׁנִּמְצָא בְּהַוָּאי. חֵלֶק מֵהָרֵי הַגַּעַשׁ נִקְרָאִים הָרֵי גַּעַשׁ רְדוּמִים: פַּעַם הֵם הָיוּ פְּעִילִים, אֲבָל כַּיּוֹם הֵם כְּבָר לֹא מִתְפָּרְצִים."}, {"id": "טוֹרְנָדוֹ", "display_name": "טוֹרְנָדוֹ", "category": "nature", "text": "סוּפַת טוֹרְנָדוֹ הִיא רוּחַ עַזָּה שֶׁמִּסְתּוֹבֶבֶת בְּמַעְגָּל בִּמְהִירוּת עֲצוּמָה וְנִרְאֵית כְּמוֹ מַשְׁפֵּךְ אָרֹךְ וְצַר. הַקָּצֶה הָעֶלְיוֹן שֶׁל הַטּוֹרְנָדוֹ מְחֻבָּר לְעָנָן, וְהַקָּצֶה הַתַּחְתּוֹן נוֹגֵעַ בָּאֲדָמָה. הַטּוֹרְנָדוֹ נוֹצָר כְּשֶׁיֵּשׁ סוּפַת רְעָמִים. רֹב סוּפוֹת הַטּוֹרְנָדוֹ חַלָּשׁוֹת וְנֶעֱלָמוֹת תּוֹךְ זְמַן קָצָר, אֲבָל סוּפוֹת טוֹרְנָדוֹ חֲזָקוֹת נִמְשָׁכוֹת זְמַן רַב יוֹתֵר; לִפְעָמִים הֵן חֲזָקוֹת כָּל כָּךְ, שֶׁהֵן הוֹרְסוֹת בָּתִּים וְעוֹקְרוֹת עֵצִים. כְּשֶׁסּוּפַת טוֹרְנָדוֹ צְפוּיָה לְהַגִּיעַ, הַתּוֹשָׁבִים בָּאֵזוֹר מְקַבְּלִים אַזְהָרָה מֵרֹאשׁ, כְּדֵי שֶׁיּוּכְלוּ לְהִתְכּוֹנֵן כָּרָאוּי וְלִשְׁמֹר עַל עַצְמָם."}, {"id": "נְוֵה מִדְבָּר", "display_name": "נְוֵה מִדְבָּר", "category": "nature", "text": "נְוֵה מִדְבָּר הוּא אֵזוֹר בְּאֶמְצַע הַמִּדְבָּר שֶׁיֵּשׁ בּוֹ מַיִם וּצְמָחִים. בַּעֲלֵי חַיִּים וַאֲנָשִׁים יְכוֹלִים לָגוּר שָׁם, אוֹ לַעֲצֹר בְּדַרְכָּם כְּדֵי לִשְׁתּוֹת וְלָנוּחַ בַּצֵּל. יֵשׁ נְאוֹת מִדְבָּר קְטַנִּים מְאוֹד, וַאֲחֵרִים שֶׁהֵם גְּדוֹלִים כְּמוֹ עִיר! נְוֵה מִדְבָּר נוֹצָר כְּשֶׁמַּיִם בּוֹקְעִים מִתַּחַת לָאֲדָמָה, וְצִפּוֹרִים מַגִּיעוֹת לְשָׁם לִשְׁתּוֹת. הַצִּפּוֹרִים מַשְׁאִירוֹת בַּמָּקוֹם זְרָעִים שֶׁלִּקְּטוּ, וְכָךְ צוֹמְחִים שָׁם צְמָחִים. עֲצֵי דֶּקֶל חֲשׁוּבִים מְאוֹד לִנְוֵה הַמִּדְבָּר, כִּי הֵם מַעֲנִיקִים צֵל לִשְׁאַר הַצְּמָחִים וְשׁוֹמְרִים שֶׁהַמָּקוֹם לֹא יִתְכַּסֶּה בְּחוֹל. גַּם בְּיִשְׂרָאֵל יֵשׁ לָנוּ נְאוֹת מִדְבָּר – כְּמוֹ עֵין גֶּדִי שֶׁלְּיַד יַם הַמֶּלַח."}, {"id": "יַבֶּשֶׁת", "display_name": "יַבֶּשֶׁת", "category": "nature", "text": "יַבֶּשֶׁת הִיא שֶׁטַח גָּדוֹל מְאוֹד שֶׁל יַבָּשָׁה עַל פְּנֵי כַּדּוּר הָאָרֶץ. יֵשׁ שֶׁבַע יַבָּשׁוֹת: אַסְיָה, אַפְרִיקָה, אָמֶרִיקָה הַצְּפוֹנִית, אָמֶרִיקָה הַדְּרוֹמִית, אֵירוֹפָּה, אוֹסְטְרַלְיָה וְאַנְטְאַרְקְטִיקָה. חֵלֶק מֵהַיַּבָּשׁוֹת, כְּמוֹ אוֹסְטְרַלְיָה, מֻקָּפוֹת בְּמַיִם – כְּמוֹ אִי עֲנָקִי. יַבָּשׁוֹת אֲחֵרוֹת, כְּמוֹ אַסְיָה וְאֵירוֹפָּה, מְחֻבָּרוֹת זוֹ לְזוֹ. כִּמְעַט בְּכָל יַבֶּשֶׁת יֵשׁ הַרְבֵּה מְדִינוֹת, חוּץ מִיַּבֶּשֶׁת אַחַת שֶׁכּוֹלֶלֶת רַק מְדִינָה אַחַת – וְזוֹהִי אוֹסְטְרַלְיָה. אַנְטְאַרְקְטִיקָה הִיא הַיַּבֶּשֶׁת הַיְּחִידָה שֶׁאַף אֶחָד לֹא גָּר בָּהּ – פָּשׁוּט כִּי יוֹתֵר מִדַּי קַר שָׁם!"}, {"id": "מִדְבָּר", "display_name": "מִדְבָּר", "category": "nature", "text": "מִדְבָּר הוּא אֵזוֹר יָבֵשׁ שֶׁלֹּא יוֹרֵד בּוֹ כִּמְעַט גֶּשֶׁם. לָכֵן רַק צְמָחִים וּבַעֲלֵי חַיִּים מְעַטִּים מְאוֹד – כְּמוֹ קַקְטוּסִים וּגְמַלִּים – מְסֻגָּלִים לִחְיוֹת בַּמִּדְבָּר. נָהוּג לַחְשֹׁב שֶׁבְּמִדְבָּרִיּוֹת תָּמִיד חַם מְאוֹד וְהַכֹּל מְכֻסֶּה בְּחוֹל, אֲבָל בְּעֶצֶם יֵשׁ גַּם מִדְבָּרִיּוֹת קָרִים מְאוֹד, שֶׁמְּכֻסִּים בִּסְלָעִים וּבְקֶרַח. אַנְטְאַרְקְטִיקָה, שֶׁהִיא אַחַת מִשֶּׁבַע הַיַּבָּשׁוֹת בָּעוֹלָם, הִיא לְמַעֲשֶׂה מִדְבָּר קַר. הַמִּדְבָּר הֲכִי חַם בָּעוֹלָם, מִדְבַּר סָהָרָה, נִמְצָא בְּאַפְרִיקָה. גַּם הַנֶּגֶב בְּיִשְׂרָאֵל הוּא מִדְבָּר קָטָן."}, {"id": "דְּיוּנָה (חוֹלִית)", "display_name": "דְּיוּנָה (חוֹלִית)", "category": "nature", "text": "דְּיוּנָה הִיא גִּבְעַת חוֹל גְּדוֹלָה. דְּיוּנוֹת נִמְצָאוֹת לָרֹב בְּמִדְבָּרִיּוֹת חַמִּים אוֹ לְיַד חוֹפֵי הַיָּם. דְּיוּנָה נוֹצֶרֶת בִּגְלַל רוּחַ חֲזָקָה אוֹ זִרְמֵי מַיִם, שֶׁמְּזִיזִים אֶת הַחוֹל מִמָּקוֹם לְמָקוֹם. יֵשׁ דְּיוּנוֹת שֶׁעוֹזְרוֹת לָנוּ: לְדֻגְמָה, דְּיוּנוֹת לְיַד חוֹף הַיָּם עוֹצְרוֹת אֶת גַּלֵּי הַיָּם הַגְּדוֹלִים וּמוֹנְעוֹת מֵהֶם לְהָצִיף אֶת הַיַּבָּשָׁה. אֲבָל לִפְעָמִים דְּיוּנוֹת עֲלוּלוֹת גַּם לִגְרֹם נֶזֶק, לְמָשָׁל כְּשֶׁהָרוּחַ מְפַזֶּרֶת אוֹתָן וְהַחוֹל מְכַסֶּה שָׂדוֹת וְגִדּוּלִים חַקְלָאִיִּים. בְּיִשְׂרָאֵל יֵשׁ דְּיוּנוֹת בְּעִקָּר בַּנֶּגֶב, וְלִפְעָמִים גַּם קָרוֹב לְחוֹפֵי הַיָּם."}, {"id": "מוֹחַ", "display_name": "מוֹחַ", "category": "human_body", "text": "הַמּוֹחַ הוּא אֵיבָר גָּדוֹל וְרַךְ בְּתוֹךְ הָרֹאשׁ שֶׁלָּנוּ, וְהוּא כְּמוֹ הַמְפַקֵּד שֶׁל הַגּוּף. בִּלְעָדָיו אֲנַחְנוּ לֹא מְסֻגָּלִים לָחוּשׁ, לַחְשֹׁב אוֹ לַעֲשׂוֹת שׁוּם דָּבָר. הַמּוֹחַ אוֹמֵר לָאֵיבָרִים שֶׁלָּנוּ מָה לַעֲשׂוֹת. לְדֻגְמָה, הוּא זֶה שֶׁגּוֹרֵם לַיָּדַיִם וְלָרַגְלַיִם שֶׁלָּנוּ לָזוּז וְלַפֶּה שֶׁלָּנוּ לְדַבֵּר. דְּבָרִים שֶׁאֲנַחְנוּ זוֹכְרִים, חוֹשְׁבִים וּמְדַמְיְנִים נִמְצָאִים בְּתוֹךְ הַמּוֹחַ. הַמּוֹחַ עוֹזֵר לָנוּ לְהָבִין אֶת הַדְּבָרִים שֶׁקּוֹרִים לָנוּ. אֲפִלּוּ הַחֲלוֹמוֹת שֶׁאֲנַחְנוּ חוֹלְמִים בַּלַּיְלָה מִתְרַחֲשִׁים לְמַעֲשֶׂה בְּתוֹךְ הַמּוֹחַ."}, {"id": "עוֹר", "display_name": "עוֹר", "category": "human_body", "text": "הָעוֹר הוּא הַחֵלֶק הַחִיצוֹנִי שֶׁל הַגּוּף שֶׁלָּנוּ. לְמַעֲשֶׂה, הוּא הָאֵיבָר הֲכִי גָּדוֹל בַּגּוּף! הָעוֹר מֵגֵן עָלֵינוּ, מְקָרֵר אוֹ מְחַמֵּם אֶת הַגּוּף שֶׁלָּנוּ, וְעוֹזֵר לָנוּ לְהַרְגִּישׁ בְּמָה אֲנַחְנוּ נוֹגְעִים וּמָה נוֹגֵעַ בָּנוּ. תָּאֵי הָעוֹר שֶׁלָּנוּ מִתְחַדְּשִׁים כָּל הַזְּמַן. לִפְעָמִים, אִם אֲנַחְנוּ נִפְצָעִים, אַחֲרַי שֶׁהַפֶּצַע מַגְלִיד נִשְׁאָר עַל הָעוֹר סִימָן, שֶׁקּוֹרְאִים לוֹ צַלֶּקֶת. אִם אֲנַחְנוּ שׁוֹהִים בַּשֶּׁמֶשׁ, הָעוֹר שֶׁלָּנוּ מִשְׁתַּזֵּף – אֲבָל חָשׁוּב לְהִזָּהֵר, אַחֶרֶת עֲלוּלִים לְקַבֵּל כְּוִיָּה מִקַּרְנֵי הַשֶּׁמֶשׁ. לָכֵן עָדִיף לִהְיוֹת בַּצֵּל, אוֹ לְהִשְׁתַּמֵּשׁ בְּכוֹבַע וּבִקְרֶם הֲגָנָה."}, {"id": "עֵינַיִם", "display_name": "עֵינַיִם", "category": "human_body", "text": "הָעֵינַיִם הֵן אֵיבָרִים בַּפָּנִים בְּצוּרַת כַּדּוּרִים קְטַנִּים, שֶׁבִּזְכוּתָם אֲנַחְנוּ מְסֻגָּלִים לִרְאוֹת. לָעִגּוּל הַשָּׁחֹר שֶׁבְּאֶמְצַע הָעַיִן קוֹרְאִים אִישׁוֹן. הוּא מְאַפְשֵׁר לָאוֹר לְהִכָּנֵס לְתוֹךְ הָעַיִן. הַחֵלֶק הָאֲחוֹרִי שֶׁל הָעַיִן אוֹסֵף אֶת הַמַּרְאוֹת שֶׁאֲנַחְנוּ רוֹאִים וְשׁוֹלֵחַ אוֹתָם לַמּוֹחַ, שֶׁקּוֹלֵט וּמֵבִין אוֹתָם. כְּשֶׁאֲנַחְנוּ בּוֹכִים, זוֹלְגוֹת לָנוּ דְּמָעוֹת מִתּוֹךְ שַׂקִּיק הַדְּמָעוֹת שֶׁנִּמְצָא בְּזָוִית הָעַיִן שֶׁקְּרוֹבָה לָאַף. הַדְּמָעוֹת עוֹזְרוֹת לָנוּ גַּם כְּשֶׁאֲנַחְנוּ סְתָם מְמַצְמְצִים, כְּדֵי לִשְׁמֹר שֶׁהָעֵינַיִם לֹא יִתְיַבְּשׁוּ וְיִשְׂרְפוּ. יֵשׁ עֵינַיִם בִּצְבָעִים שׁוֹנִים: חוּם, כָּחֹל וְיָרֹק, אֲבָל לֹא מְשַׁנֶּה מָה צֶבָע הָעַיִן, כֻּלָּם רוֹאִים אוֹתוֹ דָּבָר!"}, {"id": "אָזְנַיִם", "display_name": "אָזְנַיִם", "category": "human_body", "text": "הָאָזְנַיִם הֵן אֵיבָרִים קְטַנִּים בִּשְׁנֵי צִדֵּי הָרֹאשׁ, שֶׁבִּזְכוּתָם אֲנַחְנוּ מְסֻגָּלִים לִשְׁמֹעַ. בָּאֹזֶן יֵשׁ שְׁלוֹשָׁה חֲלָקִים: הָאֹזֶן הַחִיצוֹנִית, הָאֹזֶן הַתִּיכוֹנָה (הָאֶמְצָעִית) וְהָאֹזֶן הַפְּנִימִית. הָאֹזֶן הַחִיצוֹנִית אוֹסֶפֶת אֶת הַצְּלִילִים שֶׁנִּשְׁמָעִים סְבִיבֵנוּ, כְּמוֹ דִּבּוּרִים, מוּזִיקָה, רְעָשִׁים אוֹ קוֹלוֹת שֶׁל בַּעֲלֵי חַיִּים. בָּאֹזֶן הַתִּיכוֹנָה יֵשׁ עֲצָמוֹת קְטַנְטַנּוֹת שֶׁעוֹזְרוֹת לַצְּלִילִים הָאֵלֶּה לָנוּעַ פְּנִימָה. הָאֹזֶן הַפְּנִימִית שׁוֹלַחַת אֶת הַצְּלִילִים לַמּוֹחַ, כְּדֵי שֶׁיִּקְלֹט וְיָבִין אוֹתָם. בְּתוֹךְ הָאֹזֶן הַפְּנִימִית יֵשׁ גַּם מַעֲרֶכֶת שֶׁאַחְרָאִית עַל שִׁוּוּי הַמִּשְׁקָל שֶׁל הַגּוּף."}, {"id": "אַף", "display_name": "אַף", "category": "human_body", "text": "הָאַף הוּא אֵיבָר שֶׁנִּמְצָא בְּאֶמְצַע הַפָּנִים, וְהוּא עוֹזֵר לָנוּ לִנְשֹׁם וּלְהָרִיחַ. בָּאַף יֵשׁ שְׁנֵי חוֹרִים מִלְּפָנִים: אֵלֶּה הֵם הַנְּחִירַיִם. כְּשֶׁאֲנַחְנוּ נוֹשְׁמִים, שְׂעָרוֹת קְטַנְטַנּוֹת בְּתוֹךְ הַנְּחִירַיִם שׁוֹמְרוֹת שֶׁלֹּא יַחְדְּרוּ לָאַף אָבָק וְלִכְלוּךְ, כְּדֵי שֶׁהָאֲוִיר שֶׁיִּכָּנֵס לַגּוּף שֶׁלָּנוּ יִהְיֶה נָקִי כְּכָל הָאֶפְשָׁר. עָמֹק בְּתוֹךְ הָאַף יֵשׁ אֵיבָרִים קְטַנְטַנִּים שֶׁאוֹסְפִים רֵיחוֹת שׁוֹנִים מִן הָאֲוִיר. בִּזְכוּתָם אֲנַחְנוּ יוֹדְעִים שֶׁלַּפְּרָחִים יֵשׁ רֵיחַ מַמָּשׁ נָעִים, וְשֶׁאַשְׁפָּה הִיא מַסְרִיחָה!"}, {"id": "דָּם", "display_name": "דָּם", "category": "human_body", "text": "דָּם הוּא נוֹזֵל אָדֹם שֶׁזּוֹרֵם בַּגּוּף שֶׁלָּנוּ, מֵבִיא לָאֵיבָרִים חֳמָרִים שֶׁהֵם זְקוּקִים לָהֶם, וְאוֹסֵף מֵהֶם חֳמָרִים שֶׁהַגּוּף כְּבָר לֹא צָרִיךְ, כְּמוֹ מְלָחִים אוֹ מַיִם. הַלֵּב שׁוֹלֵחַ לְכָל הַגּוּף דָּם עָשִׁיר בְּחַמְצָן, דֶּרֶךְ מַעֲרֶכֶת צִנּוֹרוֹת שֶׁנִּקְרָאִים עוֹרְקִים, וּמַחְזִיר אֵלָיו דָּם עִם \"פְּסֹלֶת\" דֶּרֶךְ מַעֲרֶכֶת שֶׁל צִנּוֹרוֹת אֲחֵרִים, שֶׁנִּקְרָאִים וְרִידִים. בַּדָּם יֵשׁ תָּאֵי דָּם לְבָנִים וַאֲדֻמִּים: הַלְּבָנִים שׁוֹמְרִים עַל הַגּוּף וּמְגִנִּים עָלָיו מִמַּחֲלוֹת וּמַזִּיקִים, וְהָאֲדֻמִּים מַעֲבִירִים לַגּוּף חַמְצָן וָחֳמָרִים חֲשׁוּבִים נוֹסָפִים. לִפְעָמִים, אֲנַחְנוּ מְבַצְּעִים אֵצֶל הָאָחוֹת בְּדִיקַת דָּם, כְּדֵי לְגַלּוֹת כָּל מִינֵי דְּבָרִים עַל הַגּוּף שֶׁלָּנוּ וּמַצָּב בְּרִיאוּתֵנוּ."}, {"id": "כָּבֵד", "display_name": "כָּבֵד", "category": "human_body", "text": "הַכָּבֵד הוּא אֵיבָר בְּתוֹךְ הַגּוּף שֶׁלָּנוּ, בֵּין הֶחָזֶה וְהַבֶּטֶן. הוּא גַּם עוֹזֵר לַקֵּבָה שֶׁלָּנוּ לְעַכֵּל מָזוֹן, וְגַם כְּמוֹ מַחְסָן לְוִיטָמִינִים, לְדָם וּלְעוֹד חֳמָרִים חֲשׁוּבִים שֶׁהַגּוּף שֶׁלָּנוּ צָרִיךְ. הַכָּבֵד עוֹזֵר לְנַקּוֹת מֵהַגּוּף שֶׁלָּנוּ דְּבָרִים שֶׁאָכַלְנוּ אוֹ שָׁתִינוּ וְלֹא עָשׂוּ לָנוּ טוֹב. תַּאֲמִינוּ אוֹ לֹא – הַכָּבֵד הוּא הָאֵיבָר הַיָּחִיד בְּתוֹךְ הַגּוּף שֶׁלָּנוּ שֶׁאִם מוֹרִידִים מִמֶּנּוּ חֵלֶק, הוּא מְסֻגָּל לִצְמֹחַ בַּחֲזָרָה!"}, {"id": "כְּלָיוֹת", "display_name": "כְּלָיוֹת", "category": "human_body", "text": "הַכְּלָיוֹת הֵן שְׁנֵי אֵיבָרִים מִשְּׁנֵי צִדֵּי הַגַּב הַתַּחְתּוֹן שֶׁלָּנוּ, וְכָל כִּלְיָה דּוֹמָה לִשְׁעוּעִית גְּדוֹלָה. הַכְּלָיוֹת מְנַקּוֹת אֶת הַדָּם שֶׁלָּנוּ מִפְּסֹלֶת. הֵן גַּם שׁוֹמְרוֹת שֶׁבַּגּוּף שֶׁלָּנוּ יִהְיוּ מַסְפִּיק מַיִם וָחֳמָרִים אֲחֵרִים שֶׁאֲנַחְנוּ צְרִיכִים. אֶת הַמַּיִם הַמְּיֻתָּרִים, יַחַד עִם שְׁאַר הֶחֳמָרִים שֶׁהַדָּם כְּבָר לֹא צָרִיךְ, הַכְּלָיוֹת הוֹפְכוֹת לְפִּיפִּי, כְּלוֹמַר לַשֶּׁתֶן שֶׁלָּנוּ. הַכְּלָיוֹת עוֹבְדוֹת קָשֶׁה מְאוֹד: הֵן מְנַקּוֹת כָּל יוֹם כַּמּוּת שֶׁל דָּם שֶׁיְּכוֹלָה לְמַלֵּא אַמְבַּטְיָה שְׁלֵמָה!"}, {"id": "לֵב", "display_name": "לֵב", "category": "human_body", "text": "הַלֵּב הוּא שְׁרִיר חָשׁוּב מְאוֹד בְּתוֹךְ הֶחָזֶה שֶׁלָּנוּ, וְהוּא גָּדוֹל בְּעֵרֶךְ כְּמוֹ אֶגְרוֹף. הַלֵּב שׁוֹאֵב וּמַזְרִים דָּם לְכָל הַגּוּף, כְּדֵי לְסַפֵּק לָאֵיבָרִים חַמְצָן וְעוֹד דְּבָרִים חֲשׁוּבִים. אִם אַתֶּם רוֹצִים לְהַרְגִּישׁ אֵיךְ הַלֵּב שֶׁלָּכֶם פּוֹעֵם, שִׂימוּ יָד עַל צַד שְׂמֹאל שֶׁל הֶחָזֶה. הַלֵּב שֶׁלָּנוּ פּוֹעֵם בִּמְהִירוּת כְּשֶׁאֲנַחְנוּ מִתְרַגְּשִׁים, רָצִים אוֹ עוֹשִׂים פְּעִילוּת גּוּפָנִית, כִּי אָז הָאֵיבָרִים שֶׁלָּנוּ צְרִיכִים יוֹתֵר חַמְצָן. כְּשֶׁאֲנַחְנוּ נָחִים, הַלֵּב שֶׁלָּנוּ פּוֹעֵם לְאַט יוֹתֵר."}, {"id": "לָשׁוֹן", "display_name": "לָשׁוֹן", "category": "human_body", "text": "הַלָּשׁוֹן הִיא שְׁרִיר בְּתוֹךְ הַפֶּה שֶׁלָּנוּ, שֶׁעוֹזֵר לָנוּ לֶאֱכֹל וּלְדַבֵּר. עַל הַלָּשׁוֹן יֵשׁ בְּלִיטוֹת קְטַנְטַנּוֹת בְּשֵׁם פְּקָעִיּוֹת טַעַם, שֶׁטּוֹעֲמוֹת כָּל מָה שֶׁהַלָּשׁוֹן נוֹגַעַת בּוֹ, כְּמוֹ אֹכֶל וּשְׁתִיָּה, וּמְזַהוֹת אֶת כָּל הַטְּעָמִים. בִּזְכוּתָן אֲנַחְנוּ יְכוֹלִים לָדַעַת שֶׁגְּלִידָה הִיא מְתוּקָה וְשֶׁלִּימוֹנִים הֵם חֲמוּצִים. הַלָּשׁוֹן גַּם עוֹזֶרֶת לָנוּ לַהֲגוֹת צְלִילִים כְּשֶׁאֲנַחְנוּ מְדַבְּרִים. נַסּוּ לוֹמַר אֶת הַמִּלִּים \"בְּגָדִים שֶׁל לֵיצָן\" בְּלִי לְהִשְׁתַּמֵּשׁ בַּלָּשׁוֹן – זֶה בִּלְתִּי-אֶפְשָׁרִי!"}, {"id": "עֲצַבִּים", "display_name": "עֲצַבִּים", "category": "human_body", "text": "הָעֲצַבִּים הֵם כְּמוֹ שְׁלִיחִים שֶׁמַּעֲבִירִים מֵידָע בֵּין הַמּוֹחַ לְבֵין שְׁאַר הַחֲלָקִים בַּגּוּף שֶׁלָּנוּ, וְהֵם עוֹזְרִים לַגּוּף לָחוּשׁ דְּבָרִים. מַעֲרֶכֶת הָעֲצַבִּים הִיא כְּמוֹ כְּבִישִׁים מְהִירִים מְאוֹד בְּתוֹךְ הַגּוּף, שֶׁמַּעֲבִירִים הוֹדָעוֹת מֵהַמּוֹחַ לָאֵיבָרִים וּמֵהָאֵיבָרִים לַמּוֹחַ. סוּג אֶחָד שֶׁל עֲצַבִּים שׁוֹלֵחַ לַמּוֹחַ הוֹדָעוֹת עַל מָה שֶׁאֲנַחְנוּ רוֹאִים, שׁוֹמְעִים, מַרְגִּישִׁים, טוֹעֲמִים אוֹ מְרִיחִים. כְּשֶׁהַמּוֹחַ רוֹצֶה שֶׁהַגּוּף יַעֲשֶׂה מַשֶּׁהוּ, הוּא מִשְׁתַּמֵּשׁ בְּסוּג אַחֵר שֶׁל עֲצַבִּים כְּדֵי לִשְׁלֹחַ דַּרְכָּם פְּקֻדּוֹת לַשְּׁרִירִים – אֵיךְ לָנוּעַ וּלְאָן."}, {"id": "עֲצָמוֹת", "display_name": "עֲצָמוֹת", "category": "human_body", "text": "הָעֲצָמוֹת הֵן חֲלָקִים קָשִׁים בְּגוּף הָאָדָם שֶׁנּוֹתְנִים לוֹ אֶת צוּרָתוֹ וְיוֹצְרִים אֶת הַשֶּׁלֶד. הָעֲצָמוֹת תּוֹמְכוֹת בַּגּוּף וּמְגִנּוֹת עַל אֵיבָרִים רַכִּים בְּתוֹכוֹ, כְּמוֹ הַלֵּב וְהַמּוֹחַ. עֲצָמוֹת שֶׁמְּחֻבָּרוֹת לִשְׁרִירִים עוֹזְרוֹת לַגּוּף לָנוּעַ. יֵשׁ כָּל מִינֵי סוּגִים וּגְדָלִים שֶׁל עֲצָמוֹת. הָעֶצֶם הֲכִי גְּדוֹלָה בַּגּוּף שֶׁלָּנוּ נִמְצֵאת בַּיָּרֵךְ, וַהֲכִי קְטַנָּה – בְּתוֹךְ הָאֹזֶן. אֲנַחְנוּ נוֹלָדִים עִם 270 עֲצָמוֹת, וּכְשֶׁאֲנַחְנוּ גְּדֵלִים חֶלְקָן מִתְאַחֲדוֹת זוֹ עִם זוֹ. לָכֵן לִמְבֻגָּרִים יֵשׁ 206 עֲצָמוֹת. אִם נִשְׁבֶּרֶת עֶצֶם בַּיָּד אוֹ בָּרֶגֶל, צָרִיךְ לְקַבֵּעַ אוֹתָהּ בְּגֶבֶס עַד שֶׁתִּתְאַחֶה. אֲבָל אַל דְּאָגָה: תּוֹךְ זְמַן קָצָר הִיא תִּתְרַפֵּא וְתִהְיֶה כְּמוֹ חֲדָשָׁה!"}, {"id": "צִפָּרְנַיִם", "display_name": "צִפָּרְנַיִם", "category": "human_body", "text": "הַצִּפָּרְנַיִם הֵן חֵלֶק קָשֶׁה בַּגּוּף שֶׁלָּנוּ שֶׁמֵּגֵן עַל קְצוֹת הָאֶצְבָּעוֹת בְּכַפּוֹת הַיָּדַיִם וְהָרַגְלַיִם. הַצִּפֹּרֶן עֲשׂוּיָה מֵחֹמֶר בְּשֵׁם קֶרָטִין, שֶׁגַּם הַשֵּׂעָר וְהָעוֹר שֶׁלָּנוּ עֲשׂוּיִים מִמֶּנּוּ. מִלְּבַד הֲגָנָה עַל קְצוֹת הָאֶצְבָּעוֹת, לַצִּפָּרְנַיִם יֵשׁ עוֹד תַּפְקִידִים חֲשׁוּבִים, כְּמוֹ לְהַחְזִיק דְּבָרִים קְטַנְטַנִּים אוֹ לְגָרֵד כְּשֶׁמְּגָרֵד לָנוּ. הַצִּפָּרְנַיִם בְּאֶצְבְּעוֹת הַיָּדַיִם וּבְכַפּוֹת הָרַגְלַיִם צוֹמְחוֹת כָּל הַזְּמַן, וּמִדֵּי פַּעַם אֲנַחְנוּ קוֹצְצִים אוֹתָן כְּדֵי שֶׁלֹּא יִהְיוּ אֲרֻכּוֹת מִדַּי! אִם צִפֹּרֶן נוֹפֶלֶת בִּגְלַל מַכָּה, אַל דְּאָגָה: צִפֹּרֶן חֲדָשָׁה תִּגְדַּל בִּמְקוֹמָהּ."}, {"id": "קֵבָה", "display_name": "קֵבָה", "category": "human_body", "text": "הַקֵּבָה הִיא אֵיבָר בְּתוֹךְ הַגּוּף שֶׁלָּנוּ, שֶׁמְּטַפֵּל בָּאֹכֶל וּבַמַּשְׁקָאוֹת שֶׁאֲנַחְנוּ אוֹכְלִים וְשׁוֹתִים. הַקֵּבָה נִמְצֵאת קְצָת מֵעַל הַבֶּטֶן וְנִרְאֵית כְּמוֹ שַׂק קָטָן. אַחֲרֵי שֶׁאֲנַחְנוּ בּוֹלְעִים אֹכֶל, הוּא עוֹבֵר מֵהַגָּרוֹן שֶׁלָּנוּ לַקֵּבָה דֶּרֶךְ צִנּוֹר אָרֹךְ שֶׁקּוֹרְאִים לוֹ וֵשֶׁט. כְּשֶׁהָאֹכֶל מַגִּיעַ לַקֵּבָה, הִיא מְעַרְבֶּבֶת אוֹתוֹ יַחַד עִם מִיץ מְיֻחָד שֶׁיֵּשׁ בָּהּ. הַמִּיץ שֶׁל הַקֵּבָה עוֹזֵר לָנוּ לִשְׁמֹר אֶת הֶחֳמָרִים מֵהָאֹכֶל שֶׁהַגּוּף צָרִיךְ, וּלְהִפָּטֵר מֵהֶחֳמָרִים שֶׁאֲנַחְנוּ לֹא צְרִיכִים."}, {"id": "רֵאוֹת", "display_name": "רֵאוֹת", "category": "human_body", "text": "הָרֵאוֹת הֵן אֵיבָרִים גְּדוֹלִים וַחֲשׁוּבִים מְאוֹד בְּתוֹךְ הֶחָזֶה שֶׁלָּנוּ, שֶׁעוֹזְרִים לָנוּ לִנְשֹׁם. כְּשֶׁאֲנַחְנוּ נוֹשְׁמִים, הָאֲוִיר שֶׁאֲנַחְנוּ שׁוֹאֲפִים נִכְנָס לְתוֹךְ הָרֵאוֹת שֶׁלָּנוּ. בָּאֲוִיר יֵשׁ כָּל מִינֵי חֳמָרִים שֶׁאֲנַחְנוּ צְרִיכִים, כְּמוֹ חַמְצָן, וָחֳמָרִים אֲחֵרִים שֶׁאֲנַחְנוּ לֹא זְקוּקִים לָהֶם, כְּמוֹ אָבָק. הָרֵאוֹת לוֹקְחוֹת אֶת הַחַמְצָן מֵהָאֲוִיר וְשׁוֹלְחוֹת אוֹתוֹ לַדָּם, שֶׁיַּזְרִים אוֹתוֹ לִשְׁאַר הַגּוּף – וּמוֹצִיאוֹת הַחוּצָה אֶת מָה שֶׁהַגּוּף לֹא צָרִיךְ. כְּשֶׁשּׁוֹאֲפִים אֲוִיר, הָרֵאוֹת מִתְנַפְּחוֹת וְאֶפְשָׁר לְהַרְגִּישׁ אֶת בֵּית הֶחָזֶה מִתְרוֹמֵם, וּכְשֶׁנּוֹשְׁפִים אֲוִיר, הָרֵאוֹת מִתְכַּוְּצוֹת וְאֶפְשָׁר לְהַרְגִּישׁ שֶׁגַּם צִדֵּי הַבֶּטֶן מִתְכַּוְּצִים."}, {"id": "רֶחֶם", "display_name": "רֶחֶם", "category": "human_body", "text": "הָרֶחֶם הוּא מָקוֹם בַּבֶּטֶן שֶׁל אִמָּא, שֶׁבּוֹ גָּדֵל הָעֻבָּר – כָּךְ קוֹרְאִים לַתִּינוֹק אוֹ לַתִּינֹקֶת לִפְנֵי שֶׁהֵם נוֹלָדִים. הָעֻבָּר מִתְפַּתֵּחַ בָּרֶחֶם בְּמֶשֶׁךְ תִּשְׁעָה חֳדָשִׁים, בְּתוֹךְ שַׂק מְיֻחָד שֶׁמֵּגֵן עָלָיו וּמְסַפֵּק לוֹ חַמְצָן וּדְבָרִים אֲחֵרִים שֶׁהוּא צָרִיךְ, עַד שֶׁיִּהְיֶה מוּכָן לָצֵאת לָעוֹלָם וּלְהִוָּלֵד. בְּמַצָּב רָגִיל, הָרֶחֶם נִרְאֶה בְּדֶרֶךְ כְּלָל כְּמוֹ אַגָּס קָטָן, אֲבָל כְּשֶׁאִמָּא בְּהֵרָיוֹן, עִם בֶּטֶן גְּדוֹלָה מְאוֹד, הָרֶחֶם שֶׁלָּהּ דּוֹמֶה יוֹתֵר לַאֲבַטִּיחַ!"}, {"id": "רִקְמָה", "display_name": "רִקְמָה", "category": "human_body", "text": "רִקְמָה הִיא אֹסֶף שֶׁל תָּאִים דּוֹמִים שֶׁעוֹבְדִים יַחַד, כְּמוֹ קְבוּצָה, כְּדֵי לְבַצֵּעַ מְשִׂימוֹת בַּגּוּף שֶׁלָּנוּ. לְדֻגְמָה, רִקְמַת שְׁרִירִים הִיא קְבוּצָה שֶׁל תָּאֵי שְׁרִיר שֶׁעוֹבְדִים יַחַד כְּדֵי לִגְרֹם לְחֵלֶק בַּגּוּף לָנוּעַ. רְקָמוֹת יְכוֹלוֹת לִהְיוֹת קָשׁוֹת, כְּמוֹ עֲצָמוֹת, אוֹ רַכּוֹת כְּמוֹ הָעוֹר, וַאֲפִלּוּ נוֹזְלִיּוֹת, כְּמוֹ הַדָּם! הָאֵיבָרִים בַּגּוּף שֶׁלָּנוּ מֻרְכָּבִים מֵרְקָמוֹת. הָרֶגֶל שֶׁלָּנוּ, לְמָשָׁל,  עֲשׂוּיָה בְּעִקָּר מֵרִקְמוֹת עֶצֶם, דָּם, שְׁרִירִים וְעוֹר."}, {"id": "שֶׁלֶד", "display_name": "שֶׁלֶד", "category": "human_body", "text": "הַשֶּׁלֶד הוּא מַעֲרֶכֶת הָעֲצָמוֹת בַּגּוּף שֶׁלָּנוּ, הַמִּבְנֶה שֶׁסְּבִיבוֹ בָּנוּי הַגּוּף. הָעֲצָמוֹת בַּגּוּף מְחֻבָּרוֹת זוֹ לְזוֹ בְּאֹפֶן שֶׁמְּאַפְשֵׁר לָנוּ לָנוּעַ בְּקַלּוּת וּבְצוּרָה בְּטוּחָה. הָעֲצָמוֹת מְחֻבָּרוֹת זוֹ לְזוֹ בְּאֶמְצָעוּת סְחוּסִים, שֶׁשּׁוֹמְרִים שֶׁהָעֲצָמוֹת לֹא יִשְׁחְקוּ אַחַת אֶת הַשְּׁנִיָּה. חֲלָקִים מֵהַשֶּׁלֶד מְגִנִּים עַל הָאֵיבָרִים שֶׁנִּמְצָאִים בְּתוֹךְ הַגּוּף. לְדֻגְמָה, הָעֲצָמוֹת שֶׁבֶּחָזֶה שֶׁלָּנוּ מְגִנּוֹת עַל הַלֵּב וְעַל הָרֵאוֹת, וְהַגֻּלְגֹּלֶת מְגִנָּה עַל הַמּוֹחַ. בַּשֶּׁלֶד כֻּלּוֹ יש יוֹתֵר מִמָּאתַיִם עֲצָמוֹת!"}, {"id": "שִׁנַּיִם", "display_name": "שִׁנַּיִם", "category": "human_body", "text": "הַשִּׁנַּיִם הֵן חֲלָקִים קְטַנִּים בְּתוֹךְ הַפֶּה שֶׁעוֹזְרִים לָנוּ לִלְעֹס אֶת הָאֹכֶל שֶׁאֲנַחְנוּ אוֹכְלִים. כְּשֶׁהַשִּׁנַּיִם שֶׁלָּנוּ לוֹעֲסוֹת אֹכֶל, הֵן חוֹתְכוֹת אוֹתוֹ דַּק-דַּק, כְּדֵי שֶׁלַּגָּרוֹן שֶׁלָּנוּ יִהְיֶה קַל יוֹתֵר לִבְלֹעַ. הַשִּׁנַּיִם מְצֻפּוֹת אֶמַיְל, שֶׁהוּא הַחֹמֶר הֲכִי קָשֶׁה בַּגּוּף, שֶׁשּׁוֹמֵר עַל שְׁלֵמוּתָן. כַּמָּה חֳדָשִׁים אַחֲרֵי שֶׁנּוֹלָדִים מַתְחִילוֹת לִבְקֹעַ 20 הַשִּׁנַּיִם הָרִאשׁוֹנוֹת. בְּגִיל שֵׁשׁ בְּעֵרֶךְ, לִפְעָמִים לִפְנֵי, לִפְעָמִים אַחֲרֵי, הֵן מַתְחִילוֹת לִנְשֹׁר. אֲבָל אַל דְּאָגָה! בִּמְקוֹמָן יִצְמְחוּ 32 שִׁנַּיִם חֲזָקוֹת יוֹתֵר, שֶׁקּוֹרְאִים לָהֶן \"שִׁנַּיִם קְבוּעוֹת\": אִם נִשְׁמֹר עֲלֵיהֶן, הֵן יִשָּׁאֲרוּ לָנוּ בַּפֶּה עַד זִקְנָה וְשֵׂיבָה."}, {"id": "שְׂעָרוֹת", "display_name": "שְׂעָרוֹת", "category": "human_body", "text": "שְׂעָרוֹת הֵן חוּטִים דַּקִּים שֶׁצּוֹמְחִים עַל הָעוֹר בָּרֹאשׁ וּבִמְקוֹמוֹת שׁוֹנִים בַּגּוּף שֶׁלָּנוּ. הַשֵּׂעָר שֶׁעַל הָרֹאשׁ יָכוֹל לִהְיוֹת יָשָׁר, גַּלִּי אוֹ מְתֻלְתָּל, וּבִצְבָעִים שׁוֹנִים: שָׁחֹר, חוּם, אֲדַמְדַּם אוֹ בְּלוֹנְדִּינִי. כְּשֶׁאֲנָשִׁים מִזְדַּקְּנִים, הַשֵּׂעָר שֶׁלָּהֶם מַאֲפִיר וּמַלְבִּין. הַשֵּׂעָר שֶׁלָּנוּ צוֹמֵחַ כָּל הַזְּמַן: כָּל חֹדֶשׁ הוּא מִתְאָרֵךְ בִּקְצָת יוֹתֵר מִסֶּנְטִימֶטֶר! הַצְּמַרְמֹרֶת שֶׁאֲנַחְנוּ מַרְגִּישִׁים כְּשֶׁקַּר לָנוּ נִגְרֶמֶת בְּעֶצֶם כִּי שַׂעֲרוֹת הַגּוּף שֶׁלָּנוּ מִזְדַּקְּפוֹת וְנֶעֱמָדוֹת עַל הָעוֹר. כָּךְ הֵן עוֹזְרוֹת לָנוּ לִשְׁמֹר עַל הַחֹם בְּתוֹךְ הַגּוּף!"}, {"id": "שְׁקֵדִים", "display_name": "שְׁקֵדִים", "category": "human_body", "text": "הַשְּׁקֵדִים הֵם שְׁתֵּי בְּלִיטוֹת בַּחֵלֶק הָאֲחוֹרִי שֶׁל הַגָּרוֹן, וְהֵם שׁוֹמְרִים עָלֵינוּ מִמַּחֲלוֹת שֶׁחוֹדְרוֹת לַגּוּף שֶׁלָּנוּ דֶּרֶךְ הָאֹכֶל שֶׁאֲנַחְנוּ אוֹכְלִים אוֹ דֶּרֶךְ הָאֲוִיר שֶׁאֲנַחְנוּ נוֹשְׁמִים. אֶפְשָׁר לִרְאוֹת אֶת הַשְּׁקֵדִים אִם פּוֹתְחִים פֶּה גָּדוֹל. בְּדֶרֶךְ כְּלָל אֲנַחְנוּ לֹא מַרְגִּישִׁים אֶת הַשְּׁקֵדִים שֶׁלָּנוּ, אֲבָל לִפְעָמִים, אִם יֵשׁ דַּלֶּקֶת בַּגָּרוֹן, הֵם מִתְנַפְּחִים קְצָת, וְזֶה סִימָן שֶׁהֵם עוֹבְדִים כְּדֵי לְהָגֵן עָלֵינוּ. לִפְעָמִים הַשְּׁקֵדִים מִתְנַפְּחִים יוֹתֵר מִדַּי וּמַפְרִיעִים לִנְשֹׁם אוֹ לִבְלֹעַ, וְאָז צָרִיךְ לְהָסִיר אוֹתָם בְּנִתּוּחַ. זֶה נִתּוּחַ פָּשׁוּט מְאוֹד וְהַרְבֵּה יְלָדִים עוֹבְרִים אוֹתוֹ בְּקַלּוּת."}, {"id": "שְׁרִירִים", "display_name": "שְׁרִירִים", "category": "human_body", "text": "הַשְּׁרִירִים הֵם חֲלָקִים בַּגּוּף שֶׁלָּנוּ שֶׁעוֹזְרִים לָנוּ לָזוּז וּלְהַפְעִיל כּוֹחַ. כָּל אֵיבָר בַּגּוּף שֶׁלָּנוּ שֶׁמְּסֻגָּל לָזוּז – יֵשׁ בּוֹ שְׁרִירִים: הַיָּדַיִם, הָרַגְלַיִם, אֲפִלּוּ הָעֵינַיִם. לָכֵן יֵשׁ לָנוּ כָּל כָּךְ הַרְבֵּה שְׁרִירִים – יוֹתֵר מִשֵּׁשׁ-מֵאוֹת! אֲפִלּוּ הַלֵּב שֶׁלָּנוּ הוּא שְׁרִיר. יֵשׁ שְׁרִירִים גְּדוֹלִים מְאוֹד, יֵשׁ קְטַנִּים מְאוֹד וְיֵשׁ בְּגֹדֶל בֵּינוֹנִי. הַשְּׁרִיר הֲכִי קָטָן בַּגּוּף שֶׁלָּנוּ נִמְצָא בְּתוֹךְ הָאֹזֶן. וְהַשְּׁרִיר הֲכִי גָּדוֹל, תַּאֲמִינוּ אוֹ לֹא, נִמְצָא בַּיַּשְׁבָן!"}, {"id": "תָּא", "display_name": "תָּא", "category": "human_body", "text": "הַתָּאִים הֵם אַבְנֵי הַבִּנְיָן שֶׁל הַגּוּף שֶׁלָּנוּ. כְּמוֹ שֶׁבָּתִּים עֲשׂוּיִים מִלְּבֵנִים, כָּל הָאֵיבָרִים בַּגּוּף שֶׁלָּנוּ עֲשׂוּיִים מִתָּאִים. לְכָל סוּג שֶׁל תָּא יֵשׁ מִבְנֶה שׁוֹנֶה וְתַפְקִיד מְיֻחָד מִשֶּׁלּוֹ. לְדֻגְמָה, תָּאֵי דָּם אֲדֻמִּים דּוֹמִים לְכַפְתּוֹרִים קְטַנִּים, וְהֵם מַעֲבִירִים חַמְצָן לְאֶבְרֵי הַגּוּף; תָּאֵי מוֹחַ דּוֹמִים לְכוֹכָבִים קְטַנִּים, וְהֵם מַעֲבִירִים מֵידָע לַמּוֹחַ; וְתָאֵי שְׁרִיר דּוֹמִים לְצִנּוֹרוֹת קְטַנְטַנִּים, וְהֵם מְאַפְשְׁרִים לַשְּׁרִיר לְהִתְכַּוֵּץ וּלְהִמָּתַח. הַחֵלֶק הֲכִי חָשׁוּב בַּתָּאִים נִקְרָא גַּרְעִין, וְהוּא הַמְפַקֵּד שֶׁל הַתָּא. הַתָּאִים בַּגּוּף שֶׁלָּנוּ מִתְחַדְּשִׁים וּמִתְחַלְּפִים כָּל הַזְּמַן."}, {"id": "תּוֹסֶפְתָּן", "display_name": "תּוֹסֶפְתָּן", "category": "human_body", "text": "הַתּוֹסֶפְתָּן הוּא אֵיבָר קָטָן בְּתוֹךְ הַבֶּטֶן. שָׁנִים אֲרֻכּוֹת לֹא יָדְעוּ מַהוּ תַּפְקִידוֹ שֶׁל הַתּוֹסֶפְתָּן בַּגּוּף וְחָשְׁבוּ שֶׁאוּלַי אֶפְשָׁר לִחְיוֹת יָפֶה גַּם בִּלְעָדָיו. הֲרֵי כֻּלָּם יוֹדְעִים מָה עוֹשִׂים הַלֵּב, הַכָּבֵד וְהָרֵאוֹת, אֲבָל מָה בְּדִיּוּק עוֹשֶׂה הַתּוֹסֶפְתָּן? בְּיָמֵינוּ, רוֹפְאִים וּמַדְּעָנִים יוֹדְעִים שֶׁהַתּוֹסֶפְתָּן הוּא כְּמוֹ מַחְסָן שֶׁל חַיְדַּקִּים טוֹבִים, שֶׁעוֹזְרִים לַגּוּף לְהִלָּחֵם בְּחַיְדַּקִּים רָעִים בַּבֶּטֶן שֶׁלָּנוּ כְּשֶׁאֲנַחְנוּ חוֹלִים. מִתְבָּרֵר שֶׁאֲנַחְנוּ דַּוְקָא כֵּן צְרִיכִים אוֹתוֹ!"}, {"id": "יַעַר", "display_name": "יַעַר", "category": "nature", "text": "יַעַר הוּא שֶׁטַח גָּדוֹל שֶׁהֲמוֹן עֵצִים צוֹמְחִים בּוֹ בִּצְפִיפוּת. הַיְּעָרוֹת חֲשׁוּבִים מְאוֹד לְכַדּוּר הָאָרֶץ, כִּי יֵשׁ בָּהֶם הַרְבֵּה חַיּוֹת וּצְמָחִים. הַיְּעָרוֹת גַּם עוֹזְרִים לְיַצֵּר חַמְצָן, שֶׁהוּא הַמַּרְכִּיב הֶחָשׁוּב בָּאֲוִיר שֶׁאֲנַחְנוּ נוֹשְׁמִים. הַיַּעַר הֲכִי גָּדוֹל בָּעוֹלָם הוּא יַעַר הָאָמָזוֹנָס בִּדְרוֹם אָמֶרִיקָה, שֶׁהוּא יַעַר גֶּשֶׁם הַצּוֹמֵחַ מִסָּבִיב לִנְהַר הָאָמָזוֹנָס. יֵשׁ בּוֹ מִילְיַארְדִים שֶׁל עֵצִים וְאַלְפֵי סוּגִים שֶׁל צְמָחִים וּבַעֲלֵי חַיִּים. גַּם בְּיִשְׂרָאֵל יֵשׁ כַּמָּה יְעָרוֹת – כְּמוֹ יַעַר בֶּן שֶׁמֶן, יַעֲרוֹת הַכַּרְמֶל, יַעַר יַתִּיר וְעוֹד."}];

const edgePairCount={};
RAW_EDGES.forEach(e=>{
  const k=e.source<e.target?e.source+'|'+e.target:e.target+'|'+e.source;
  edgePairCount[k]=(edgePairCount[k]||0)+1;
});
function isBiDir(s,t){const k=s<t?s+'|'+t:t+'|'+s;return(edgePairCount[k]||0)>=2;}

const outDeg={},inDeg={};
RAW_NODES.forEach(n=>{outDeg[n.id]=0;inDeg[n.id]=0;});

function init(){

  const links=RAW_EDGES.map(e=>({...e}));
  allNodesData=nodes;

  const defs=d3.select("#arrowDefs");

  zoom=d3.zoom().scaleExtent([0.04,5]).on("zoom",e=>{g.attr("transform",e.transform);updateMinimap();});
  svgEl.call(zoom);
  g=svgEl.append("g");

  linkSel=g.append("g").selectAll("path").data(links).join("path")
    .attr("class","link")
    .attr("stroke",d=>{const s=nodes.find(n=>n.id===d.source);return s?getCatColor(s.category):"#555";})
    .attr("stroke-width",1.2)
    .attr("marker-end",d=>{const s=nodes.find(n=>n.id===d.source);return s?"url(#arrow-"+s.category+")":null;});

  const nodeG=g.append("g").selectAll("g").data(nodes).join("g").attr("class","node")
    .call(d3.drag().on("start",ds).on("drag",dd).on("end",de));
  nodeG.append("circle")

    .on("mouseout",hoverOff);
  labelSel=nodeG.append("text")
