e use the clarinet to play many kinds of music. It has a beautiful, delicate sound, but can also be very noisy!"}, {"id": "Oboe", "display_name": "Oboe", "category": "musical_instruments", "text": "The oboe is an instrument that looks like a clarinet with a thin and long tip. It is a reed instrument, just like the clarinet, and you also play it by blowing air into it and covering different holes. Some people say that if you don't play the oboe properly, it sounds like a duck! In fact, there's a famous musical composition where the oboe pretends to be a duck. It actually sounds very nice!"}, {"id": "Trombone", "display_name": "Trombone", "category": "musical_instruments", "text": "The trombone is a big brass instrument with a deep and warm sound that looks like a long trumpet. The trombone player blows air into it and uses a handle to slide it back and forth. When you slide the trombone, it becomes longer or shorter, and that's how you can play different notes. Sometimes you have to slide the trombone so far away from you to play a note, that you really have to stretch your arms to make it!"}, {"id": "Trumpet", "display_name": "Trumpet", "category": "musical_instruments", "text": "The trumpet is a loud instrument made out of a metal called brass. The trumpet can make different kinds of bright and lively sounds. It's very popular in the orchestra and in jazz music. Trumpets have three buttons that the player presses to make different notes. To play the trumpet, you have to tighten your lips together, attach them to the trumpet, and blow air through your lips. That takes a lot of practice!"}, {"id": "Xylophone", "display_name": "Xylophone", "category": "musical_instruments", "text": "The xylophone is a musical instrument made out of wooden bars. To play it you strike the bars with mallets, which are like hammers. The bars of the xylophone are arranged like the keys of the piano, but each bar has a different length. Long bars play low notes, and short bars play high notes. There are many kinds of xylophones in different parts of the world, and there are also small xylophones made especially for kids!"}, {"id": "Hurricane", "display_name": "Hurricane", "category": "nature", "text": "A hurricane is a wild storm with heavy rain, strong winds, and thunderstorms. The wind is so powerful that it moves faster than a car! The center of a hurricane is called “the eye”—it is a big, sunny, and quiet area, but the winds around it are very strong. Hurricanes begin in the ocean and move to the land, and can sometimes cause a lot of damage. Every time a hurricane arrives, people give it a name, like Arthur or Andrea."}, {"id": "Continent", "display_name": "Continent", "category": "nature", "text": "A continent is a very big area in the world. There are seven continents: Asia, Africa, North America, South America, Europe, Australia, and Antarctica. Some continents, like Australia, are surrounded by water and are like huge islands. Other continents, like Asia and Europe, are connected to each other. Most continents have many countries in them, but one continent has only one country – and that’s Australia. Antarctica is the only continent that no one lives in – it’s just too cold!"}, {"id": "Desert", "display_name": "Desert", "category": "nature", "text": "A desert is a dry area that almost doesn’t get any rain. That’s why very few plants and animals – like cacti or camels – are able to live there. We usually think deserts are very hot and covered with sand, but in fact some deserts are very cold and are covered with rocks and ice. Antarctica, which is one of the world’s continents, is actually a very cold desert. The hottest desert in the world is in Africa. It’s called the Sahara."}, {"id": "Thunder", "display_name": "Thunder", "category": "nature", "text": "Thunder is the loud noise that lightning makes. Lightning is electric and very hot, and when it heats the air very quickly, it makes a very loud noise in the sky. Light moves faster than sound, and that’s why we sometimes hear the thunder after we’ve already seen the lightning. A thunderstorm is a storm with a lot of thunder and lightning. Some people think thunder is frightening, but don’t worry, it happens far away and can’t hurt you."}, {"id": "Oasis", "display_name": "Oasis", "category": "nature", "text": "An oasis is an area with water and plants in the middle of a desert. Animals and people can live there, or take a break to rest, drink, and get some shade. Some oases are very small, and some are as big as cities! An oasis is formed when water comes out from under the ground. Then birds come to drink and leave seeds, and that’s how plants grow in the oasis. Palm trees are important for oases, because they protect them from sand."}, {"id": "Ocean", "display_name": "Ocean", "category": "nature", "text": "An ocean is a huge sea that spreads between continents. Most of the world is covered by oceans. There are five oceans: the Pacific, the Atlantic, the Indian, the Antarctic, and the Arctic Ocean. The biggest ocean in the world is the Pacific Ocean. The warmest ocean is the Indian Ocean. The Arctic Ocean is so cold that it’s usually covered with ice. Sometimes the water in the ocean is so deep, that sunlight never reaches it and it’s completely dark!"}, {"id": "Rainbow", "display_name": "Rainbow", "category": "nature", "text": "A rainbow is a beautiful, colorful bow that we sometimes see in the sky when it rains and the sun shines at the same time. Every rainbow is made out of seven stripes, each in a different color: red, orange, yellow, green, blue, indigo, and violet. When these colors are mixed together they create sunlight. When we see a rainbow, we see the sunlight through the rain drops. The rain drops separate the colors of sunlight from each other."}, {"id": "Cloud", "display_name": "Cloud", "category": "nature", "text": "Clouds are groups of tiny drops of water and tiny pieces of ice that float in the air because they are very light. The wind moves the clouds and causes them to change their shape all the time. Sometimes it’s fun to look at clouds and imagine what things they remind us of. When clouds become more crowded, water drops bump into each other and get bigger and heavier. When the drops are too heavy to float, they fall down and it starts raining!"}, {"id": "Rainforest", "display_name": "Rainforest", "category": "nature", "text": "A rainforest is a forest that’s warm all year long and gets lots of rain. There are rainforests in many places in the world, like Brazil and Africa. Many rainforests are a lot smaller than they used to be. People cut their trees to use their wood, to grow crops, and also to make room for new houses to live in. Today, many people are trying very hard to save the rainforests, which are home for many animals and plants."}, {"id": "Valley", "display_name": "Valley", "category": "nature", "text": "A valley is a long, low place between two hills or mountains. A valley is formed when snow or a glacier melt and water streams downhill and creates a river. After many years the river digs out the bottom of the ground where it flows, and the ground becomes lower and lower, until a valley is formed. The land at the bottom of the valley is usually great for growing plants, and that’s why people lived in valleys for many years."}, {"id": "Forest", "display_name": "Forest", "category": "nature", "text": "A forest is a large area with lots of trees growing close to each other. Forests are very important: many kinds of animals and plants live there. Forests also help making oxygen, which is the stuff in the air that we need for breathing. The biggest forest in the world is the Amazon Rainforest in South America, which grows around the Amazon River. It has billions of trees, and is home for thousands of different kinds of animals and plants."}, {"id": "Fire", "display_name": "Fire", "category": "nature", "text": "Fire is glowing light, heat and smoke created by heating something that can burn, like wood or paper. Fire is good for us: we use it for light, heat and cooking. It’s nice to sit next to a fireplace when it’s cold, or roast tasty marshmallows on bonfires. But if fire gets out of control, it can destroy forests and homes, or cause painful burns to people. That’s why it’s important to be very careful around it and never play with it."}, {"id": "Lava", "display_name": "Lava", "category": "nature", "text": "Lava is a very hot liquid that is thrown out of a volcano during an eruption. Lava is usually orange or red. Lava is made of rocks that are formed under the ground, but it’s so hot during the eruption that they melt and turn into a liquid. Lava is much hotter than the hottest ovens in the world! When hot lava meets the air outside the volcano, it slowly cools down and turns into rocks that are called volcanic rocks."}, {"id": "Tornado", "display_name": "Tornado", "category": "nature", "text": "A tornado is wind that twists very quickly in a circle and looks like a long tube. The top of the tornado is connected to a cloud, and its bottom touches the land. Tornadoes are created in thunderstorms. Most tornadoes are weak and disappear quickly, but strong tornadoes last longer and are sometimes so powerful that they can damage buildings and trees. People are warned before a strong tornado arrives so that they can prepare for it and be safe."}, {"id": "Waterfall", "display_name": "Waterfall", "category": "nature", "text": "A waterfall is a part of a river where its water falls from a high place into a big pool, and the river continues to flow from there. Most waterfalls are created when the river stream slowly removes thin layers of the ground, until different parts of the river have different heights. Waterfalls are beautiful, and the sound of water falling can be very exciting. The highest waterfall in the world is Angel Falls in Venezuela. It’s higher than the world’s tallest building!"}, {"id": "Island", "display_name": "Island", "category": "nature", "text": "An island is an area of land surrounded by water. Islands are found in oceans, seas, and even lakes and rivers. There are thousands of islands in the world. If an island was built by people, it’s called an artificial island. There are many islands that nobody lives on. These islands are called desert islands. The largest island in the world is called Greenland, but not many people live there, because most of it is covered in ice!"}, {"id": "Flower", "display_name": "Flower", "category": "nature", "text": "A flower is the part of the plant that blooms. Flowers are usually colorful and have a nice smell, and that’s very important for them because that’s how they attract insects. The insects drink the flower’s sweet nectar and take the flower’s powder, called pollen, with them. Pollen causes new flowers to grow. The biggest flower in the world, called Titan Arum, grows in Indonesia. It’s as tall as a person, but it blooms only once every couple of years, for just three days!"}, {"id": "Lightning", "display_name": "Lightning", "category": "nature", "text": "Lightning is the bright flash we see in the sky right before we hear a thunder during a thunderstorm. Light travels faster than sound, and that’s why we see the lightning before we hear the thunder. Lightning bolts pass between a cloud and the ground, or between two clouds. Lightning bolts are electric, and they’re even hotter than the Sun! That’s why lightning is very dangerous. If there’s a thunderstorm, be careful: don’t stand under a tree or next to water!"}, {"id": "Geyser", "display_name": "Geyser", "category": "nature", "text": "A geyser is a powerful column of boiling hot water and steam that bursts out of the ground. When a geyser erupts, it can be as high as a tall building. A geyser erupts when water under the ground becomes so hot that it has to burst out. Some geysers erupt every few minutes, and some erupt every few hours. There are more than a thousand geysers in the world. Many of them are in the Yellowstone national park in the United States."}, {"id": "Atmosphere", "display_name": "Atmosphere", "category": "nature", "text": "The atmosphere is like an invisible blanket that covers the world and protects it. It keeps the air we breathe close to us. The atmosphere is also like a huge air-conditioner: it makes sure that it’s not too hot during the day or too cold during the night, so that people, animals, and plants can continue to live comfortably. The area outside of the atmosphere is called outer space, and that’s where the Moon, the Sun, and the rest of the planets are."}, {"id": "Dune", "display_name": "Dune", "category": "nature", "text": "A dune is a big hill made out of sand. Dunes are usually found in hot deserts or near beaches. Dunes are formed by strong winds or water flows, which cause sand to move. Some dunes help us: for example, dunes by the beach block big waves from the sea and prevent them from flooding the land. But sometimes dunes can cause damage, like when the wind causes them to spread and cover fields where people grow crops."}, {"id": "Volcano", "display_name": "Volcano", "category": "nature", "text": "A volcano is a special kind of mountain that sometimes suddenly erupts and a lot of hot materials burst from it, along with rocks and ashes. The material that bursts out from volcanoes is called lava. A volcanic eruption is dangerous and can cause a lot of damage. There are many volcanoes in the world. The largest volcano is Mauna Loa, in Hawaii. Some volcanoes are called dormant volcanoes: they used to be active, but today they don't erupt anymore."}, {"id": "Water", "display_name": "Water", "category": "nature", "text": "Water is a liquid that covers most of the Earth and is very important to us. We drink water, wash ourselves in water, and use it to help plants grow. Water does not have any color or smell. Sometimes, water is salty, like in the sea, and sometimes, it is sweet, like in lakes. When it rains, water comes down from the clouds. When you put water in a very cold place, it becomes ice."}, {"id": "Wind", "display_name": "Wind", "category": "nature", "text": "Wind is the movement of air that we can feel. Wind can be calm and pleasant, like a breeze, but sometimes very strong and even dangerous, like during a wild storm. Wind can move things. Soft winds move tiny things like dust, and powerful winds can move even houses! People use wind’s power in many ways. In the past, they built windmills, that used wind to move large stones that ground wheat. Today wind is used to make electricity."}, {"id": "Planet", "display_name": "Planet", "category": "space", "text": "A planet is a big body in space that moves around a star. Just like a star, it looks like a giant ball. The movement of the planet around the star is called an orbit. Earth, which we live on, is a planet, and the Sun is the star that it orbits. Sometimes, there are also bodies that orbit the planet itself; these are called moons or satellites, like the Moon that we see in the sky at night."}, {"id": "Solar System", "display_name": "Solar System", "category": "space", "text": "The Solar System is the group of planets that orbit the Sun, together with their moons, comets, and other bodies. It is one of many planetary systems in the universe, which are groups of planets that orbit stars. The Solar System is like Earth’s neighborhood in space. The Sun is the star that is in the middle, and eight planets orbit it: first Mercury, and then Venus, Earth, Mars, Jupiter, Saturn, Uranus, and Neptune. Most of them have one or more moons."}, {"id": "Earth", "display_name": "Earth", "category": "space", "text": "Earth is the planet on which we live. It is the only place in the universe that we know about that has people, animals, and plants on it. It has just the right combination of heat and cold to allow things to live. Like the other planets in the Solar System, Earth orbits the Sun. It is the third planet, between Venus and Mars. It takes Earth 365 days to orbit the Sun, and that’s why people decided that should be the length of a year."}, {"id": "Neptune", "display_name": "Neptune", "category": "space", "text": "Neptune is the eighth and last planet in our solar system, after Uranus. It is so far away from the Sun that it takes it almost 165 years to orbit it. Neptune is almost four times bigger than Earth and has 14 moons. The weather on Neptune is very wild. It has a lot of fast winds and powerful storms. Once there was a storm on Neptune that lasted for five straight years!"}, {"id": "Venus", "display_name": "Venus", "category": "space", "text": "Venus is the second planet in our solar system, between Mercury and Earth. It is sometimes called Earth’s twin planet because they are almost the same size. It takes Venus 225 days to orbit the Sun, and it is one of the few planets that don’t have any moons. Venus is also the hottest planet—more than ten times hotter than Earth! It is also the brightest object in our sky, except for the Sun and the Moon."}, {"id": "Saturn", "display_name": "Saturn", "category": "space", "text": "Saturn is the sixth planet in our solar system, between Jupiter and Uranus. It is surrounded by huge, beautiful rings that are made out of pieces of ice, rocks, and dust. These pieces can be as small as grains of sand or as big as buildings. Saturn is the second-largest planet after Jupiter—it’s 764 times bigger than Earth! It takes Saturn 29 and a half years to orbit the Sun, and it has at least 60 moons."}, {"id": "Asteroids", "display_name": "Asteroids", "category": "space", "text": "Asteroids are bodies that orbit the Sun but are smaller than planets. Small asteroids aren’t ball shaped like planets, but instead look like rocks in different forms and sizes. The smallest asteroids are the size of a three-story building. Very big asteroids are ball shaped and are called “dwarf planets.” There are a lot of asteroids all over the Solar System—many of them in the area between Mars and Jupiter. Some asteroids even have their own moons!"}, {"id": "Black Hole", "display_name": "Black Hole", "category": "space", "text": "A black hole is a place in space that’s so heavy that whatever comes into it can never get out. Even light can’t escape black holes, and that’s why we can’t see them! How are black holes created? Well, all bodies have gravity, which is like a magnet that pulls things to their inside. When a star is very big and heavy, its gravity is so strong that it collapses into itself, leaving nothing but a black hole."}, {"id": "Comet", "display_name": "Comet", "category": "space", "text": "A comet is a body in the Solar System that looks like it has a shiny tail. It is made of ice and frozen rocks. A comet comes from very far away from the Sun, but when it gets closer to it, the Sun’s heat turns its ice into gas or dust—that’s why comets seem to have a shiny tail. Sometimes, we can see comets in the sky. The most famous comet, Halley’s Comet, visits Earth’s skies once every 75 years."}, {"id": "Meteoroid", "display_name": "Meteoroid", "category": "space", "text": "A meteoroid is a small rock that travels in space. Some meteoroids are the same size as you, and some are as small as grains of sand. Most meteoroids used to be parts of comets or asteroids, but now, they are on their own. When meteoroids enter the Earth’s skies, they become hotter and the heat makes them glow. These are the shooting stars we sometimes see at night. Quickly make a wish! Maybe it’ll come true!"}, {"id": "Galaxy", "display_name": "Galaxy", "category": "space", "text": "A galaxy is a group of many stars, including everything that orbits them, like planets, moons, and asteroids. All of these stars stay close to each other because of their gravity, which is a force that is like a magnet that pulls something toward a body. There are many galaxies in space. The galaxy that we live in is called the Milky Way. If the Solar System is like Earth’s neighborhood, then the Milky Way is like Earth’s city."}, {"id": "Jupiter", "display_name": "Jupiter", "category": "space", "text": "Jupiter is the fifth planet in the Solar System, between Mars and Saturn. Jupiter is the largest planet—you can fit Earth inside it more than 1,000 times! It also has many moons—at least 67! It takes Jupiter almost 12 years to orbit the Sun. When we look at Jupiter with a telescope, it seems to have a giant red spot on it. It is actually a huge hurricane, and it has been going on for hundreds of years."}, {"id": "Mercury", "display_name": "Mercury", "category": "space", "text": "Mercury is the first planet in the Solar System. Mercury is the planet that is the closest to the Sun, and that’s why it takes only 88 days to orbit the Sun. Mercury is one of the few planets that don’t have any moons. Mercury is the smallest planet—Earth is 18 times bigger than Mercury! Mercury is boiling hot during the day. Only Venus is hotter than Mercury. But at night, Mercury is freezing cold."}, {"id": "Mars", "display_name": "Mars", "category": "space", "text": "Mars is the fourth planet in the Solar System, between Earth and Jupiter. It’s a small planet—Earth is twice as big. Only Mercury is smaller than Mars. It takes Mars almost two years to orbit the sun. Mars’ surface is like a cold, red desert, and it has plenty of mountains and volcanoes. Scientists have built special machines called “rovers” that were sent to explore Mars. Rovers take pictures of Mars’ surface and help us learn more about it."}, {"id": "Milky Way", "display_name": "Milky Way", "category": "space", "text": "The Milky Way is the galaxy that we live in. It has billions of stars, planets, and other bodies in it. In fact, the Solar System is only a tiny part of the Milky Way. It is called the Milky Way because when you look at it in the sky at night, it seems like a white patch of milk. If you use a telescope, you can see that this milky white patch is actually a group of many stars that are close to each other."}, {"id": "Pluto", "display_name": "Pluto", "category": "space", "text": "Pluto is a body in the Solar System that people used to think was the ninth planet, after Neptune. Today, scientists call Pluto a dwarf planet, which is actually a big asteroid, because it’s too small to be called a planet. Pluto is made out of rocks and ice and is very cold. Because it’s very far from the Sun, it takes Pluto almost 250 years to orbit it! And although Pluto is very small, it still has five moons!"}, {"id": "Satellite", "display_name": "Satellite", "category": "space", "text": "A satellite is a machine that is sent from Earth to space. Satellites usually orbit Earth, but some of them were sent to orbit the Moon, the Sun, and some of the planets. There are thousands of satellites orbiting Earth, and they are used in many ways. Some satellites help forecast the weather, some help scientists with their explorations, some help airplanes find their way in the sky, and most importantly, they can transmit TV shows all over the world!"}, {"id": "Star", "display_name": "Star", "category": "space", "text": "A star is a huge, shiny ball-shaped body in space. There are billions of stars, and we can see many of them shine at night. The Sun is the star that’s closest to us. Many stars have planets and other bodies that orbit them, and together they form a group that’s called a planetary system. Bodies in space usually can’t shine by themselves, and can only be seen if a star’s light shines on them, just like a flashlight."}, {"id": "Sun", "display_name": "Sun", "category": "space", "text": "The Sun is the star that is closest to Earth. The planets in the Solar System orbit it. The Sun is very important to us. It is just the right distance from Earth to make it possible for animals and plants to live here—it keeps Earth warm, but not too hot. Without the Sun, we wouldn’t have light or energy. The Sun is the brightest thing in the sky. Never look directly at it—it can really hurt your eyes!"}, {"id": "Uranus", "display_name": "Uranus", "category": "space", "text": "Uranus is the seventh planet in the Solar System, between Saturn and Neptune. It is the first planet that was discovered with a telescope. Until Uranus was discovered, people thought that Saturn was the last planet in the Solar System. Uranus is more than 60 times bigger than Earth, and is the coldest planet. Uranus has 27 moons. Uranus has rings around it, like Saturn, but they’re thin and dark, and that’s why it’s difficult to see them."}, {"id": "Supernova", "display_name": "Supernova", "category": "space", "text": "A supernova is an explosion of a giant star. The explosion causes a light so strong that it covers the light of all of the other stars in the exploding star’s galaxy. A supernova happens when the star’s gravity, which is the force that attracts things to its center, becomes so powerful that the star can’t hold itself together anymore. It can also happen when a star’s source of energy runs out. Sometimes, after the star explodes, it turns into a black hole."}, {"id": "Moon", "display_name": "Moon", "category": "space", "text": "“Moon” is the name we use to describe a body in space that orbits a planet. Most planets in the Solar System have moons. The Moon we see at night orbits Earth. It is the only place outside of Earth that astronauts actually visited. When we look at the Moon in the sky, sometimes it’s only half full and sometimes it’s even as thin as a banana! That’s because Earth casts its shadow on a part of it."}, {"id": "Shooting Star", "display_name": "Shooting Star", "category": "space", "text": "A shooting star is the name that we use for what scientists call a meteor. There are many small rocks, called meteoroids, which travel in space. When these rocks enter Earth’s skies, they become hotter and the heat makes them glow. These glowing rocks look like lights that fall from the sky, and that’s why they’re called shooting stars, even though they’re not really stars. If you want to make a wish when you see one, hurry, they usually disappear very quickly!"}, {"id": "Orbit", "display_name": "Orbit", "category": "space", "text": "‫An orbit is when a body in space moves in a circle around a bigger body. For example, the Moon orbits Earth, and all of the planets in the Solar System orbit the Sun. The Moon orbits Earth because Earth’s gravity, which is like a magnet, makes sure the Moon can’t move away from it, and actually forces the Moon to move in a circle around Earth.‬ It takes the moon one month to complete one circle around Earth. That’s called the moon’s orbital period."}, {"id": "Dim Sum", "display_name": "Dim Sum", "category": "traditional_food", "text": "Dim sum is traditional food that comes from China. Dim sums are small dishes and dumplings that can be made from rice flour, white flour, or all kinds of leaves, and are stuffed with many different fillings—meat or vegetables. Dim sum dishes are usually steamed or fried and served in bamboo baskets. The phrase “dim sum” means “to touch the heart.” In China, dim sum is usually served with tea as a snack, or as the main dish."}, {"id": "Falafel", "display_name": "Falafel", "category": "traditional_food", "text": "Falafel is a small ball made from ground chickpeas or fava beans that are mixed with herbs and spices. It is usually deep-fried in oil. Falafel is Israel’s national food, although it is also eaten in Arab countries and has probably come from Egypt or maybe even India! The best way to eat falafel is to stuff it in pita bread, which is a special flat bread that can hold food like a pocket, along with vegetable salad and tahini."}, {"id": "Fajita", "display_name": "Fajita", "category": "traditional_food", "text": "A fajita is a kind of food that belongs to a cooking style called Tex-Mex, which means Mexican food that is made in Texas. Fajitas are made of pieces of meat—beef, chicken, or pork—which are cooked on a grill, together with peppers, onions, and spices. Fajitas are usually served as a filling in flat rolled bread, which is called a tortilla. Salsa sauce, sour cream, chopped tomato, and cheese can be added to it."}, {"id": "Miso Soup", "display_name": "Miso Soup", "category": "traditional_food", "text": "Miso soup is a dish that comes from Japan. It is a soup made from a mixture of a basic Japanese soup called dashi, which is made out of fish, fungus, or seaweed, and a paste called miso, which is made out of soybeans, fungus, and salt. In Japan, miso soup is eaten for breakfast, together with white rice. Japanese people drink miso soup directly from deep bowls, and use chopsticks to grab the solid ingredients that are in it."}, {"id": "Moussaka", "display_name": "Moussaka", "category": "traditional_food", "text": "Moussaka is a dish that comes from an area in Europe called the Balkans. You can also find moussaka in Turkey and in Arab countries. Each place has its own special way of making moussaka, but the most famous is the Greek moussaka: it is made out of layers of eggplant and ground meat with tomatoes and spices, topped with a special sauce that is made from milk and flour."}, {"id": "Pizza", "display_name": "Pizza", "category": "traditional_food", "text": "Pizza is a baked Italian dish that is loved and eaten all over the world. It is usually made from flattened and rounded dough, spread with tomato sauce and topped with cheese. Pizza is made in a pizzeria and is usually cut into slices. You can put on your pizza almost any topping you can think of. It can come with a thick or thin crust, with pepperoni, with all kinds of cheese, and sometimes even without cheese at all!"}, {"id": "Ramen", "display_name": "Ramen", "category": "traditional_food", "text": "Ramen is a dish that comes from Japan. It is a meat or fish soup with wheat noodles. It is flavored with soy sauce or with miso paste, which is made out of soybeans, fungus, and salt. Ramen can come with different toppings: vegetables, pork, chicken, fish, seaweed, corn, bamboo shoots, eggs, butter, and more, and can be made in many different ways. Ramen is so popular in Japan that they even have a special museum for it!"}, {"id": "Risotto", "display_name": "Risotto", "category": "traditional_food", "text": "Risotto is a dish that comes from Italy and that is made from round white rice. The name “risotto” comes from the Italian word “riso,” which means “rice.” There are many recipes for risotto, but in almost all of them, you should first cook the rice with onions and butter or olive oil, and then add flavored water slowly while stirring. Risotto is a bit more sticky and wet than regular rice. Italians eat risotto before the meal’s main course"}, {"id": "Udon Noodles", "display_name": "Udon Noodles", "category": "traditional_food", "text": "Udon noodles come from Japan. They are thick and white, and made from flour, salt, and water. Udon noodles are soft and chewy. There are many ways to eat udon noodles: they can be served hot or cold, cooked in soup, or fried with soy sauce and vegetables. Dishes with udon noodles can have many different toppings, like green onions, ginger, raw egg, and seaweed. In Japan, if you make loud noises while eating udon noodles, you are actually very polite!"}, {"id": "Taco", "display_name": "Taco", "category": "traditional_food", "text": "Taco is a dish that comes from Mexico. It is a tortilla—flat bread made from corn or wheat flour—that is folded and filled with different things: meat, chicken, seafood, cheese, and vegetables. Tacos are also very popular in the United Stated and in other places. A taco is eaten like a sandwich, and you can add to it salsa, fresh vegetables, parsley, sour cream, and guacamole, which is a Mexican avocado dip."}, {"id": "Sushi", "display_name": "Sushi", "category": "traditional_food", "text": "Sushi is a small dish that comes from Japan. It is made from special rice that is cooked with vinegar and mixed with raw fish or vegetables. There are many different kinds of sushi; some of them are wrapped in seaweed or in fried tofu, which is made from soybeans. Sushi is served and eaten with soy sauce, sliced ginger, and wasabi, which is a very spicy paste. Some kinds of sushi are eaten with chopsticks and others are eaten with the fingers."}, {"id": "Spaghetti", "display_name": "Spaghetti", "category": "traditional_food", "text": "Spaghetti is a kind of long and thin pasta. Like all pastas, spaghetti is an Italian dish, although pasta was eaten in China long before it came to Italy. Spaghetti is made from wheat flour and water, and is eaten with all kinds of sauces, like tomato sauce, olive oil, cream, and Bolognese sauce, which is made with ground meat. If you don’t want to make a mess, the best way to eat spaghetti is to wind it around your fork."}, {"id": "Pavlova", "display_name": "Pavlova", "category": "traditional_food", "text": "Pavlova is a delicious sweet dessert that comes from Australia and New Zealand. It is named after a famous Russian ballet dancer called Anna Pavlova who visited these countries almost 100 years ago. Pavlova is crispy on the outside and soft on the inside, and it is made from whipped egg whites and sugar. Pavlova is served with whipped cream and fresh fruit—usually berries, but also other kinds."}, {"id": "Kebab", "display_name": "Kebab", "category": "traditional_food", "text": "A kebab is a long meatball, made from minced meat—usually lamb, but sometimes beef—and mixed with onion, herbs, and spices. It was originally a Persian and Arabic dish, but today, it is eaten all over the world, in many shapes and sizes. A kebab is usually cooked on a grill with a skewer. It can be served inside pita bread as a sandwich, or on a plate, sometimes on white rice."}, {"id": "Fish and Chips", "display_name": "Fish and Chips", "category": "traditional_food", "text": "Fish and chips is a hot dish that comes from England. It is made from fish that are covered with a mixture of flour and water. The fish are deep-fried together with chips, which are sliced potatoes. It’s a simple dish that you can buy in fish-and-chip shops and take with you or order on a plate in a restaurant. Fish and chips is usually served with lemon and mushy peas."}, {"id": "Frankfurter", "display_name": "Frankfurter", "category": "traditional_food", "text": "A frankfurter is a sausage that comes from the city of Frankfurt in Germany. A frankfurter is long and thin, and it is made from minced pork and spices. The frankfurter is probably the first hot-dog in history! You don’t cook a frankfurter sausage—instead, you put it in hot water for about ten minutes. Frankfurters are served in a roll with mustard or horseradish, and sometimes also with potato salad."}, {"id": "Gazpacho", "display_name": "Gazpacho", "category": "traditional_food", "text": "Gazpacho is a cold soup that comes from Spain. There are many different ways of making gazpacho, but the most popular kind is made with tomatoes, olive oil, garlic, onions, peppers, cucumbers, and vinegar. Gazpacho is very refreshing and it’s best to drink it on a hot summer’s day. There’s a famous Spanish saying: “De gazpacho no hay empacho”—there’s never too much gazpacho. It means that you can never have too much of a good thing!"}, {"id": "Hamburger", "display_name": "Hamburger", "category": "traditional_food", "text": "A hamburger is one of the most popular American fast foods, and it is eaten all over the world. A hamburger is actually a sandwich: a large flattened meatball that comes in a round bun, together with lettuce, tomato, onion, and pickles. The hamburger got its name from Hamburg, a large city in Germany. Hamburgers are usually served with French fries and different kinds of sauces: ketchup, mayonnaise, mustard, and barbecue sauce."}, {"id": "Hummus", "display_name": "Hummus", "category": "traditional_food", "text": "Hummus is a tasty paste that comes from Arab countries. It is made from chickpeas that are cooked, mashed, and mixed with tahini, lemon juice, garlic, olive oil, and spices. You can eat it with bread, as the main spread, or as an addition to falafel, kebab, or almost any other dish. Another fun way to eat hummus is to wipe it from your plate using pita bread. Fresh hummus is not only tasty, but healthy as well!"}, {"id": "Fortune Cookie", "display_name": "Fortune Cookie", "category": "traditional_food", "text": "Fortune cookies are special cookies that hide a special message inside them. When you break the cookie, you find a small piece of paper inside that has words of wisdom written on it. Sometimes, the cookie even tries to guess your future! Fortune cookies are usually served at the end of a meal in Chinese restaurants all over the world. But strangely, you almost never find them in China!"}, {"id": "Baguette", "display_name": "Baguette", "category": "traditional_food", "text": "The baguette is a traditional bread that comes from France. A baguette is long and narrow, and that’s how it got its name. “Baguette” is a word in French that means “wand” or “stick.” A baguette is very crispy from the outside, and soft and light on the inside. French people eat it with cheese, butter, jam, or pâté, which is a spread made out of ground meat. Baguettes are also used for making very tasty sandwiches."}, {"id": "Borscht", "display_name": "Borscht", "category": "traditional_food", "text": "Borscht is a pinkish sour soup made out of beetroot. It originally comes from Ukraine, but it is also popular in other countries, like Russia and Poland. Borscht can be served hot or cold. Hot dishes usually also include meat and potatoes, and are served with bread. Cold dishes usually include vegetables and are served with sour cream. According to an old Ukrainian tradition, if you stick a wooden spoon inside a pot of borscht and it stands straight, the soup is ready!"}, {"id": "Croissant", "display_name": "Croissant", "category": "traditional_food", "text": "A croissant is a tasty pastry that comes from France. It is made out of layers of dough and butter and has a curvy shape, like a crescent. Croissants are usually eaten for breakfast. In France, you can buy a freshly baked croissant and eat it immediately. You can also by frozen croissants and put them in the oven at home. Croissants can be plain or filled with almond paste, chocolate, or fruit. Sometimes, they have a sweet glazing on top."}, {"id": "Chapati", "display_name": "Chapati", "category": "traditional_food", "text": "Chapati is a traditional bread that comes from India and looks like a pancake. It is made out of only flour, salt, and water. When people make chapati they don’t bake it in an oven, but cook it, on both sides, on a hot pan, which is called a griddle. You can eat chapati stuffed and rolled like a cone, or tear off pieces of it and use them to grab meat or vegetables."}];

// Bi-directional pair detection for curved edges
const edgePairCount={};
RAW_EDGES.forEach(e=>{
  const k=e.source<e.target?e.source+'|'+e.target:e.target+'|'+e.source;
  edgePairCount[k]=(edgePairCount[k]||0)+1;
});
function isBiDir(s,t){const k=s<t?s+'|'+t:t+'|'+s;return(edgePairCount[k]||0)>=2;}

// In/out degree
const outDeg={}, inDeg={};
RAW_NODES.forEach(n=>{outDeg[n.id]=0;inDeg[n.id]=0;});
RAW_EDGES.forEach(e=>{outDeg[e.source]=(outDeg[e.source]||0)+1;inDeg[e.target]=(inDeg[e.target]||0)+1;});

let labelsVisible=true, activeCategories=new Set(RAW_NODES.map(n=>n.category));
let navigationHistory=[], historyIndex=-1;
let simulation, zoom, svgEl, g, linkSel, nodeSel, labelSel;
let currentSortField='name', currentSortDir=1;
let allNodesData=[];

function init(){
  const nodes=RAW_NODES.map(n=>({...n,out:outDeg[n.id]||0,inp:inDeg[n.id]||0,degree:(outDeg[n.id]||0)+(inDeg[n.id]||0)}));
  const links=RAW_EDGES.map(e=>({...e}));
  allNodesData=nodes;

  // Arrow markers per category
  const defs=d3.select("#arrowDefs");
  [...new Set(nodes.map(n=>n.category))].forEach(cat=>{
    defs.append("marker").attr("id","arrow-"+cat)
      .attr("viewBox","0 -5 10 10").attr("refX",23).attr("refY",0)
      .attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto")
      .append("path").attr("d","M0,-5L10,0L0,5").attr("fill",getCatColor(cat)).attr("fill-opacity",0.75);
    defs.append("marker").attr("id","arrow-hi-"+cat)
      .attr("viewBox","0 -5 10 10").attr("refX",23).attr("refY",0)
      .attr("markerWidth",7).attr("markerHeight",7).attr("orient","auto")
      .append("path").attr("d","M0,-5L10,0L0,5").attr("fill",getCatColor(cat)).attr("fill-opacity",1);
  });

  svgEl=d3.select("#graph");
  const cont=document.getElementById("graphContainer");
  const W=cont.clientWidth,H=cont.clientHeight;
  svgEl.attr("width",W).attr("height",H);
  zoom=d3.zoom().scaleExtent([0.04,5]).on("zoom",e=>{g.attr("transform",e.transform);updateMinimap();});
  svgEl.call(zoom);
  g=svgEl.append("g");

  linkSel=g.append("g").selectAll("path").data(links).join("path")
    .attr("class","link")
    .attr("stroke",d=>{const s=nodes.find(n=>n.id===d.source);return s?getCatColor(s.category):"#555";})
    .attr("stroke-width",1.2)
    .attr("marker-end",d=>{const s=nodes.find(n=>n.id===d.source);return s?"url(#arrow-"+s.category+")":null;});

  const nodeG=g.append("g").selectAll("g").data(nodes).join("g").attr("class","node")
    .call(d3.drag().on("start",ds).on("drag",dd).on("end",de));
  nodeG.append("circle")
    .attr("r",d=>Math.max(9,Math.min(22,9+d.degree*0.8)))
    .attr("fill",d=>getCatColor(d.category)).attr("fill-opacity",0.88)
    .attr("stroke",d=>getCatColor(d.category)).attr("stroke-width",2)
    .on("click",(e,d)=>selectNode(d))
    .on("mouseover",(e,d)=>hoverOn(e,d))
    .on("mouseout",hoverOff);
  labelSel=nodeG.append("text")
    .attr("dy",d=>Math.max(9,Math.min(22,9+d.degree*0.8))+11)
    .text(d=>d.display_name)
    .style("font-size","8.5px").style("fill","#a1a1aa")
    .style("pointer-events","none").style("text-anchor","middle");
  nodeSel=nodeG;

  simulation=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(110))
    .force("charge",d3.forceManyBody().strength(-260).distanceMax(380))
    .force("collision",d3.forceCollide().radius(26))
    .force("center",d3.forceCenter(W/2,H/2).strength(0.04))
    .on("tick",ticked);

  function ticked(){
    linkSel.attr("d",d=>{
      const sx=d.source.x,sy=d.source.y,tx=d.target.x,ty=d.target.y;
      const sid=d.source.id||d.source,tid=d.target.id||d.target;
      const r=Math.max(9,Math.min(22,9+(inDeg[tid]||0)*0.8+(outDeg[tid]||0)*0.8));
      if(!isBiDir(sid,tid)){
        const dx=tx-sx,dy=ty-sy,len=Math.sqrt(dx*dx+dy*dy)||1;
        return "M"+sx+","+sy+"L"+(tx-dx/len*r)+","+(ty-dy/len*r);
      }
      const isF=sid<tid,dx=tx-sx,dy=ty-sy,len=Math.sqrt(dx*dx+dy*dy)||1,off=isF?28:-28;
      const mx=(sx+tx)/2-dy/len*off,my=(sy+ty)/2+dx/len*off;
      const ddx=tx-mx,ddy=ty-my,dlen=Math.sqrt(ddx*ddx+ddy*ddy)||1;
      return "M"+sx+","+sy+" Q"+mx+","+my+" "+(tx-ddx/dlen*r)+","+(ty-ddy/dlen*r);
    });
    nodeSel.attr("transform",d=>"translate("+d.x+","+d.y+")");
  }

  // Populate dropdowns
  const allNames=nodes.map(n=>n.id).sort();
  ["pathFrom","pathTo"].forEach(id=>{
    const sel=document.getElementById(id);
    allNames.forEach(name=>{const o=document.createElement("option");o.value=name;o.textContent=name;sel.appendChild(o);});
  });

  buildCatFilters(nodes);
  buildStatsPanel(nodes);
  buildNodesAllList();
  initMinimap();

  document.getElementById("searchInput").addEventListener("input",e=>{
    const q=e.target.value.trim().toLowerCase();
    if(!q){restoreAll();return;}
    nodeSel.classed("dimmed",d=>!d.display_name.toLowerCase().includes(q));
    linkSel.classed("dimmed",true).classed("highlighted",false);
    const exact=nodes.find(n=>n.display_name.toLowerCase()===q);
    if(exact)selectNode(exact);
  });
  document.addEventListener("keydown",e=>{
    if(e.key==="f"||e.key==="F")toggleFullscreen();
    if(e.key==="Escape"&&document.body.classList.contains("fullscreen-mode"))toggleFullscreen();
  });
  document.getElementById("loading").style.display="none";
}

function ds(e,d){if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}
function dd(e,d){d.fx=e.x;d.fy=e.y;}
function de(e,d){if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}
function getLinks(){return simulation.force("link").links();}
function getNodes(){return simulation.nodes();}
function restoreAll(){
  nodeSel.classed("dimmed",false);
  linkSel.classed("dimmed",false).classed("highlighted",false)
    .attr("marker-end",d=>{const s=getNodes().find(n=>n.id===(d.source.id||d.source));return s?"url(#arrow-"+s.category+")":null;});
}

// ===== NODE SELECT =====
function selectNode(d){
  addToHistory(d);
  document.getElementById("nodeDetail").classList.add("visible");
  document.getElementById("detailName").textContent=d.display_name;
  const badge=document.getElementById("detailBadge");
  badge.textContent=d.category.replace(/_/g," ");
  badge.style.background=getCatColor(d.category)+"33";
  badge.style.color=getCatColor(d.category);
  badge.style.border="1px solid "+getCatColor(d.category)+"55";
  document.getElementById("detailText").textContent=d.text||"";
  const outConns=[],inConns=[];
  getLinks().forEach(l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    if(s===d.id)outConns.push(t);
    if(t===d.id)inConns.push(s);
  });
  outConns.sort();inConns.sort();
  buildConnList("listOut",outConns,"&#8594;");
  buildConnList("listIn",inConns,"&#8592;");
  document.getElementById("countOut").innerHTML="<strong style='color:#4ade80'>"+outConns.length+"</strong> words this node points to";
  document.getElementById("countIn").innerHTML="<strong style='color:#60a5fa'>"+inConns.length+"</strong> words that point here";
  switchTab('out');
  panTo(d);
  highlightConn(d);
}

function buildConnList(listId,ids,arrow){
  const list=document.getElementById(listId);list.innerHTML="";
  ids.forEach(id=>{
    const nd=allNodesData.find(n=>n.id===id);
    const item=document.createElement("div");item.className="conn-item";
    const cc=nd?getCatColor(nd.category):"#888";
    item.innerHTML="<span class='conn-dir'>"+arrow+"</span><span class='conn-name'>"+id+"</span><span class='conn-cat' style='background:"+cc+"22;color:"+cc+";border:1px solid "+cc+"44'>"+(nd?nd.category.replace(/_/g," "):"")+"</span>";
    item.onclick=()=>{const t=getNodes().find(n=>n.id===id);if(t){selectNode(t);panTo(t);}};
    list.appendChild(item);
  });
}

function switchTab(which){
  document.getElementById("tabOut").classList.toggle("active",which==="out");
  document.getElementById("tabIn").classList.toggle("active",which==="in");
  document.getElementById("panelOut").classList.toggle("active",which==="out");
  document.getElementById("panelIn").classList.toggle("active",which==="in");
}

function highlightConn(d){
  const connIds=new Set([d.id]);
  getLinks().forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(s===d.id)connIds.add(t);if(t===d.id)connIds.add(s);});
  nodeSel.classed("dimmed",n=>!connIds.has(n.id));
  linkSel
    .classed("highlighted",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return s===d.id||t===d.id;})
    .classed("dimmed",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return s!==d.id&&t!==d.id;})
    .attr("marker-end",l=>{
      const sid=l.source.id||l.source;const srcN=getNodes().find(n=>n.id===sid);if(!srcN)return null;
      const hi=(l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id;
      return "url(#arrow-"+(hi?"hi-":"")+srcN.category+")";
    });
}

function panTo(d){
  const cont=document.getElementById("graphContainer");
  const k=d3.zoomTransform(svgEl.node()).k;
  svgEl.transition().duration(500).call(zoom.transform,d3.zoomIdentity.translate(cont.clientWidth/2-d.x*k,cont.clientHeight/2-d.y*k).scale(k));
}

// ===== HOVER =====
function hoverOn(e,d){
  const tip=document.getElementById("tooltip");
  tip.innerHTML="<div class='tooltip-title'>"+d.display_name+"</div><div class='tooltip-cat'>"+d.category.replace(/_/g," ")+"</div><div class='tooltip-io'><span class='tooltip-out'>&#8594; "+d.out+" out</span><span class='tooltip-in'>&#8592; "+d.inp+" in</span></div>";
  tip.style.display="block";tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-10)+"px";
  if(!document.getElementById("nodeDetail").classList.contains("visible")){
    const connIds=new Set([d.id]);
    getLinks().forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(s===d.id)connIds.add(t);if(t===d.id)connIds.add(s);});
    nodeSel.classed("dimmed",n=>!connIds.has(n.id));
    linkSel.classed("highlighted",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return s===d.id||t===d.id;})
           .classed("dimmed",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return s!==d.id&&t!==d.id;});
  }
}
function hoverOff(){
  document.getElementById("tooltip").style.display="none";
  if(!document.getElementById("nodeDetail").classList.contains("visible"))restoreAll();
}

// ===== ZOOM =====
function zoomBy(f){svgEl.transition().duration(300).call(zoom.scaleBy,f);}
function resetView(){
  const cont=document.getElementById("graphContainer");
  svgEl.transition().duration(500).call(zoom.transform,d3.zoomIdentity.translate(cont.clientWidth/2,cont.clientHeight/2).scale(0.55));
  restoreAll();
  document.getElementById("nodeDetail").classList.remove("visible");
}
function toggleLabels(){
  labelsVisible=!labelsVisible;
  labelSel.style("display",labelsVisible?null:"none");
  document.getElementById("labelsBtn").classList.toggle("active",labelsVisible);
}

// ===== CAT FILTERS =====
function buildCatFilters(nodes){
  const cats=[...new Set(nodes.map(n=>n.category))].sort();
  const cont=document.getElementById("catFilters");
  cats.forEach(cat=>{
    const btn=document.createElement("button");btn.className="filter-btn";
    btn.textContent=cat.replace(/_/g," ");
    btn.style.background=getCatColor(cat)+"22";btn.style.color=getCatColor(cat);btn.style.borderColor=getCatColor(cat)+"55";
    btn.onclick=()=>{
      if(activeCategories.has(cat)){activeCategories.delete(cat);btn.classList.add("inactive");}
      else{activeCategories.add(cat);btn.classList.remove("inactive");}
      const visIds=new Set(nodes.filter(n=>activeCategories.has(n.category)).map(n=>n.id));
      nodeSel.style("display",d=>visIds.has(d.id)?null:"none");
      linkSel.style("display",d=>{const s=d.source.id||d.source,t=d.target.id||d.target;return visIds.has(s)&&visIds.has(t)?null:"none";});
      document.getElementById("visibleNodes").textContent=visIds.size;
      document.getElementById("visibleEdges").textContent=getLinks().filter(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return visIds.has(s)&&visIds.has(t);}).length;
      document.getElementById("selectedCat").textContent=activeCategories.size===new Set(nodes.map(n=>n.category)).size?"All":[...activeCategories].join(", ").substring(0,22);
    };
    cont.appendChild(btn);
  });
}

// ===== PATH FINDER (directed only) =====
function findPath(){
  const from=document.getElementById("pathFrom").value;
  const to=document.getElementById("pathTo").value;
  const res=document.getElementById("pathResult");
  res.className="path-result visible";
  if(!from||!to){res.textContent="Select both nodes.";return;}
  if(from===to){res.textContent="Same node!";return;}
  const nodes=getNodes(),links=getLinks();
  const adj=new Map();nodes.forEach(n=>adj.set(n.id,[]));
  links.forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(adj.has(s))adj.get(s).push(t);});
  const visited=new Set(),queue=[[from]];visited.add(from);let path=null;
  while(queue.length>0){
    const curr=queue.shift(),last=curr[curr.length-1];
    if(last===to){path=curr;break;}
    for(const nb of(adj.get(last)||[])){if(!visited.has(nb)){visited.add(nb);queue.push([...curr,nb]);}}
  }
  if(!path){
    res.className="path-result visible error";
    res.textContent="Path does not exist — no directed route from \u201c"+from+"\u201d to \u201c"+to+"\u201d.";
    return;
  }
  const pathSet=new Set(path);
  nodeSel.classed("dimmed",d=>!pathSet.has(d.id));
  linkSel.classed("highlighted",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return pathSet.has(s)&&pathSet.has(t);})
         .classed("dimmed",l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return!(pathSet.has(s)&&pathSet.has(t));});
  res.innerHTML="<strong>"+path.length+" nodes:</strong><br>"+path.map((id,i)=>{
    const safe=id.replace(/'/g,"\\'");
    return "<span class='path-node-btn' onclick=\"(function(){var nd=getNodes().find(function(x){return x.id==='"+safe+"';});if(nd){selectNode(nd);panTo(nd);}})();\">"+id+"</span>"+(i<path.length-1?" &#8594; ":"");
  }).join("");
}
function clearPath(){
  document.getElementById("pathFrom").selectedIndex=0;
  document.getElementById("pathTo").selectedIndex=0;
  const res=document.getElementById("pathResult");res.className="path-result";res.innerHTML="";
  if(!document.getElementById("nodeDetail").classList.contains("visible"))restoreAll();
}

// ===== ALL NODES LIST (name + in-degree only) =====
function buildNodesAllList(){renderNodesAllList();}
function renderNodesAllList(){
  const list=document.getElementById("nodesAllList");list.innerHTML="";
  const sorted=[...allNodesData].sort((a,b)=>{
    let va,vb;
    if(currentSortField==="name"){va=a.display_name.toLowerCase();vb=b.display_name.toLowerCase();}
    else{va=a.inp;vb=b.inp;}
    if(va<vb)return -currentSortDir;if(va>vb)return currentSortDir;return 0;
  });
  sorted.forEach(n=>{
    const row=document.createElement("div");row.className="node-row";
    const cc=getCatColor(n.category);
    row.innerHTML="<div class='node-row-cat-dot' style='background:"+cc+"'></div><div class='node-row-name'>"+n.display_name+"</div><div class='node-row-in' title='"+n.inp+" nodes point to this'>"+n.inp+"</div>";
    row.onclick=()=>{const nd=getNodes().find(x=>x.id===n.id);if(nd){selectNode(nd);panTo(nd);}};
    list.appendChild(row);
  });
}
function sortNodes(field){
  if(currentSortField===field){currentSortDir*=-1;}else{currentSortField=field;currentSortDir=1;}
  ["sortNameBtn","sortInBtn"].forEach(id=>document.getElementById(id).classList.remove("active"));
  document.getElementById(field==="name"?"sortNameBtn":"sortInBtn").classList.add("active");
  document.getElementById("sortDirBtn").innerHTML=currentSortDir===1?"&#8595;":"&#8593;";
  renderNodesAllList();
}
function toggleSortDir(){currentSortDir*=-1;document.getElementById("sortDirBtn").innerHTML=currentSortDir===1?"&#8595;":"&#8593;";renderNodesAllList();}

// ===== STATS PANEL — right side, category overview + drilldown =====
function buildStatsPanel(nodes){
  const cats={};nodes.forEach(n=>cats[n.category]=(cats[n.category]||0)+1);
  const maxC=Math.max(...Object.values(cats));
  const overview=document.getElementById("catOverview");overview.innerHTML="";
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([cat,count])=>{
    const row=document.createElement("div");row.className="cat-bar-row";
    const cc=getCatColor(cat);
    row.innerHTML="<span class='cat-bar-label' title='"+cat+"'>"+cat.replace(/_/g," ")+"</span><div class='cat-bar-track'><div class='cat-bar-fill' style='width:"+Math.round(count/maxC*100)+"%;background:"+cc+"'></div></div><span class='cat-bar-count'>"+count+"</span>";
    row.onclick=()=>showCatDetail(cat,nodes,cc);
    overview.appendChild(row);
  });
}

function showCatDetail(cat,nodes,cc){
  if(!nodes)nodes=allNodesData;
  if(!cc)cc=getCatColor(cat);
  // Filter & sort by in-degree desc
  const catNodes=[...allNodesData].filter(n=>n.category===cat).sort((a,b)=>b.inp-a.inp);
  document.getElementById("catDetailTitle").textContent=cat.replace(/_/g," ")+" ("+catNodes.length+")";
  document.getElementById("catDetailTitle").style.color=cc;
  const list=document.getElementById("catNodeList");list.innerHTML="";
  catNodes.forEach((n,i)=>{
    const row=document.createElement("div");row.className="cat-node-row";
    row.innerHTML="<span class='cat-node-rank'>"+(i+1)+"</span><span class='cat-node-name'>"+n.display_name+"</span><span class='cat-node-in'>&#8592;"+n.inp+"</span>";
    row.onclick=()=>{const nd=getNodes().find(x=>x.id===n.id);if(nd){selectNode(nd);panTo(nd);}};
    list.appendChild(row);
  });
  document.getElementById("catOverview").style.display="none";
  document.getElementById("catDetail").classList.add("visible");
  document.getElementById("statsPanelTitle").textContent="Category Detail";
}

function showCatOverview(){
  document.getElementById("catOverview").style.display="";
  document.getElementById("catDetail").classList.remove("visible");
  document.getElementById("statsPanelTitle").textContent="Statistics";
}

function toggleStatsPanel(){
  document.getElementById("statsPanel").classList.toggle("collapsed");
  document.querySelector("#statsPanel .stats-toggle-btn").innerHTML=document.getElementById("statsPanel").classList.contains("collapsed")?"&#9654;":"&#9660;";
}

// ===== MINIMAP =====
function initMinimap(){simulation.on("tick.minimap",updateMinimap);}
function updateMinimap(){
  if(!document.getElementById("minimapContainer").classList.contains("visible"))return;
  const nodes=getNodes();
  const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const pad=7,mW=175,mH=135,sx=(mW-pad*2)/(maxX-minX||1),sy=(mH-pad*2)/(maxY-minY||1),sc=Math.min(sx,sy);
  d3.select("#minimap").selectAll("circle").data(nodes).join("circle")
    .attr("cx",d=>pad+(d.x-minX)*sc).attr("cy",d=>pad+(d.y-minY)*sc)
    .attr("r",2).attr("fill",d=>getCatColor(d.category)).attr("fill-opacity",0.7);
}
function toggleMinimap(){
  document.getElementById("minimapContainer").classList.toggle("visible");
  document.getElementById("minimapBtn").classList.toggle("active");
  if(document.getElementById("minimapContainer").classList.contains("visible"))updateMinimap();
}

// ===== HISTORY =====
function addToHistory(d){
  if(historyIndex<navigationHistory.length-1)navigationHistory=navigationHistory.slice(0,historyIndex+1);
  if(navigationHistory.length>0&&navigationHistory[navigationHistory.length-1].id===d.id)return;
  navigationHistory.push(d);historyIndex=navigationHistory.length-1;
  if(navigationHistory.length>20){navigationHistory.shift();historyIndex--;}
  updateHistoryUI();
}
function navigateHistory(dir){
  historyIndex=Math.max(0,Math.min(navigationHistory.length-1,historyIndex+dir));
  const n=navigationHistory[historyIndex];if(n){panTo(n);highlightConn(n);updateHistoryUI();}
}
function clearHistory(){
  navigationHistory=[];historyIndex=-1;updateHistoryUI();
}
function updateHistoryUI(){
  const hist=document.getElementById("navHistory"),bc=document.getElementById("navBreadcrumb");
  if(navigationHistory.length===0){hist.classList.remove("visible");return;}
  hist.classList.add("visible");bc.innerHTML="";
  navigationHistory.forEach((n,i)=>{
    if(i>0){const sep=document.createElement("span");sep.className="nav-sep";sep.textContent="›";bc.appendChild(sep);}
    const c=document.createElement("span");c.className="nav-crumb"+(i===historyIndex?" current":"");c.textContent=n.display_name;
    c.onclick=(()=>{const ni=i,nd=n;return()=>{historyIndex=ni;panTo(nd);highlightConn(nd);updateHistoryUI();};})();
    bc.appendChild(c);
  });
  document.getElementById("navBack").disabled=historyIndex<=0;
  document.getElementById("navFwd").disabled=historyIndex>=navigationHistory.length-1;
}

// ===== EXPORT =====
function exportPng(){
  const el=document.getElementById("graph");
  const s=new XMLSerializer().serializeToString(el);
  const canvas=document.createElement("canvas");
  canvas.width=el.clientWidth*2;canvas.height=el.clientHeight*2;
  const ctx=canvas.getContext("2d"),img=new Image();
  img.onload=()=>{
    ctx.fillStyle="#0f1117";ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const a=document.createElement("a");a.download="wikids-graph.png";a.href=canvas.toDataURL("image/png");a.click();
  };
  img.src="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(s)));
}

function toggleFullscreen(){
  document.body.classList.toggle("fullscreen-mode");
  document.getElementById("fsBtn").classList.toggle("active",document.body.classList.contains("fullscreen-mode"));

    const cont=document.getElementById("graphContainer");
    svgEl.attr("width",cont.clientWidth).attr("height",cont.clientHeight);
    simulation.alpha(0.05).restart();

}
