<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wikids Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1117; color: #e4e4e7; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 360px; min-width: 360px; background: #18181b; border-right: 1px solid #27272a; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
.sidebar-header { padding: 14px 16px; border-bottom: 1px solid #27272a; }
.sidebar-header h1 { font-size: 1.05rem; font-weight: 700; color: #a78bfa; margin-bottom: 2px; }
.sidebar-header p { font-size: 0.7rem; color: #52525b; }
.sidebar-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
.sidebar-body::-webkit-scrollbar { width: 4px; }
.sidebar-body::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.section-title { font-size: 0.68rem; font-weight: 700; color: #52525b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }

/* SEARCH */
.search-wrap { position: relative; }
.search-wrap input { width: 100%; padding: 7px 10px 7px 32px; background: #27272a; border: 1px solid #3f3f46; border-radius: 7px; color: #e4e4e7; font-size: 0.82rem; outline: none; }
.search-wrap input:focus { border-color: #7c3aed; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #52525b; font-size: 0.8rem; }

/* PATH FINDER */
.path-finder { background: #1c1c20; border: 1px solid #27272a; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.path-finder select { width: 100%; padding: 6px 8px; background: #27272a; border: 1px solid #3f3f46; border-radius: 6px; color: #e4e4e7; font-size: 0.78rem; outline: none; }
.path-btn-row { display: flex; gap: 6px; }
.pf-btn { flex: 1; padding: 6px; border: none; border-radius: 6px; font-size: 0.78rem; cursor: pointer; font-weight: 600; }
.pf-find { background: #7c3aed; color: #fff; }
.pf-find:hover { background: #6d28d9; }
.pf-clear { background: #27272a; color: #a1a1aa; border: 1px solid #3f3f46; }
.pf-clear:hover { background: #3f3f46; color: #e4e4e7; }
.path-result { font-size: 0.75rem; color: #a1a1aa; line-height: 1.7; display: none; }
.path-result.visible { display: block; }
.path-result.error { color: #f87171; }
.path-node-btn { display: inline-block; background: #27272a; border-radius: 4px; padding: 2px 6px; margin: 1px; cursor: pointer; font-size: 0.73rem; color: #c4b5fd; }
.path-node-btn:hover { background: #3f3f46; }

/* CATEGORY FILTERS */
.filter-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.filter-btn { padding: 3px 9px; border-radius: 20px; border: 1px solid transparent; font-size: 0.68rem; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
.filter-btn.inactive { opacity: 0.3; }

/* NODE DETAIL */
.node-detail { background: #1c1c20; border: 1px solid #27272a; border-radius: 8px; padding: 11px; display: none; }
.node-detail.visible { display: block; }
.node-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; }
.node-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 7px; }
.node-text { font-size: 0.75rem; color: #a1a1aa; line-height: 1.5; margin-bottom: 9px; }
.view-tabs { display: flex; gap: 0; border: 1px solid #27272a; border-radius: 7px; overflow: hidden; margin-bottom: 7px; }
.view-tab { flex: 1; padding: 5px 4px; text-align: center; font-size: 0.68rem; font-weight: 600; cursor: pointer; background: #18181b; color: #52525b; border: none; transition: all 0.15s; }
.view-tab.active { background: #27272a; color: #e4e4e7; }
.view-tab:not(:last-child) { border-right: 1px solid #27272a; }
.conn-panel { display: none; }
.conn-panel.active { display: block; }
.conn-count { font-size: 0.68rem; color: #52525b; margin-bottom: 5px; }
.conn-list { display: flex; flex-direction: column; gap: 3px; max-height: 160px; overflow-y: auto; }
.conn-list::-webkit-scrollbar { width: 3px; }
.conn-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.conn-item { display: flex; align-items: center; gap: 5px; padding: 4px 7px; background: #27272a; border-radius: 5px; cursor: pointer; font-size: 0.73rem; }
.conn-item:hover { background: #3f3f46; }
.conn-dir { font-size: 0.7rem; color: #52525b; width: 12px; }
.conn-name { flex: 1; color: #e4e4e7; }
.conn-cat { font-size: 0.6rem; padding: 1px 5px; border-radius: 8px; white-space: nowrap; }

/* ALL NODES LIST — no out-degree column */
.nodes-list-wrap { background: #1c1c20; border: 1px solid #27272a; border-radius: 8px; overflow: hidden; }
.nodes-list-header { padding: 8px 10px; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 6px; }
.nodes-list-header span { font-size: 0.68rem; font-weight: 700; color: #52525b; text-transform: uppercase; flex: 1; }
.sort-col-btns { display: flex; gap: 3px; align-items: center; }
.sort-label { font-size: 0.6rem; color: #52525b; }
.sort-btn { padding: 3px 7px; font-size: 0.65rem; background: #27272a; border: 1px solid #3f3f46; border-radius: 5px; color: #a1a1aa; cursor: pointer; }
.sort-btn.active { background: #7c3aed22; border-color: #7c3aed66; color: #c4b5fd; }
.sort-btn:hover { background: #3f3f46; }
.nodes-all-list { max-height: 220px; overflow-y: auto; }
.nodes-all-list::-webkit-scrollbar { width: 3px; }
.nodes-all-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.nodes-col-header { display: flex; align-items: center; gap: 6px; padding: 3px 10px; background: #18181b; border-bottom: 1px solid #27272a; font-size: 0.62rem; color: #52525b; }
.col-name { flex: 1; cursor: pointer; }
.col-name:hover { color: #a1a1aa; }
.col-in { width: 36px; text-align: center; cursor: pointer; }
.col-in:hover { color: #a1a1aa; }
.node-row { display: flex; align-items: center; gap: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.73rem; border-bottom: 1px solid #18181b; }
.node-row:hover { background: #27272a; }
.node-row-name { flex: 1; color: #e4e4e7; }
.node-row-in { width: 36px; text-align: center; color: #60a5fa; font-size: 0.68rem; font-weight: 600; }
.node-row-cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* GRAPH AREA */
.graph-container { flex: 1; position: relative; overflow: hidden; }
svg#graph { width: 100%; height: 100%; }

/* CONTROLS — right top */
.controls { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 20; }
.ctrl-btn { width: 36px; height: 36px; background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; color: #a1a1aa; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.ctrl-btn:hover { background: #27272a; color: #e4e4e7; border-color: #3f3f46; }
.ctrl-btn.active { color: #a78bfa; border-color: #7c3aed; }

/* STATS PANEL — right side, under controls */
.stats-panel {
  position: absolute;
  top: 330px; /* below 7 control buttons: 16 + 7*36 + 6*6 + 10 */
  right: 16px;
  background: rgba(24,24,27,0.97);
  border: 1px solid #27272a;
  border-radius: 11px;
  z-index: 20;
  width: 230px;
  overflow: hidden;
  max-height: calc(100vh - 350px);
  display: flex;
  flex-direction: column;
}
.stats-panel-header { padding: 8px 12px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.stats-panel-header h3 { font-size: 0.78rem; font-weight: 600; color: #a1a1aa; }
.stats-toggle-btn { background: none; border: none; color: #52525b; cursor: pointer; font-size: 0.72rem; }
.stats-panel-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
.stats-panel.collapsed .stats-panel-body { display: none; }
/* Category overview */
.cat-bar-row { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; cursor: pointer; padding: 2px 3px; border-radius: 5px; }
.cat-bar-row:hover { background: #27272a; }
.cat-bar-row.selected { background: #27272a; outline: 1px solid #3f3f46; }
.cat-bar-label { width: 82px; color: #a1a1aa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-bar-track { flex: 1; height: 5px; background: #27272a; border-radius: 3px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 3px; }
.cat-bar-count { width: 22px; text-align: right; color: #52525b; }
/* Category detail list */
.cat-detail { display: none; flex-direction: column; gap: 0; }
.cat-detail.visible { display: flex; }
.cat-detail-header { display: flex; align-items: center; gap: 6px; padding: 4px 0; margin-bottom: 4px; border-bottom: 1px solid #27272a; flex-shrink: 0; }
.cat-back-btn { background: #27272a; border: none; color: #a1a1aa; border-radius: 5px; padding: 2px 7px; cursor: pointer; font-size: 0.7rem; }
.cat-back-btn:hover { background: #3f3f46; color: #e4e4e7; }
.cat-detail-title { font-size: 0.72rem; font-weight: 600; flex: 1; }
.cat-node-list { overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.cat-node-list::-webkit-scrollbar { width: 3px; }
.cat-node-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
.cat-node-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 5px; cursor: pointer; font-size: 0.72rem; }
.cat-node-row:hover { background: #27272a; }
.cat-node-rank { width: 16px; color: #52525b; font-size: 0.65rem; }
.cat-node-name { flex: 1; color: #e4e4e7; }
.cat-node-in { color: #60a5fa; font-weight: 600; font-size: 0.68rem; }

/* STATS BAR top left */
.stats-bar { position: absolute; top: 16px; left: 16px; background: rgba(24,24,27,0.92); border: 1px solid #27272a; border-radius: 8px; padding: 5px 12px; font-size: 0.7rem; color: #52525b; display: flex; gap: 14px; z-index: 10; }
.stats-bar strong { color: #e4e4e7; }

/* NAV HISTORY — top center */
.nav-history { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; padding: 5px 9px; display: none; align-items: center; gap: 5px; z-index: 15; max-width: 480px; }
.nav-history.visible { display: flex; }
.nav-btn { background: #27272a; border: none; color: #a1a1aa; border-radius: 4px; padding: 2px 7px; cursor: pointer; font-size: 0.72rem; }
.nav-btn:hover { background: #3f3f46; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-breadcrumb { display: flex; align-items: center; gap: 3px; overflow: hidden; flex: 1; max-width: 300px; }
.nav-crumb { font-size: 0.7rem; color: #a78bfa; cursor: pointer; white-space: nowrap; }
.nav-crumb:hover { text-decoration: underline; }
.nav-crumb.current { color: #e4e4e7; font-weight: 600; }
.nav-sep { color: #3f3f46; font-size: 0.62rem; }
/* Prominent clear/reset button */
.nav-reset-btn { background: #27272a; border: 1px solid #3f3f46; color: #f87171; border-radius: 5px; padding: 2px 8px; cursor: pointer; font-size: 0.68rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.nav-reset-btn:hover { background: #f8717122; border-color: #f87171; }

/* MINIMAP */
.minimap-container { position: absolute; bottom: 20px; right: 20px; width: 175px; height: 135px; background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; overflow: hidden; z-index: 19; display: none; }
.minimap-container.visible { display: block; }

/* TOOLTIP */
.node-tooltip { position: fixed; background: rgba(24,24,27,0.97); border: 1px solid #3f3f46; border-radius: 8px; padding: 9px 13px; font-size: 0.76rem; pointer-events: none; z-index: 100; display: none; max-width: 210px; }
.tooltip-title { font-weight: 700; margin-bottom: 3px; }
.tooltip-cat { font-size: 0.65rem; color: #52525b; margin-bottom: 3px; }
.tooltip-io { font-size: 0.68rem; display: flex; gap: 10px; }
.tooltip-out { color: #4ade80; }
.tooltip-in { color: #60a5fa; }

/* LOADING */
.loading-overlay { position: absolute; inset: 0; background: #0f1117; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 14px; }
.spinner { width: 38px; height: 38px; border: 3px solid #27272a; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #52525b; font-size: 0.82rem; }

/* FULLSCREEN */
.fullscreen-mode .sidebar { display: none !important; }
.fullscreen-mode .graph-container { width: 100vw !important; }
.fullscreen-btn-floating { position: fixed; top: 20px; left: 20px; z-index: 1001; display: none; width: 36px; height: 36px; background: rgba(24,24,27,0.95); border: 1px solid #27272a; border-radius: 8px; color: #a1a1aa; font-size: 1rem; cursor: pointer; align-items: center; justify-content: center; }
.fullscreen-mode .fullscreen-btn-floating { display: flex; }

/* GRAPH ELEMENTS */
.link { fill: none; stroke-opacity: 0.5; }
.link.highlighted { stroke-opacity: 1 !important; stroke-width: 3px !important; }
.link.dimmed { stroke-opacity: 0.03 !important; }
.node { cursor: pointer; }
.node.dimmed circle { opacity: 0.07; }
.node.dimmed text { opacity: 0.04; }
</style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>&#127279; Wikids Knowledge Graph</h1>
    <p>192 words &middot; 576 directed connections &middot; 8 categories</p>
  </div>
  <div class="sidebar-body">

    <div>
      <div class="section-title">Search</div>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="Search words..." />
      </div>
    </div>

    <div>
      <div class="section-title">Path Finder (directed)</div>
      <div class="path-finder">
        <select id="pathFrom"><option value="">From...</option></select>
        <select id="pathTo"><option value="">To...</option></select>
        <div class="path-btn-row">
          <button class="pf-btn pf-find" onclick="findPath()">Find Path</button>
          <button class="pf-btn pf-clear" onclick="clearPath()">Clear</button>
        </div>
        <div class="path-result" id="pathResult"></div>
      </div>
    </div>

    <div>
      <div class="section-title">Categories</div>
      <div class="filter-grid" id="catFilters"></div>
    </div>

    <div id="nodeDetail" class="node-detail">
      <div class="node-name" id="detailName"></div>
      <div class="node-badge" id="detailBadge"></div>
      <div class="node-text" id="detailText"></div>
      <div class="view-tabs">
        <button class="view-tab active" id="tabOut" onclick="switchTab('out')">&#8594; Points to</button>
        <button class="view-tab" id="tabIn" onclick="switchTab('in')">&#8592; Points here</button>
      </div>
      <div class="conn-panel active" id="panelOut">
        <div class="conn-count" id="countOut"></div>
        <div class="conn-list" id="listOut"></div>
      </div>
      <div class="conn-panel" id="panelIn">
        <div class="conn-count" id="countIn"></div>
        <div class="conn-list" id="listIn"></div>
      </div>
    </div>

    <!-- ALL NODES LIST — in-degree only, no out-degree col -->
    <div>
      <div class="section-title">All Nodes</div>
      <div class="nodes-list-wrap">
        <div class="nodes-list-header">
          <span>&#128196; 192 words</span>
          <div class="sort-col-btns">
            <span class="sort-label">Sort:</span>
            <button class="sort-btn active" id="sortNameBtn" onclick="sortNodes('name')">A–Z</button>
            <button class="sort-btn" id="sortInBtn" onclick="sortNodes('in')">&#8592; in</button>
            <button class="sort-btn" id="sortDirBtn" onclick="toggleSortDir()">&#8595;</button>
          </div>
        </div>
        <div class="nodes-col-header">
          <div class="col-name" onclick="sortNodes('name')">Name</div>
          <div class="col-in" onclick="sortNodes('in')" title="In-degree: how many nodes point here">&#8592; in</div>
        </div>
        <div class="nodes-all-list" id="nodesAllList"></div>
      </div>
    </div>

  </div>
</div>

<!-- GRAPH AREA -->
<div class="graph-container" id="graphContainer">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Building knowledge graph...</div>
  </div>

  <div class="stats-bar">
    <span>Nodes: <strong id="visibleNodes">192</strong></span>
    <span>Edges: <strong id="visibleEdges">576</strong></span>
    <span>Shown: <strong id="selectedCat">All</strong></span>
  </div>

  <!-- NAV HISTORY — with prominent Reset button -->
  <div class="nav-history" id="navHistory">
    <button class="nav-btn" id="navBack" onclick="navigateHistory(-1)">&#8592;</button>
    <div class="nav-breadcrumb" id="navBreadcrumb"></div>
    <button class="nav-btn" id="navFwd" onclick="navigateHistory(1)">&#8594;</button>
    <button class="nav-reset-btn" onclick="clearHistory()" title="Reset navigation history">&#10005; Reset</button>
  </div>

  <svg id="graph"><defs id="arrowDefs"></defs></svg>

  <!-- CONTROLS (right top) -->
  <div class="controls">
    <button class="ctrl-btn" onclick="zoomBy(1.3)" title="Zoom In">+</button>
    <button class="ctrl-btn" onclick="zoomBy(0.77)" title="Zoom Out">&minus;</button>
    <button class="ctrl-btn" onclick="resetView()" title="Reset View">&#8962;</button>
    <button class="ctrl-btn active" id="labelsBtn" onclick="toggleLabels()" title="Toggle Labels">Aa</button>
    <button class="ctrl-btn" id="minimapBtn" onclick="toggleMinimap()" title="Toggle Minimap">&#9638;</button>
    <button class="ctrl-btn" onclick="exportPng()" title="Export PNG">&#128247;</button>
    <button class="ctrl-btn" id="fsBtn" onclick="toggleFullscreen()" title="Full Screen">&#9727;</button>
  </div>

  <!-- STATS PANEL — right side, under controls -->
  <div class="stats-panel" id="statsPanel">
    <div class="stats-panel-header">
      <h3 id="statsPanelTitle">Statistics</h3>
      <button class="stats-toggle-btn" onclick="toggleStatsPanel()">&#9660;</button>
    </div>
    <div class="stats-panel-body" id="statsPanelBody">
      <!-- Category overview bars (clickable) -->
      <div id="catOverview"></div>
      <!-- Category detail (shown on click) -->
      <div class="cat-detail" id="catDetail">
        <div class="cat-detail-header">
          <button class="cat-back-btn" onclick="showCatOverview()">&#8592; Back</button>
          <div class="cat-detail-title" id="catDetailTitle"></div>
        </div>
        <div class="cat-node-list" id="catNodeList"></div>
      </div>
    </div>
  </div>

  <div class="minimap-container" id="minimapContainer">
    <svg id="minimap" width="175" height="135"></svg>
  </div>

  <div class="node-tooltip" id="tooltip"></div>
</div>

<button class="fullscreen-btn-floating" onclick="toggleFullscreen()">&#10005;</button>

<script>
const CAT_COLORS = {
  animals:"#4caf87", countries:"#5b8dee", human_body:"#e05c8a",
  landmarks:"#f5a623", musical_instruments:"#b36be0", nature:"#6dbf67",
  occupations:"#e87d3e", space:"#4fc3f7", traditional_food:"#ffca28", transportation:"#90a4ae"
};
function getCatColor(c){return CAT_COLORS[c]||"#888";}

const RAW_NODES = [{"id": "Cat", "display_name": "Cat", "category": "animals", "text": "A cat is a small furry animal that many people keep as pets. It likes to sleep most of the day and can jump very high. When a cat falls, it usually lands on its feet. Cats run away from dogs and try to catch mice, birds, and insects. Cats are very clean, but instead of taking a bath, they lick themselves. Cats can see in the dark. They can also hear very quiet whispers."}, {"id": "Cheetah", "display_name": "Cheetah", "category": "animals", "text": "The cheetah is the fastest animal in the world. It can run even faster than a car. The cheetah is a member of the cat family, just like lions and tigers. Cheetahs live in Africa and Asia and have many black spots on their back. Cheetahs hunt many animals—gazelles, antelopes, and sometimes even zebras. Cheetahs can’t chase animals for a long time, because they become tired very quickly. Cheetahs have powerful eyes—they can see things from very far away."}, {"id": "Elephant", "display_name": "Elephant", "category": "animals", "text": "The elephant is the biggest animal that lives on land. Elephants live in Africa and Asia, in forests or in open areas. Elephants are very heavy and have large floppy ears. They are very smart and gentle animals. Elephants have a long trunk. They use it to smell, grab things, take a shower and drink, and sometimes even to pat and hug! They also use it like a trumpet to make loud noises. Many elephants have long and curvy front teeth, called tusks."}, {"id": "Frog", "display_name": "Frog", "category": "animals", "text": "A frog is a small animal that lives near swamps and lakes. A frog is an amphibian. This means that it can live in water and on land. Frogs come in many different colors. They have a very long and sticky tongue in the front of their mouths. Frogs use their tongue to catch mosquitos and other insects. Frogs have very special eyes that can look in many different directions. A frog never closes its eyes, even when it is asleep."}, {"id": "Koala", "display_name": "Koala", "category": "animals", "text": "The koala is a small and very cute brownish-grey animal that lives only in Australia. Many people travel to Australia just so they can see it. Koalas eat leaves only from a tree called eucalyptus, which they climb using their sharp claws. They also sleep in eucalyptus trees. Koalas are very lazy. They sleep most of the day and don’t move much. They also prefer to live alone, without friends. Baby koalas grow in their mother’s pouch, just like kangaroos."}, {"id": "Komodo Dragon", "display_name": "Komodo Dragon", "category": "animals", "text": "The Komodo dragon is the biggest lizard in the world. It is named after the first place where it was found, the island Komodo in Indonesia. It is big, green, and heavy, with frightening eyes and a powerful tail. Komodo dragons run short distances very fast, and that’s how they hunt large animals like wild boars and buffalos. They also have a poisonous bite, which is very dangerous. The female Komodo dragon lays eggs and buries them in the ground."}, {"id": "Whale", "display_name": "Whale", "category": "animals", "text": "A whale is a huge animal that lives in the sea. Even though it lives in the sea, it’s not a fish, but a mammal. It doesn’t breathe under water, but has a big blowhole on the top of its head, which it uses to breath and blow out air and water. Whales live in groups, have friends, and take care of their children together. Whales are very smart and love to sing. Their loud sound can be heard from very far away."}, {"id": "Wolf", "display_name": "Wolf", "category": "animals", "text": "The wolf is a beautiful wild animal that belongs to the dog family and lives in many places in the world. Wolves can run very fast and have a great sense of smell that helps them hunt other animals. Wolves communicate by howling, which can be heard from far away. Wolves live in groups called packs, which include a family of two parents, which are the leaders, their children, and sometimes other wolves. They wander around together, raise their children, and hunt."}, {"id": "Octopus", "display_name": "Octopus", "category": "animals", "text": "The octopus is an animal with eight arms and a beak that lives in the ocean. The octopus’ body is soft and flexible, because it doesn’t have any bones. That’s why octopuses can squeeze into very narrow places. Octopuses are smart and have excellent memory. They have many ways to protect themselves: some kinds of octopuses can change their color, some shoot a cloud of dark ink that blocks them from view, and some can even make themselves look like other animals!"}, {"id": "Platypus", "display_name": "Platypus", "category": "animals", "text": "The platypus is a very unusual animal that looks like a combination of a duck and a beaver. It has flat feet and a big beak, and lives only in Australia. The platypus is one of only two kinds of mammals that lay eggs—the other kind is the echidna. The female platypus digs small tunnels in the mud, where it takes care of its babies after they hatch. Male platypuses have poison in a spur located in their feet."}, {"id": "Newt", "display_name": "Newt", "category": "animals", "text": "A newt is a small animal that looks like a lizard with a long tail. The newt is an amphibian, which means that it can live both in water and on land. A baby newt is called a tadpole. It looks like a fish and can only live in water. But after a while, its legs and lungs grow and now the newt can live on land. Many newts have poison on their skin. Newts can grow back new body parts if they’re cut off!"}, {"id": "Porcupinefish", "display_name": "Porcupinefish", "category": "animals", "text": "The porcupinefish is a strange fish that has a special way of defending itself. It swallows a lot of water very fast and becomes as big and round as a basketball with spikes. In this way, if some animal tries to eat it, the animal has a lot of trouble holding the porcupinefish in its mouth. Porcupinefish also have a lot of dangerous poison in them, which can hurt anyone. The only animal that can’t get hurt from it is the shark."}, {"id": "Scorpion", "display_name": "Scorpion", "category": "animals", "text": "A scorpion is a small animal with a long pointy tail and big claws. It uses the tip of its tail to sting other animals when it is in danger. Scorpions have eight legs and most scorpions live in the desert. Some kinds of scorpions live in forests and in mountains. They eat insects and have a hard shell that protects them. They sleep in the day underneath rocks or beneath the ground and are awake at night."}, {"id": "Iguana", "display_name": "Iguana", "category": "animals", "text": "The iguana is a large greenish lizard that comes from Central and South America. They have a long tail, sharp claws and teeth, and a row of spines on their back. Iguanas like to live on trees next to water and eat fruit and leaves. They are also very tough: if they fall from somewhere as high as a 5 story building, they’ll usually land safely! And if their tail falls off – they can grow a new one! Many people keep iguanas as pets."}, {"id": "Zebra", "display_name": "Zebra", "category": "animals", "text": "The zebra is a famous animal that looks like a horse with pajamas, because it has black and white stripes all over its body. Every zebra has a different arrangement of stripes. Nobody really knows why zebras have stripes. Some say that they use the stripes for disguise, to confuse the enemy, or maybe even to keep flies away! Zebras live in Africa. They eat grass and live in herds. When another animal chases them, zebras run away in zigzags."}, {"id": "Lion", "display_name": "Lion", "category": "animals", "text": "The lion is a wild animal that belongs to the cat family and lives in Africa and in Asia. It has a beautiful mane around its head, and many people call it the king of the animals. Lions roar very loudly. They live in groups and hunt other animals for food. Male lions are very lazy. They sleep most of the day, and prefer that the lioness, the female lion, does the hunting! She’s a much better hunter anyway!"}, {"id": "Grasshopper", "display_name": "Grasshopper", "category": "animals", "text": "The grasshopper is a large insect that comes in many different colors. Grasshoppers have big eyes, four wings, and six legs. The Grasshopper’s back legs are very long, and they use them for hopping and jumping. They can leap 20 times their body length!  Grasshoppers eat plants. Sometimes they cause damage to crops that farmers grow. Grasshoppers make sounds by rubbing their back legs against their front wings. And believe it or not, their ears are on the sides of their belly!"}, {"id": "Jellyfish", "display_name": "Jellyfish", "category": "animals", "text": "The jellyfish is a strange sea animal that looks like an umbrella or a mushroom. Even though we call it a “jellyfish”, it’s actually not a fish at all! Jellyfish have a soft body and tentacles, which are long thin parts that look like strings. Jellyfish don’t have a face, a brain, or even a heart! They don’t have any bones either. Some jellyfish are see-through, and others have bright colors. Most jellyfish have poison and their sting really burns."}, {"id": "Giraffe", "display_name": "Giraffe", "category": "animals", "text": "The Giraffe is the tallest animal in the world. It has a very long neck, long legs, a long tongue, small horns, and brown spots all over its body. Giraffes live in Africa and eat leaves that grow on high trees, which no other animal can reach. Giraffes almost never get off their feet – they even sleep standing up! When giraffes want to drink, they have to lean their legs forward or bend their knees so they can reach the water."}, {"id": "Walrus", "display_name": "Walrus", "category": "animals", "text": "A walrus is a big and heavy animal that lives in the icy oceans around the North Pole. It spends most of its time inside the freezing water and on ice. Although clumsy on land, it is a great swimmer and diver. Walruses are brown and have many whiskers and two very long tusks. They use their tusks to defend themselves and to pull themselves out of the water. Walruses live in large groups and take care of their children."}, {"id": "Hippopotamus", "display_name": "Hippopotamus", "category": "animals", "text": "The hippopotamus, or hippo, is a big and heavy animal with a huge mouth and short legs. It lives in Africa and spends most of its time in the water. At sunset, it goes out to eat grass. The hippo’s ears, eyes and nostrils are on the top of its head. It can stick them out of the water, leaving the rest of the head under water. Hippos can sleep under water. When they need air, they stick their nostrils out without even waking up!"}, {"id": "Dolphin", "display_name": "Dolphin", "category": "animals", "text": "The dolphin is a large animal that lives in water. Even though it lives in water, it’s a mammal – just like the whale. The dolphin is one of the smartest animals in the world. Dolphins are also very friendly. They love to jump over the water and play with each other, with other animals, and even with people. Dolphins live in groups and eat fish and other small animals. To communicate with each other they make special clicks and whistles."}, {"id": "Bat", "display_name": "Bat", "category": "animals", "text": "The bat is a small animal with wings that looks like a flying mouse. It’s the only mammal that can fly. Bats are active at night, and during the day they sleep – upside down! When bats fly in the dark, they use their excellent hearing to know where to go. Some bats live in caves. Most bats eat insects or fruits, but some of them eat small animals. The vampire bat – a special kind of bat – feeds only on blood!"}, {"id": "Dog", "display_name": "Dog", "category": "animals", "text": "The dog is our best friend. Many people keep dogs as pets because they are loyal and loveable.  Dogs are domesticated animals. That means that they’re used to live with people and not in the wild. Dogs have a great sense of smell, and they communicate with barks and howls. Dogs help us a lot. For example, there are special dogs that are trained to show blind people the way, and even dogs that help police officers find people whom they’re looking for!"}, {"id": "Australia", "display_name": "Australia", "category": "countries", "text": "Australia is a very large country and is one of the world’s continents. There are many special animals in Australia, such as the kangaroo, the koala, and the platypus. Australians love sports and barbecues. In the past, criminals were sent to Australia as a punishment because it was very far away. The people who first lived in Australia are called Aborigines. In the beginning, they didn’t get along with the newcomers, but today, they live together."}, {"id": "China", "display_name": "China", "category": "countries", "text": "China is a huge country in Asia and is the country with the biggest number of people in the world. Chinese people eat rice and noodles, and they even invented tea. The panda bear comes from China. China used to be ruled by emperors who lived in a “forbidden city,” which no one was allowed to enter. The Chinese also built the longest wall in the world to protect themselves from intruders. Some people say that you can see it from outer space!"}, {"id": "Egypt", "display_name": "Egypt", "category": "countries", "text": "Egypt is a country in Africa. Although most if it is desert, one of the world’s longest rivers, the Nile, runs through it. A long time ago, the Egyptians built pyramids, and today, many people from around the world come to see them. They also visit the Sphinx, a huge statue with a king’s head and a lion’s body. The ancient Egyptians didn’t write with letters but used tiny pictures instead, called hieroglyphics—just like in comic books!"}, {"id": "France", "display_name": "France", "category": "countries", "text": "France is a country in Europe. It was one of the first countries to decide that people are free and should not be ruled by kings or queens. France’s capital city is called Paris. It has many beautiful palaces and buildings and many artists come to live there. French people love good food and wine. The croissant, a tasty French pastry, is now eaten almost everywhere. France also holds the most important bicycle race in the world, called the Tour de France."}, {"id": "Kenya", "display_name": "Kenya", "category": "countries", "text": "Kenya is a country in Africa. It unites many different peoples and tribes that speak almost 70 different languages! There are many kinds of animals in Kenya, like lions, elephants, and buffalos. They live in large areas that are reserved only for them. Tourists visit Kenya to take safari trips, where they can see the animals living their lives without disturbing them. Kenyans are excellent athletes, especially in running. Kenya has won a lot of prizes in races and competitions."}, {"id": "Mexico", "display_name": "Mexico", "category": "countries", "text": "Mexico is a very big country in North America. It is full of volcanoes, deserts, and even jungles. Many years ago, there were very special people in Mexico, called the Aztecs, who built many beautiful cities, pyramids, and temples. Some of the structures still stand today, and many people come to see them. Mexicans wear a sombrero, a hat with wide edges that protects them from the sun. They also have tasty food, like tacos and other dishes made out of corn and beans."}, {"id": "Morocco", "display_name": "Morocco", "category": "countries", "text": "Morocco is a country in Africa. Most of Morocco is part of the Sahara Desert, the biggest and hottest desert in the world, but it also has a very long coast with beautiful beaches. The Atlas Mountains, which is a range of huge mountains, also stretches through Morocco. Moroccans eat a tasty dish called couscous, which is ground and cooked wheat topped with vegetables, meat, and gravy. Moroccans are wonderful hosts. They always offer their guests sweet mint tea."}, {"id": "Nepal", "display_name": "Nepal", "category": "countries", "text": "Nepal is a country in Asia next to China and India. Nepal’s capital city is Kathmandu, which is very old and has beautiful temples and statues. The highest point of Mount Everest, which is the highest point in the world, is in Nepal. Many people from all over the world travel to Nepal to try to climb Mount Everest. Nepal’s flag has a special shape. It is made out of two triangles that look like the Himalayan Mountains in Nepal."}, {"id": "Norway", "display_name": "Norway", "category": "countries", "text": "Norway is a country in Europe. It has long seashores, and that’s why Norwegians are excellent fishermen. Norway has thousands of islands and many fjords: beautiful, deep valleys full of water and surrounded by icy mountains. In the winter, Norway is cold and dark, but in the summer, the sun shines even at midnight! Norway’s capital city, Oslo, hosts the ceremony for the Nobel Peace Prize, a special prize awarded to people who make the world a better place."}, {"id": "Spain", "display_name": "Spain", "category": "countries", "text": "Spain is a country in Europe. It is very beautiful and full of mountains and rivers. Spanish people are talented in sports, and Spanish teams win many trophies in basketball and soccer. Art, music, and dance are very popular in Spain. The guitar was invented in Spain, and it is used for playing flamenco, a traditional dance. Every day at noon, Spaniards enjoy a “siesta,” which is a short, refreshing nap. They also eat tapas, tiny and delicious dishes, and paella, a dish with rice."}, {"id": "Greece", "display_name": "Greece", "category": "countries", "text": "Greece is a country in Europe that is made of a large area of land along with thousands of islands. Some of Greece’s islands are big, and some are tiny. Greece is one of the most important places in the world. It has many ancient buildings and monuments, and was actually the place where the Olympic Games were invented! Greeks have beautiful and lively music played on traditional instruments, like the bouzouki. They enjoy eating tasty dishes like tzatziki and moussaka."}, {"id": "Zimbabwe", "display_name": "Zimbabwe", "category": "countries", "text": "Zimbabwe is a country in Africa. It’s a landlocked country, and that means it doesn’t have any seas around it. Victoria Falls, one of the most beautiful waterfalls in the world, is in Zimbabwe. Zimbabwe used to be a powerful kingdom, and today people visit the ruins of its ancient capital, which was a huge stone palace. There’s a special place in Zimbabwe called Matobo park, where you can see giant rocks standing one on top of the other without falling down!"}, {"id": "Italy", "display_name": "Italy", "category": "countries", "text": "Italy is a country in Europe that has the shape of a boot. Rome, the capital city of Italy, used to be the most important city in the world, and it is full of beautiful buildings and art. Many famous painters, poets, and composers come from Italy. Italians have great food that people all over the world like to eat, like pizza, pasta, and lasagna. And they never forget to finish a big meal with a fresh cup of espresso coffee!"}, {"id": "Japan", "display_name": "Japan", "category": "countries", "text": "Japan is a country in Asia that is made out of four large islands and thousands of small ones. Japan is full of forests and volcanoes. It has very special art, music, and theatre, which is called Kabuki. Japanese people eat tasty dishes like sushi, Udon noodles, and miso soup. Japan used to have brave warriors called Samurai, who had curved swords. The Japanese love Sumo Wrestling, a sport where two big and powerful competitors try to push each other out of a circle."}, {"id": "Qatar", "display_name": "Qatar", "category": "countries", "text": "Qatar is a small Arab country in Asia and the richest country in the world. Qatar is very rich because its land is full of oil and other things that it sells to the rest of the world. Qatar is hot and dry, and has many beautiful beaches. Its capital city is called Doha, which has many tall buildings with special designs. One of Qatar’s favorite sports is camel racing, but instead of people, small robots actually ride the camels!"}, {"id": "Germany", "display_name": "Germany", "category": "countries", "text": "Germany is a big country in Europe. It used to be divided into two countries that didn’t get along, called West Germany and East Germany. Berlin, Germany’s capital city, was even divided by a high wall! Today, Germany is united, and it’s a very wealthy and powerful country. Germany has a rich tradition of music, art, and science. Germans build excellent cars. There are highways in Germany where people are allowed to drive as fast as they want, but they’re always very careful!"}, {"id": "India", "display_name": "India", "category": "countries", "text": "India is a huge country in Asia, with the second biggest number of people in the world. India has lots of mountains, rivers, and jungles. A kind of tiger called the Bengal Tiger is India’s national animal. Many temples in India celebrate the tradition of the Buddha, a man who lived a long time ago and taught people how to live a calm and gentle life. Mumbai, an Indian city, is like the Indian Hollywood – more than a thousand movies are filmed there every year!"}, {"id": "Yemen", "display_name": "Yemen", "category": "countries", "text": "Yemen is an Arab country in Asia. Yemen is in a desert, and it’s very hot and dry there. Yemenite men wear a long dress, which is called a “thoob”, and carry a traditional curved dagger called a “janbiya”. There’s a special city in Yemen called Shibam, which is full of hundreds of beautiful towers made out of mud. Socotra, an island that belongs to Yemen, has very unusual plants. Many of them don’t grow in any other place in the world!"}, {"id": "Brazil", "display_name": "Brazil", "category": "countries", "text": "Brazil is the largest country in South America, and the 5th biggest country in the world. Brazil is covered with rainforests. One of the world’s longest rivers, called the Amazon River, streams through Brazil. Every year, Brazilians celebrate a carnival with lots of music, dancing, and beautiful costumes. Brazilians love soccer. Brazil is the country that has the most kinds of animals and plants in the world. It’s also the country that has the most kinds of monkeys!"}, {"id": "Russia", "display_name": "Russia", "category": "countries", "text": "Russia is the largest country in the world. It’s part of Europe and Asia, and has many forests, mountains, and rivers, as well as huge areas of low grass, called steppes. Russia also has many animals, like the Siberian Tiger, which is the largest tiger in the world. Russia has a long tradition of art and science. It was the first country to send an astronaut to space! Many people say that the Bolshoi, a Russian ballet company, has the best dancers in the world."}, {"id": "England", "display_name": "England", "category": "countries", "text": "England is a country in Great Britain, which is a large island next to Europe. England used to be the center of the British Empire, a huge empire which ruled many different places in the world. England’s capital city is called London. The queen of England, Elizabeth the 2nd, lives there in a palace which is guarded by soldiers with red uniforms and giant black hats. The English invented soccer, which they call “football”, and they never forget to drink tea every afternoon!"}, {"id": "United States", "display_name": "United States", "category": "countries", "text": "The United States of America, or the USA, is a huge country in North America. The USA is made out of 50 states that cooperate to run the country. The USA is the most powerful country in the world, and it helps many countries when they need it. The USA was the first country to put a man on the moon. Jazz music was invented in the USA. Americans love football, basketball, and baseball, and many of them enjoy eating hamburgers and hot dogs."}, {"id": "Venezuela", "display_name": "Venezuela", "category": "countries", "text": "Venezuela is a country in South America. Its capital city is Caracas, which is located in a beautiful valley and is named after a tribe of very brave people. Venezuela has many different types of landscapes: rainforests, plains, rivers, mountains, beaches, and even a desert! The world’s highest waterfall, called Angel Falls, is in Venezuela. If you visit Venezuela, you can see mountains that are shaped like giant tables, called “tepuis.” Venezuelans speak Spanish, and they are very warm and friendly."}, {"id": "Argentina", "display_name": "Argentina", "category": "countries", "text": "Argentina is the second largest country in South America. One of the most beautiful waterfalls in the world, the Iguazu Falls, is in Argentina. Argentina’s capital city, Buenos Aires, is one of the biggest cities in the world. Argentina has lots of music and also a special dance, called Tango. Argentineans love soccer, and enjoy having barbecues, which they call Asado. Once a year, Argentineans celebrate a special holiday called “friend’s day” and give presents to their friends."}, {"id": "Appendix", "display_name": "Appendix", "category": "human_body", "text": "The appendix is a small organ inside the belly. For a very long time, people didn’t know what the appendix does and thought that we don’t really need it. We know that the eyes see and that the legs walk, but what does the appendix do? Today, scientists say that the appendix is like a small warehouse of good germs that helps the body fight bad germs inside our belly when it is sick. It turns out that we need it anyway!"}, {"id": "Brain", "display_name": "Brain", "category": "human_body", "text": "The brain is a big, soft organ inside our head and it is the commander of our body. We can’t feel, think, or do anything without the brain. The brain tells our organs what to do: for example, it orders our hands to move and our mouth to speak. Things we remember and imagine are stored in the brain. It helps us understand the things that happen to us. The dreams that we have when we are asleep actually happen in the brain."}, {"id": "Ears", "display_name": "Ears", "category": "human_body", "text": "Ears are small organs on both sides of the head that we use for hearing. Each ear has three parts: the first part is called the outer ear, and it collects the sounds around us, like talking, melodies, and animal sounds. The second part is called the middle ear, and it has tiny bones that help the sounds we collected to travel inside our head. The third part is the inner ear. It sends the sounds to the brain, which understands them."}, {"id": "Heart", "display_name": "Heart", "category": "human_body", "text": "The heart is a very important muscle inside our chest. It is the same size as your fist. The heart pumps blood, which delivers oxygen and other important things to the rest of the body. If you want to feel your heartbeat, place your hand on the left side of your chest. Our heart beats faster when we’re excited or when we exercise, because our body needs to get oxygen faster. When we rest, our heartbeat slows down."}, {"id": "Liver", "display_name": "Liver", "category": "human_body", "text": "The liver is an organ between the chest and the belly that does many important things. It helps the stomach digest food and is like a warehouse for vitamins, blood, and other important things that our body needs. The liver helps clean the body if we eat or drink something that is not healthy for us. Believe it or not, the liver is the only part inside our body that can grow back if some of it is cut off!"}, {"id": "Lungs", "display_name": "Lungs", "category": "human_body", "text": "Lungs are big and very important organs in our chest that we use for breathing. When we breathe in, air goes into our lungs. The air that we breathe is full of stuff that we need, like oxygen, and other stuff that we don’t need. The lungs keep the oxygen and breathe out the stuff that we don’t need. Then, they send the oxygen to the blood, which delivers it to the rest of the body."}, {"id": "Muscles", "display_name": "Muscles", "category": "human_body", "text": "Muscles are the parts in the body that are in charge of movement and power. Everything in the body that moves has muscles—our hands, our feet, even our eyes. That’s why we have a lot of muscles—more than six hundred! Even the heart is a muscle. Our muscles can be very big, very small, or anywhere in between. The smallest muscle is inside the ear. And believe it or not, the biggest muscle is our tushy!"}, {"id": "Nose", "display_name": "Nose", "category": "human_body", "text": "The nose is a bodily organ in the middle of the face that we use for breathing and smelling. It has two holes in the front, called nostrils. When we breathe, tiny hairs inside our nostrils keep dust from entering the body so that the air is as clean as possible. Deep inside the nose, there are tiny parts that collect different scents from the air. That’s how we feel that some flowers have a pleasant smell and that skunks stink!"}, {"id": "Teeth", "display_name": "Teeth", "category": "human_body", "text": "Teeth are small white parts inside our mouth that we use for chewing the food we eat. When our teeth chew food, they cut it into little pieces and make it easier for the throat to swallow it. After we are born, our baby teeth start to grow. When we are six years old, they start falling out. But don’t worry! Stronger teeth called adult teeth will soon grow instead. We can use them for the rest of our lives."}, {"id": "Tongue", "display_name": "Tongue", "category": "human_body", "text": "The tongue is a muscle inside our mouth that we use when we eat and speak. It has a lot of tiny bumps on it called taste buds that touch the food when we eat it and sense what taste it has. That’s how we know that ice cream is sweet and that lemons are sour. The tongue also helps us make sounds when we speak. Try saying words like “lollipop,” “t-shirt,” and “daddy” without using your tongue—it’s impossible!"}, {"id": "Nail", "display_name": "Nail", "category": "human_body", "text": "A nail is a hard part on our body that protects the tips of our fingers and toes. Nails are made out of keratin—which is the same stuff that our hair and skin are made of, although they look and feel different. Besides protecting our fingers, nails do other important things, like grabbing tiny objects or scratching a nagging itch. Fingernails grow slowly, and toenails grow even slower! If your nail falls off, don’t worry: a new one will soon grow instead!"}, {"id": "Bone", "display_name": "Bone", "category": "human_body", "text": "Bones are hard parts of the body that create its frame, called the skeleton. Bones support the body, and protect soft organs like the brain or the heart. Some bones are connected to muscles, and together they move the body. Bones have many different shapes and sizes. The largest bone is in our thigh. The smallest bone is inside our ear. If you break your arm or leg, you have to wear a cast until the bone heals. But don’t worry – soon it’ll be as good as new!"}, {"id": "Eye", "display_name": "Eye", "category": "human_body", "text": "Eyes are ball-shaped organs on our face that we use for seeing. The black circle in the middle of the eye is called the pupil. It allows light to enter the eye. Then, there’s a part in the back of the eye that collects the images we see and sends them to the brain. When we cry, tears come out of a tiny sack next to the corner of the eye. We also use tears when we blink, to keep the eyes moist."}, {"id": "Blood", "display_name": "Blood", "category": "human_body", "text": "Blood is a red fluid that moves around our body, delivers things the body needs, and collects things it doesn’t need any more. Blood travels from the heart, which pumps it through a system of tubes called arteries. It returns to the heart inside a system of tubes called veins. There are two types of cells in the blood: white cells, which patrol the body like guards and defend it, and red cells, which send oxygen and other important things all over the body."}, {"id": "Stomach", "display_name": "Stomach", "category": "human_body", "text": "The stomach is an organ inside our body that takes care of the food we eat and the drinks we drink. It’s a little bit above our belly and looks like a small sack. After we swallow food, it travels to the stomach through a long tube. When food arrives in the stomach, the stomach mixes it with a special liquid. This liquid helps us keep the useful parts of the food and get rid of the parts we don’t need."}, {"id": "Cell", "display_name": "Cell", "category": "human_body", "text": "Cells are the building blocks of our body. Just like houses are made of bricks, our body is made out of cells. Every kind of cell has a different structure and does something special. For example, red blood cells look like tiny buttons and carry oxygen around; brain cells look like tiny stars and carry information to the brain; and muscle cells look like tiny tubes. The most important part in every cell is called a nucleus, and it is the cell’s commander."}, {"id": "Hair", "display_name": "Hair", "category": "human_body", "text": "Hairs are thin strings that grow out of our head and in many parts of our body. The hair on our head can be straight, wavy, or curly, with different colors: black, brown, red or blond. When people become old, their hair becomes gray or white. Our hair grows all the time. Every month it grows about half an inch longer! The goose bumps we get when it's cold are actually our hair standing up. That’s how it keeps the heat inside the body!"}, {"id": "Kidney", "display_name": "Kidney", "category": "human_body", "text": "The kidneys are two organs in the sides of our lower back that look like beans. The kidneys clean up our blood. They also make sure that we have just the right amount of water and other materials in our body. The water that we don't need anymore, along with the stuff that was removed from the blood, turns into the urine that we pee. The kidneys work very hard. Every day, the amount of blood they clean can fill an entire bath tub!"}, {"id": "Nerve", "display_name": "Nerve", "category": "human_body", "text": "A nerve is like a messenger that sends information between the brain and other parts of the body. The messages travel in the nervous system, which is like a set of roads inside the body. One kind of nerves sends the brain messages with information about what we see, hear, feel, taste, or smell. When the brain wants the body to do something, it uses another kind of nerves to send orders to the muscles, telling the muscles to move."}, {"id": "Skeleton", "display_name": "Skeleton", "category": "human_body", "text": "The skeleton is the shape made by all of the bones in our body, which are connected together. The bones in the body are connected to each other in a way that makes sure that the body can move easily and safely. Parts of the skeleton protect organs inside our body. For example, the bones in our chest protect the heart and lungs, and the skull protects the brain. The skeleton is made of more than 200 bones!"}, {"id": "Skin", "display_name": "Skin", "category": "human_body", "text": "Skin is the outer part of our body. It's the biggest organ we have! The skin protects us, cools or heats the body, and helps us feel things that we touch. Sometimes, if we get cut, the wound that healed leaves a mark on our skin, called a scar. If we spend time in the sun, our skin becomes tan, but if we aren't careful we might also get sunburns. That’s why it’s important to use sunscreen and stay in the shade!"}, {"id": "Tissue", "display_name": "Tissue", "category": "human_body", "text": "A tissue is a group of cells of the same kind that work together as a team to do the same job in our bodies. For example, muscle tissue is a group of muscle cells working together to make a part of the body move. Tissues can be hard like bones, soft like skin, and even liquid, like blood! The organs in our body are made of tissue. For example, our leg is made mostly out of bone tissue, blood, muscles and skin."}, {"id": "Tonsils", "display_name": "Tonsils", "category": "human_body", "text": "Tonsils are two bumps on the back of our throat that help us if a germ or a virus enters the body through food that we eat or air that we breathe. We usually don’t feel our tonsils, but when we’re sick in our throat, they become bigger because they to work to protect us. Sometimes, if the tonsils are too big or if they make breathing difficult, the doctor decides to take them out. It's a very simple surgery that many people have."}, {"id": "Womb", "display_name": "Womb", "category": "human_body", "text": "The womb is the place where the baby grows in the mother's belly. Babies develop in the womb for nine months until they are ready to be born. Babies grow in a special sac inside the womb that protects them and gives them oxygen and other stuff they need. The womb can change its size and shape. It's usually the size of a pear, but when a baby grows inside it, the womb can become as big as a watermelon!"}, {"id": "Versailles", "display_name": "Versailles", "category": "landmarks", "text": "The Palace of Versailles is a beautiful palace in France. It used to be the home of France’s kings and queens, especially a king called Louis the 16th and his wife Marie Antoinette, who were kicked out of there because they treated the people of France badly. The Palace of Versailles has a lot of fancy furniture, statues, paintings, and other beautiful decorations. The most impressive room is the Hall of Mirrors, which has beautiful arches and mirrors. Versailles also has wonderful gardens and fountains."}, {"id": "Tower of Pisa", "display_name": "Tower of Pisa", "category": "landmarks", "text": "The Tower of Pisa is named after the city of Pisa in Italy, where it stands. The tower leans to one side and looks like it’s going to fall! That’s because it was built a very long time ago on soft ground, and one side simply sank in it! The Tower of Pisa is a circular bell tower and it belongs to the church of Pisa. It has eight floors, seven bells, and more than two hundred marble arches."}, {"id": "Stonehenge", "display_name": "Stonehenge", "category": "landmarks", "text": "Stonehenge is a circle of huge stones in England, which was built thousands of years ago. No one knows for sure why Stonehenge was built. Some say it was a religious place, some say it was a burial place, and others believe it was a place where people used to look at the sun, the moon, and the stars. The stones weigh tons—and nobody really knows how the people who built Stonehenge were able to put them there."}, {"id": "Mount Rushmore", "display_name": "Mount Rushmore", "category": "landmarks", "text": "Mount Rushmore is a famous mountain in South Dakota, a state in the United States. It has a huge sculpture of the faces of four American presidents carved into it. The presidents are George Washington, Thomas Jefferson, Theodore Roosevelt, and Abraham Lincoln. It took 14 years and 400 workers to create the sculpture! Before they carved the statue, the workers on Mount Rushmore had to get rid of lots of rocks, so they blew them up with dynamite!"}, {"id": "Western Wall", "display_name": "Western Wall", "category": "landmarks", "text": "The Western Wall is a site in the old city of Jerusalem in Israel. Many years ago, it used to be a part of the wall that surrounded the Jewish Temple. The Temple was ruined, and the Wall is all that is left. It’s also called “the Wailing Wall,” because Jewish people cry there, remembering  the Temple’s destruction. Many people stick small pieces of paper between the stones of the Wall, where they write their prayers and wishes."}, {"id": "Acropolis of Athens", "display_name": "Acropolis of Athens", "category": "landmarks", "text": "The Acropolis is a beautiful fortress that was built on a rocky hill a very long time ago in Athens, a city in ancient Greece. The Acropolis was the highest part of ancient Athens, and had impressive buildings, temples, and theatres. The people of Athens used to come there to pray and celebrate holidays and festivals. Some of the Acropolis buildings still stand today, and people from all over the world come to see them."}, {"id": "Pyramids", "display_name": "Pyramids", "category": "landmarks", "text": "The pyramids are ancient huge structures that are located in Egypt. They have a very special shape: the walls are triangular and the floor is square. The ancient Egyptians built the pyramids as giant tombs for their kings, called pharaohs, who were buried inside with their belongings and jewelry. It took thousands of workers to build one pyramid! There are more than 130 pyramids in Egypt. The biggest and most famous ones are in the city of Giza."}, {"id": "Petra", "display_name": "Petra", "category": "landmarks", "text": "Petra is an ancient city in Jordan, located in the desert. The city was built by the Nabataeans, an ancient Arab tribe, who carved into the mountains amazing temples, tombs, buildings, and even a theatre. The city is also called “the Rose City,” because of the color of the rocks it is made from. It also had special canals to transport water. People from all over the ancient world used to come to Petra to sell and buy spices and silk."}, {"id": "Pompeii", "display_name": "Pompeii", "category": "landmarks", "text": "Pompeii is an ancient city in Italy. Many years ago, it was a lovely town in Ancient Rome, in which both poor and very rich people lived. One summer’s day, the nearby volcano, Mount Vesuvius, erupted, and the town was buried completely under the ash. Two thousand years later, archaeologists dug the area and found Pompeii frozen in time: streets, villas, temples, theatres, shops, and artifacts were kept whole, teaching us a lot about how Roman people lived."}, {"id": "Niagara Falls", "display_name": "Niagara Falls", "category": "landmarks", "text": "The Niagara Falls are three beautiful waterfalls between Canada and the United States. The Niagara Falls’ waters move very quickly—hundreds of thousands gallons of water flow down them every second! The water is so powerful that it is even used for making electricity. Although it is very dangerous, a few people have jumped into the water and some have even walked over the falls on a tightrope! Many people visit the Niagara Falls every year and watch the beauty of the flowing water."}, {"id": "Hermitage", "display_name": "Hermitage", "category": "landmarks", "text": "The Hermitage, a museum in the city of Saint Petersburg in Russia, is one of the oldest and largest museums in the world. It stretches over a number of fancy palaces. The emperors of Russia used to live in one of the palaces before they decided to turn it into a museum. There are more than three million works of art in the Hermitage: paintings, sculptures, ancient artifacts, jewelry, and many other beautiful things from different times and places."}, {"id": "Eiffel Tower", "display_name": "Eiffel Tower", "category": "landmarks", "text": "The Eiffel Tower is a very tall tower and the most famous site in Paris, France’s capital city. If you come to Paris, you can’t miss it. It was built more than a hundred years ago and is named after Gustave Eiffel, the owner of the company that built it. The Eiffel Tower is made completely out of iron. At night, many beautiful lights decorate it. Every year, visitors climb the Eiffel Tower to enjoy the great view of Paris from its top."}, {"id": "Machu Picchu", "display_name": "Machu Picchu", "category": "landmarks", "text": "Machu Picchu was a city of the Incas, a very large tribe that lived in South America many years ago. It is a magical site, beautifully located on high mountains in Peru. Machu Picchu was probably built as a residence for the Inca ruler. The Incas built there out of stone many beautiful buildings: palaces, temples, and houses. They also paved terraces—special steps that were used to grow food. Many tourists visit Peru and climb the mountains to see Machu Picchu’s beauty."}, {"id": "Loch Ness", "display_name": "Loch Ness", "category": "landmarks", "text": "Loch Ness is a large, deep lake in Scotland. Some people believe that a giant creature lives inside the lake’s dark waters. They call it “the Loch Ness Monster,” and its nickname is Nessie. People say that Nessie has a large body and a long neck, like a kind of dinosaur that lives in water. Some even took pictures of it. Scientists who studied the lake claim that all of these are just make-believe stories and that Nessie doesn’t really exist."}, {"id": "Kilimanjaro", "display_name": "Kilimanjaro", "category": "landmarks", "text": "Kilimanjaro is a giant mountain in Tanzania, a country in Africa. It is the highest point in Africa, and that’s why it is sometimes called “the Roof of Africa.” Mount Kilimanjaro is famous for its icy peak. In fact, it’s actually a volcano that doesn’t erupt anymore. You can find different environments on Mount Kilimanjaro: forests, bushes, little swamps, and even a desert. Many animals live on the mountain, like elephants, monkeys, buffalos, antelopes, and birds."}, {"id": "Taj Mahal", "display_name": "Taj Mahal", "category": "landmarks", "text": "The Taj Mahal is a beautiful mausoleum, which is a large tomb, in the city of Agra in India. An Indian emperor built it in memory of his beloved wife, whom he called “the Jewel of the Palace.” The Taj Mahal is made of white marble and is decorated with precious stones. People from all over the world come to see it. It took more than twenty years to build the Taj Mahal, which also has a large garden and an enormous pool."}, {"id": "Great Wall of China", "display_name": "Great Wall of China", "category": "landmarks", "text": "The Great Wall of China is a very long wall that the Chinese built in order to defend China from enemies. It’s the longest structure that was ever built, and it took almost 2,000 years to build it! The wall was built from stone, wood, earth, and bricks. The work was very hard and the workers suffered a lot. The Great Wall of China is so long that some people say you can even see it from outer space!"}, {"id": "Empire State Building", "display_name": "Empire State Building", "category": "landmarks", "text": "The Empire State Building is a building in New York City that used to be the tallest building in the world. It has 103 floors, 73 elevators, and 6,500 windows! At night, the building is lit with colorful lights that change during special events, celebrations, and holidays. If you stand on its observation deck, you can see the entire view of New York City. Every year, there’s a race to run up the stairs to its 86th floor. That’s very exhausting!"}, {"id": "Big Ben", "display_name": "Big Ben", "category": "landmarks", "text": "Big Ben is a very high tower in London, England’s capital. Big Ben has the biggest four-faced clock in the world—the clock faces all four directions, so that anyone who looks at it can see what time it is. Not many people know that although everyone calls the tower Big Ben, it’s actually the nickname given to the giant bell inside it. This bell, along with four smaller ones, chimes a pleasant melody that can be heard from far away."}, {"id": "Everest", "display_name": "Everest", "category": "landmarks", "text": "Mount Everest is the highest mountain in the world. It is located between Nepal and Tibet, and is part of the Himalayan Mountains in Asia. The top of the mountain is covered in deep snow all year round. Climbing to the top of Mount Everest is very difficult and dangerous, since it is very high and steep, the weather is freezing, and sometimes there are avalanches on the way. Even so, thousands of people have already climbed it!"}, {"id": "Iguazu Falls", "display_name": "Iguazu Falls", "category": "landmarks", "text": "The Iguazu Falls are giant waterfalls, which are part of the Iguazu River, between Argentina and Brazil. The Iguazu Falls are actually made out of 275 separate waterfalls that together form the shape of a horseshoe. The most impressive part of the waterfalls is called “the Devil’s Throat.” Many beautiful plants grow around the waterfalls, and you can also see small birds, called great dusky swifts, dive into them. You can often see a wonderful rainbow over the Iguazu Falls."}, {"id": "Easter Island", "display_name": "Easter Island", "category": "landmarks", "text": "Easter Island, also called Rapa Nui, is a small and distant island in the Pacific Ocean. Easter Island is full of hundreds of sculptures of huge figures, called Moai, which are carved from very big stones. The Moai were carved by the first people who lived on the island. They worked in teams, and it took about a year to finish each statue. How exactly they moved those giant statues, and why they built them, is still a mystery."}, {"id": "Grand Canyon", "display_name": "Grand Canyon", "category": "landmarks", "text": "The Grand Canyon is a famous site in a huge park in Arizona, a state in the United States. It is a deep narrow valley between colorful steep cliffs, where the Colorado River flows. The Grand Canyon is full of wild animals and beautiful plants. Millions of tourists come to enjoy the amazing natural view of this place. You can tour the Grand Canyon by driving, walking, hiking, rafting, or even by riding a horse or a mule."}, {"id": "Statue of Liberty", "display_name": "Statue of Liberty", "category": "landmarks", "text": "The Statue of Liberty is a giant statue of a woman holding a torch in one hand and a tablet in the other, with a broken chain next to her feet. It was a gift that France gave to the United States. The Statue of Liberty stands on a small island just outside of New York City, and welcomes anyone who visits the city by sea. Many people take a ferry to visit the statue and honor its message of freedom."}, {"id": "Recorder", "display_name": "Recorder", "category": "musical_instruments", "text": "A recorder is a small wooden instrument that is very similar to the flute. The difference between them is that the recorder player puts it in the mouth and blows air into it, and the flute player blows air into the flute without touching it. Recorders have holes in them, and you play different notes by covering different holes. If you want to learn how to play music, the recorder is a great place to start!"}, {"id": "Pipe Organ", "display_name": "Pipe Organ", "category": "musical_instruments", "text": "The pipe organ is the biggest instrument in the world. It is played like the piano, but every note has a special pipe that air goes through to make a sound. Sometimes there are different kinds of pipes that make different kinds of sounds. Some pipe organs have more than a thousand pipes! The pipes can be as tall as a three story building or as short as a as pen! It all sounds very loud!"}, {"id": "Ukulele", "display_name": "Ukulele", "category": "musical_instruments", "text": "A Ukulele is a small guitar that comes from Hawaii. It has a fun and playful sound, and that's why it's called ukulele, a word that means \"jumping flea\" in the Hawaiian language! Ukulele's are usually made of wood or plastic and have four strings. In many countries in the world, people use the ukulele for teaching music, because it's a very easy instrument to play. Why don't you try it?"}, {"id": "Viola", "display_name": "Viola", "category": "musical_instruments", "text": "The viola is like the violin's older brother or sister. It looks exactly like a violin, and people play it exactly the way they play the violin, but the viola is a little bit bigger and has a lower sound. The viola is part of the orchestra. In the past, the viola was treated as an instrument that is only accompanies other instruments, but as time went by composers starting writing music especially for it."}, {"id": "Didgeridoo", "display_name": "Didgeridoo", "category": "musical_instruments", "text": "The didgeridoo is a traditional instrument that is played by the Aborigines, the people who first lived in Australia. The Didgeridoo is a long, hollow piece of wood that the player blows through. It doesn't make melodies, but very deep sounds. Didgeridoo players are very skilled. They can play the didgeridoo and breathe at the same time, and that's how can they can play it without stopping for a very long time."}, {"id": "Drums", "display_name": "Drums", "category": "musical_instruments", "text": "A drum is a musical instrument that gives rhythm to other instruments, and can also accompany dancing. There are many kinds of drums from all over the world. Some are played with wooden sticks called drumsticks, like the snare drum, tom tom drums, or cymbals. Other kinds of drums are played with the feet, like the bass drum and the high hat. Together they create great rhythms!"}, {"id": "Gong", "display_name": "Gong", "category": "musical_instruments", "text": "A gong is a very old traditional musical instrument that is found in many places in the world, from China to Africa. Gongs come in different sizes. Gongs are played with a mallet, which is like a hammer with a soft edge, that strikes it. Each gong can make only one sound, but they're all very loud! In some places, gongs were used to wake people up in the morning!"}, {"id": "Oud", "display_name": "Oud", "category": "musical_instruments", "text": "The oud is a traditional string instrument that looks like a guitar with a big body and thin neck. It is the most important musical instrument in the Arab world. Ouds are made of wood. In fact, the word \"oud\" means \"wood\" in the Arabic language! Some people say that ouds have existed for thousands of years! Ouds have a beautiful, deep sound. They can be played alone, with other instruments, and also with singing and dancing."}, {"id": "Guitar", "display_name": "Guitar", "category": "musical_instruments", "text": "The guitar is a wooden instrument from Spain and one of the most famous instruments in the world. Guitars have six strings, a large body, and a long neck. Guitars can play melodies, or chords. Many people play the guitar and sing at the same time. The electric guitar is a special guitar that’s connected to a sound speaker. It can make loud and fascinating sounds!"}, {"id": "Accordion", "display_name": "Accordion", "category": "musical_instruments", "text": "The accordion is a traditional musical instrument in different parts of the world. It’s very loud, and many people play it with songs and dances. The accordion’s body is called a squeezebox, because you have to squeeze it and stretch it to make a sound. But that's not enough! You also have to play the melody on the keyboard with your right fingers, and push the buttons to choose the chords with your left fingers. That’s not easy at all!"}, {"id": "Banjo", "display_name": "Banjo", "category": "musical_instruments", "text": "The banjo is a folk music string instrument that is played with songs and dances. It has a round body and a long neck. It usually has four strings, but sometimes, it has five or even six. The banjo was invented in America by African-Americans who based it on instruments that they used to play in Africa. Today, it is very popular in America, especially in a kind of music called “country”."}, {"id": "Bouzouki", "display_name": "Bouzouki", "category": "musical_instruments", "text": "The bouzouki is a Greek string instrument that is used to play traditional Greek folk music. It can either accompany a song or play the lead melody. The bouzouki is made of wood and has a round body and a long neck. Most bouzoukis have three double strings, but some have four. When you pluck a bouzouki string, it sounds like this… When you play a tune, it sounds like this…"}, {"id": "Flute", "display_name": "Flute", "category": "musical_instruments", "text": "The flute is a long and narrow instrument that makes sounds when the player blows air into it without touching it. It is probably the oldest instrument in the world. There are many types of flutes in different sizes and having different tones. A small wooden flute sounds like this… In an orchestra, the flute is made of brass and is played on the side. It has a very sweet sound."}, {"id": "Lute", "display_name": "Lute", "category": "musical_instruments", "text": "The lute is a string instrument that looks like a strange guitar. It is made of wood and has a round body and a neck. Not many people play it today, but in the past, people used to play it a lot. Some kinds of lutes are still played in Africa and Asia, like the oud, a traditional Arabic instrument. The lute was used for playing songs and for accompanying dances, but many composers wrote music just for it."}, {"id": "Tuba", "display_name": "Tuba", "category": "musical_instruments", "text": "The tuba is a very large and loud brass instrument that produces very low tones. It is part of an orchestra and is also used in marching bands. The tuba player has to have powerful lungs to blow enough air into the instrument for it to make a sound. Tuba players make different notes by pressing its different valves with their fingers. Although it is big and heavy, the tuba can sometimes produce delicate and pleasant sounds."}, {"id": "Violin", "display_name": "Violin", "category": "musical_instruments", "text": "The violin is a wooden string instrument with a small body, a short neck, and four strings. It is usually played with a bow, but sometimes, the player plucks its strings. The violin is part of an orchestra, but it is also played in traditional music all over the world The oldest violin that people still play today is more than three hundred years old!"}, {"id": "Harp", "display_name": "Harp", "category": "musical_instruments", "text": "The harp is a string instrument in the shape of a triangle. There are many kinds of harps, and they all have a lot of strings. The concert harp, for example, has 47 strings! Sometimes, strings are painted in different colors so that the player can find them easily. Some harps are small and can be played on the lap, and some are very big and stand on the floor. The harp’s sound is very sweet and dreamy."}, {"id": "Piano", "display_name": "Piano", "category": "musical_instruments", "text": "The piano is a very big instrument that is played with our hands. It has black and white keys, and when our fingers press them, tiny hammers, which are connected to them, strike tight strings and produce a wide range of notes. In simple songs, the right hand plays the melody, and the left hand accompanies it with chords. Sometimes, all of the fingers play together and make rich and fascinating music."}, {"id": "Cello", "display_name": "Cello", "category": "musical_instruments", "text": "The cello is a large string instrument made out of wood and played with a bow. It has a loud and low tone that sounds like this... The cello has a very big body, a long neck, and four strings. Because of its size, the cello player leans it on the floor and always plays it while sitting down. The cello is part of a musical orchestra, but many composers write music especially for it because of its wonderful sound."}, {"id": "Clarinet", "display_name": "Clarinet", "category": "musical_instruments", "text": "The clarinet is one of the most important reed instruments. A reed is a hard plant that instrument makers cut into thin pieces that they put into the instrument. When air shakes the reed, it makes a special sound. The clarinetist blows air into the clarinet and covers different holes in it to make different notes. Peopl
